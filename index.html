const fixStickerCoords=(arr)=>{if(!Array.isArray(arr))return arr;return arr.map((s,i)=>{if(s&&((s.y||0)>1200||(s.x||0)>1700||(s.x||0)<0||(s.y||0)<0)){return{...s,x:40+(i%6)*48,y:40+Math.floor(i/6)*48};}return s;});};

const mixHex=(hex,target,amt)=>{if(!hex||hex[0]!=='#'||hex.length<7)return hex;const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);const h=n=>Math.max(0,Math.min(255,Math.round(n))).toString(16).padStart(2,'0');return'#'+h(r+(target-r)*amt)+h(g+(target-g)*amt)+h(b+(target-b)*amt);};

  return [...darks,hex,...lights];
};

// ─── DATE UTILS ──────────────────────────────
const toDateKey = (d)=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${day}`;};
const getWeekStart=(off=0)=>{const t=new Date();t.setHours(0,0,0,0);const dow=t.getDay(),toMon=dow===0?-6:1-dow,m=new Date(t);m.setDate(t.getDate()+toMon+off*7);return m;};
const getWeekDates=(off=0)=>{const mon=getWeekStart(off);return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});};
const isToday=(date)=>toDateKey(date)===toDateKey(new Date());
const isSat=(d)=>d.getDay()===6;
const isSun=(d)=>d.getDay()===0;

function getMonthWeeks(year,month){
  const first=new Date(year,month,1),last=new Date(year,month+1,0);
  const startDow=(first.getDay()+6)%7;
  const cur=new Date(first);cur.setDate(1-startDow);
  const weeks=[];
  while(cur<=last){
    const week=Array.from({length:7},(_,i)=>{const d=new Date(cur);d.setDate(cur.getDate()+i);return d;});
    weeks.push(week);cur.setDate(cur.getDate()+7);
  }
  return weeks;
}

function getBlockWeekPos(block,weekDates){
  const wsk=toDateKey(weekDates[0]),wek=toDateKey(weekDates[6]);
  const cs=block.startDate<wsk?wsk:block.startDate;
  const ce=block.endDate>wek?wek:block.endDate;
  let sc=weekDates.findIndex(d=>toDateKey(d)===cs);
  let ec=weekDates.findIndex(d=>toDateKey(d)===ce);
  // fallback if exact date not in this week (shouldn't happen)
  if(sc<0)sc=0;if(ec<0)ec=6;
  return{startCol:sc,endCol:ec,isStart:block.startDate>=wsk,isEnd:block.endDate<=wek};
}

function assignLanes(blocks,weekDates){
  const wsk=toDateKey(weekDates[0]),wek=toDateKey(weekDates[6]);
  const lanes=[];
  return blocks.map(b=>{
    const cs=b.startDate<wsk?wsk:b.startDate;
    const ce=b.endDate>wek?wek:b.endDate;
    let lane=0;
    while(lane<lanes.length&&lanes[lane].some(r=>!(r.end<cs||r.start>ce)))lane++;
    if(!lanes[lane])lanes[lane]=[];
    lanes[lane].push({start:cs,end:ce});
    return{...b,lane};
  });

// 기존 Block[] 데이터를 새 Memo[] 형식으로 변환
function getMemoList(raw){
  if(!raw)return[];
  if(Array.isArray(raw)&&raw.length>0){
    // 이미 새 형식 (Memo: {id, title, body, collapsed})
    if(raw[0]&&typeof raw[0]==='object'&&'title' in raw[0]&&'body' in raw[0])return raw;
    // 기존 Block[] 형식 → 하나의 메모로 변환
    const text=raw.filter(b=>b.text&&b.text.trim()).map(b=>b.text.trim()).join('\n');
    if(!text)return[];
    return[{id:'migrated-'+Date.now(),title:'메모',body:text,collapsed:false}];
  }
  return[];
}

// 배경 이미지는 용량이 커 스냅샷에서 제외 (localStorage 5MB 한도 보호; 복원 시 현재 이미지 유지됨)
function _snapState(state){const{topBarImg,panelImg,...rest}=state;return rest;}
// 10개 초과 시 '자동' 스냅샷 중 가장 오래된 것부터 삭제 — 수동 저장은 보호
function _pushSnap(snaps,snap){
  let all=[snap,...snaps];
  while(all.length>10){
    let idx=-1;
    for(let i=all.length-1;i>=0;i--){if(all[i].auto){idx=i;break;}}
    if(idx===-1)idx=all.length-1;
    all.splice(idx,1);
  }
  return all;
}
function autoSnapshot(state){
  try{
    const snaps=JSON.parse(localStorage.getItem('snapshots')||'[]');
    const lastAuto=snaps.find(s=>s.auto);const now=Date.now();
    if(lastAuto&&(now-new Date(lastAuto.createdAt).getTime())<3600000)return;
    const snap={id:uid(),createdAt:new Date().toISOString(),label:'자동 스냅샷',auto:true,state:_snapState(state)};
    localStorage.setItem('snapshots',JSON.stringify(_pushSnap(snaps,snap)));
  }catch{}
}
function manualSnapshot(state,label){
  try{
    const snaps=JSON.parse(localStorage.getItem('snapshots')||'[]');
    const snap={id:uid(),createdAt:new Date().toISOString(),label:label||'수동 저장',auto:false,state:_snapState(state)};
    localStorage.setItem('snapshots',JSON.stringify(_pushSnap(snaps,snap)));
  }catch{}
}

// ─── OUTLOOK / MSAL API ──────────────────────
let _msalApp=null;
async function getMsal(clientId){
  if(!window.msal)throw new Error('MSAL 라이브러리 로드 실패. 인터넷 연결 확인 후 새로고침 해주세요.');
  if(_msalApp&&_msalApp._bhClientId===clientId)return _msalApp;
  const cfg={auth:{clientId,authority:'https://login.microsoftonline.com/common',
    // 로그인 후 스케줄러 자기 주소로 복귀 (Azure 앱 등록의 SPA 리디렉션 URI와 정확히 일치해야 함)
    redirectUri:location.origin+location.pathname,
    navigateToLoginRequestUrl:false},
    cache:{cacheLocation:'localStorage',storeAuthStateInCookie:false}};
  const app=new window.msal.PublicClientApplication(cfg);
  await app.initialize();
  app._bhClientId=clientId;_msalApp=app;return app;
}
async function outlookConnect(clientId){
  const app=await getMsal(clientId);
  return await app.loginPopup({scopes:['Calendars.Read','User.Read'],prompt:'select_account'});
}
async function outlookSync(clientId){
  const app=await getMsal(clientId);
  const accounts=app.getAllAccounts();
  if(!accounts.length)throw new Error('로그인 필요');
  let token;
  try{token=await app.acquireTokenSilent({scopes:['Calendars.Read'],account:accounts[0]});}
  catch(e){token=await app.acquireTokenPopup({scopes:['Calendars.Read'],account:accounts[0]});}
  const now=new Date();
  const s=new Date(now.getFullYear()-1,0,1).toISOString();
  const e=new Date(now.getFullYear()+2,0,1).toISOString();
  const resp=await fetch(`https://graph.microsoft.com/v1.0/me/calendarView?startDateTime=${s}&endDateTime=${e}&$top=999&$select=subject,start,end,isAllDay,id,location`,
    {headers:{Authorization:`Bearer ${token.accessToken}`,'Content-Type':'application/json'}});
  if(!resp.ok)throw new Error('Graph API 오류: '+resp.status);
  const data=await resp.json();
  return(data.value||[]).map(ev=>({
    id:'ol_'+(ev.id||uid()).slice(0,12),
    date:ev.start.dateTime?ev.start.dateTime.slice(0,10):ev.start.date,
    time:ev.start.dateTime?ev.start.dateTime.slice(11,16):undefined,
    title:(ev.subject||'(제목 없음)').normalize('NFC').trim(),
    category:'outlook',isOutlook:true,projectId:null,
    location:ev.location&&ev.location.displayName?ev.location.displayName:undefined
  }));
}
async function outlookDisconnect(clientId){
  try{
    const app=await getMsal(clientId);
    const accounts=app.getAllAccounts();
    for(const a of accounts)await app.logoutPopup({account:a}).catch(()=>{});
  }catch{}
  _msalApp=null;
}

// ─── CLOUD SYNC (JSONBin.io) ─────────────────
const CLOUD_KEY='cloudApiKey',CLOUD_BIN='cloudBinId',CLOUD_STATUS='cloudStatus';
function cloudGetCreds(){return{apiKey:localStorage.getItem(CLOUD_KEY)||'',binId:localStorage.getItem(CLOUD_BIN)||''};}
// 아웃룩 계정 정보(이름·이메일·Client ID)는 이 기기에만 보관 — 클라우드로 올리지 않음
function _stripLocalOnly(state){const{outlookUser,outlookClientId,outlookSyncedAt,...rest}=state;return rest;}
// rev: 저장 세대 번호. 다른 기기가 먼저 저장했는지 감지해 조용한 덮어쓰기를 막는다.
let _cloudRev=0,_lastRevCheck=0,_conflictWarned=false;
async function cloudCreate(apiKey,state){
  const r=await fetch('https://api.jsonbin.io/v3/b',{
    method:'POST',
    headers:{'Content-Type':'application/json','X-Master-Key':apiKey,'X-Bin-Name':'hyejin-scheduler','X-Bin-Private':'true'},
    body:JSON.stringify({version:2,rev:1,state:_stripLocalOnly(state)})
  });
  if(!r.ok)throw new Error('JSONBin 생성 실패: '+r.status);
  const d=await r.json();_cloudRev=1;return d.metadata.id;
}
async function cloudSave(apiKey,binId,state){
  // 충돌 감지: 60초에 한 번 클라우드 rev 확인. 다른 기기가 앞서 저장했으면 덮어쓰기 중단.
  const now=Date.now();
  if(now-_lastRevCheck>60000){
    _lastRevCheck=now;
    let remoteRev=null;
    try{
      const r0=await fetch('https://api.jsonbin.io/v3/b/'+binId+'/latest',{headers:{'X-Master-Key':apiKey}});
      if(r0.ok){const d0=await r0.json();remoteRev=(d0.record&&d0.record.rev)||0;}
    }catch(e){/* 네트워크 오류 시 이번 검사만 건너뜀 */}
    if(remoteRev!==null&&remoteRev>_cloudRev){
      localStorage.setItem(CLOUD_STATUS,'conflict');
      if(!_conflictWarned){
        _conflictWarned=true;
        alert('⚠️ 다른 기기에서 변경된 데이터가 감지되어 클라우드 저장을 중단했습니다.\n페이지를 새로고침해 최신 데이터를 받은 뒤 이어서 작업해 주세요.\n(새로고침 전까지의 이 기기 변경사항은 클라우드에 반영되지 않습니다)');
      }
      throw new Error('다른 기기 변경 감지 — 새로고침 필요');
    }
  }
  const r=await fetch('https://api.jsonbin.io/v3/b/'+binId,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':apiKey},
    body:JSON.stringify({version:2,rev:_cloudRev+1,state:_stripLocalOnly(state)})
  });
  if(!r.ok)throw new Error('저장 실패: '+r.status);
  _cloudRev+=1;
}
async function cloudLoad(apiKey,binId){
  const r=await fetch('https://api.jsonbin.io/v3/b/'+binId+'/latest',{
    headers:{'X-Master-Key':apiKey}
  });
  if(!r.ok)throw new Error('불러오기 실패: '+r.status);
  const d=await r.json();
  _cloudRev=(d.record&&d.record.rev)||0;
  const s=d.record?.state||d.record;
  if(s&&typeof s==='object'){delete s.outlookUser;delete s.outlookClientId;delete s.outlookSyncedAt;}
  return s;
}

function StoreProvider({children}){
  const [state,rawDispatch]=useReducer(reducer,initialState);
  const historyRef=useRef([]);
  const stateRef=useRef(state);
  // cloudLoadedRef: cloudLoad 완료 전에는 cloudSave 차단 (race condition 방지)
  const cloudLoadedRef=useRef(false);
  useEffect(()=>{stateRef.current=state;},[state]);
  useEffect(()=>{
    document.documentElement.style.setProperty('--app-font',fontCss(state.appFont));
  },[state.appFont]);
  const dispatch=useCallback((action)=>{
    historyRef.current=[...historyRef.current.slice(-49),stateRef.current];
    rawDispatch(action);
  },[rawDispatch]);
  const undo=useCallback(()=>{
    const h=historyRef.current;
    if(!h.length)return false;
    const prev=h[h.length-1];
    historyRef.current=h.slice(0,-1);
    rawDispatch({type:'RESTORE_STATE',state:prev});
    return true;
  },[rawDispatch]);
  useEffect(()=>{
    const onKey=(e)=>{
      if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&(e.key==='z'||e.key==='Z')){
        const t=e.target;const tag=t&&t.tagName;
        const editable=t&&(tag==='INPUT'||tag==='TEXTAREA'||t.isContentEditable);
        if(editable)return; // 입력 중엔 네이티브 실행취소
        if(historyRef.current.length){e.preventDefault();undo();}
      }
    };
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[undo]);
  // Auto-snapshot: 시작 1초 후 1회 + 이후 1시간 간격 (앱을 켜둔 상태에서도 동작)
  useEffect(()=>{
    const t=setTimeout(()=>autoSnapshot(stateRef.current),1000);
    const iv=setInterval(()=>autoSnapshot(stateRef.current),3600000);
    return()=>{clearTimeout(t);clearInterval(iv);};
  },[]);

  // 할일 자동 이동: 오전 7시 이후, 미완료 과거 할일 → 오늘(금요일 미완료 → 다음 월요일)
  // 클라우드 로드가 '완료된 뒤' 최신 todos 기준으로 호출됨 (기존 1.5초 타이머 추측 방식 제거)
  const runTodoAutoMove=useCallback((todosArr)=>{
    const today=toDateKey(new Date());
    const hour=new Date().getHours();
    const lastRun=localStorage.getItem('lastTodoAutoMove');
    if(lastRun===today||hour<7)return;
    const todos=todosArr||[];
    const pastUndone=[...new Set(todos.filter(t=>!t.done&&t.date<today).map(t=>t.date))];
    if(pastUndone.length===0){localStorage.setItem('lastTodoAutoMove',today);return;}
    const toToday=[];const toMonday={};
    pastUndone.forEach(dk=>{
      const d=new Date(dk);const dow=d.getDay();
      if(dow===5){// 금요일 → 다음 월요일
        const mon=new Date(d);mon.setDate(d.getDate()+3);const mk=toDateKey(mon);
        if(!toMonday[mk])toMonday[mk]=[];toMonday[mk].push(dk);
      }else{toToday.push(dk);}
    });
    if(toToday.length>0)rawDispatch({type:'BULK_MOVE_TODOS',fromDates:toToday,toDate:today});
    Object.entries(toMonday).forEach(([mk,dates])=>rawDispatch({type:'BULK_MOVE_TODOS',fromDates:dates,toDate:mk}));
    localStorage.setItem('lastTodoAutoMove',today);
  },[rawDispatch]);
  // Cloud sync: load on mount (+ 생일→기념일 마이그레이션)
  useEffect(()=>{
    const doMigrate=(layers)=>{
      const hasBday=(layers||[]).some(l=>l.name==='생일');
      if(hasBday)rawDispatch({type:'MIGRATE_LAYER_NAME',from:'생일',to:'기념일'});
    };
    const{apiKey,binId}=cloudGetCreds();
    if(!apiKey||!binId){
      // 클라우드 미설정이면 저장 즉시 허용
      cloudLoadedRef.current=true;
      doMigrate(stateRef.current.customLayers);
      runTodoAutoMove(stateRef.current.todos);
      return;
    }
    cloudLoad(apiKey,binId).then(s=>{
      if(s){rawDispatch({type:'RESTORE_FULL',state:s});doMigrate(s.customLayers);runTodoAutoMove(s.todos||stateRef.current.todos);}
      else{doMigrate(stateRef.current.customLayers);runTodoAutoMove(stateRef.current.todos);}
      localStorage.setItem(CLOUD_STATUS,'ok');
    }).catch(()=>{
      localStorage.setItem(CLOUD_STATUS,'error');
      doMigrate(stateRef.current.customLayers);
      runTodoAutoMove(stateRef.current.todos);
    }).finally(()=>{
      // 로드 성공/실패 모두 완료 후 저장 허용
      cloudLoadedRef.current=true;
    });
  },[]);
  useEffect(()=>{
    const onKey=(e)=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){
        const t=e.target;
        if(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable)return;
        e.preventDefault();
        const hist=historyRef.current;
        if(hist.length===0)return;
        const prev=hist[hist.length-1];
        historyRef.current=hist.slice(0,-1);
        rawDispatch({type:'RESTORE_STATE',state:prev});
      }
    };
    document.addEventListener('keydown',onKey);
    return()=>document.removeEventListener('keydown',onKey);
  },[rawDispatch]);
  // ── Debounced localStorage (300ms) ──
  const lsTimerRef=useRef(null);
  useEffect(()=>{
    if(lsTimerRef.current)clearTimeout(lsTimerRef.current);
    lsTimerRef.current=setTimeout(()=>{
      const LS_KEYS=['workVisible','personalVisible','projects','monthlyHighlights','projectMemos',
        'weeklyEvents','todos','weekMemos','weeklyCollapsed','multiDayBlocks','outlookVisible','outlookColor',
        'customLayers','layerOrder','meetingNotes','stickyNotes','placedStickers','workLabel','personalLabel','workColor','personalColor',
        'titleText','topBarBg','topBarImg',
        'themeAccent','panelBg','panelImg','weeklyBg','monthlyBg','icalFeeds',
        'outlookUser','outlookClientId','outlookSyncedAt'];
      LS_KEYS.forEach(k=>lsSave(k,state[k]));
      // Also push to cloud if configured — cloudLoad 완료 후에만 실행
      const{apiKey,binId}=cloudGetCreds();
      if(apiKey&&binId&&cloudLoadedRef.current){
        cloudSave(apiKey,binId,state)
          .then(()=>localStorage.setItem(CLOUD_STATUS,'ok'))
          .catch(()=>localStorage.setItem(CLOUD_STATUS,'error'));
      }
    },300);
    return()=>{if(lsTimerRef.current)clearTimeout(lsTimerRef.current);};
  },[state]);
  // ── 테마 적용: 강조색·섹션 배경을 CSS 변수로 반영 ──
  useEffect(()=>{
    const hex=/^#[0-9a-fA-F]{6}$/.test(state.themeAccent||'')?state.themeAccent:'#B79C7A';
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    const mix=(v,t,a)=>Math.round(v+(t-v)*a);
    const toHex=(rr,gg,bb)=>'#'+[rr,gg,bb].map(v=>v.toString(16).padStart(2,'0')).join('');
    const st=document.documentElement.style;
    st.setProperty('--acc',hex);
    st.setProperty('--acc-strong',toHex(mix(r,0,0.25),mix(g,0,0.25),mix(b,0,0.25)));
    st.setProperty('--acc-bg',toHex(mix(r,255,0.86),mix(g,255,0.86),mix(b,255,0.86)));
    st.setProperty('--acc-soft',toHex(mix(r,255,0.93),mix(g,255,0.93),mix(b,255,0.93)));
    st.setProperty('--acc-brd',toHex(mix(r,255,0.62),mix(g,255,0.62),mix(b,255,0.62)));
    st.setProperty('--acc-rgb',r+','+g+','+b);
    st.setProperty('--w-bg',state.weeklyBg||'#fff');
    st.setProperty('--w-cell',state.weeklyBg||'#fff');
    st.setProperty('--m-bg',state.monthlyBg||'#fff');
    st.setProperty('--m-cell',state.monthlyBg||'#fff');
    st.setProperty('--p-bg',state.panelBg||'#FCFCFD');
    st.setProperty('--p-img',state.panelImg?('url("'+state.panelImg+'")'):'none');
  },[state.themeAccent,state.weeklyBg,state.monthlyBg,state.panelBg,state.panelImg]);
  return<StoreContext.Provider value={{state,dispatch}}>{children}</StoreContext.Provider>;
}
const useStore=()=>useContext(StoreContext);

const LayoutContext=React.createContext(null);
function useIsMobile(){const[m,setM]=React.useState(()=>window.innerWidth<768);React.useEffect(()=>{const h=()=>setM(window.innerWidth<768);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);return m;}
const useLayout=()=>useContext(LayoutContext);

// ─── TOAST SYSTEM ─────────────────────────────
const ToastContext=createContext(null);
function ToastProvider({children}){
  const[toasts,setToasts]=useState([]);
  const showToast=useCallback((message,type='success')=>{
    const id=Date.now();
    setToasts(t=>[...t.slice(-4),{id,message,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2800);
  },[]);
  const COLORS={success:{bg:'#1A1A1A',text:'#fff',dot:'#4ADE80'},error:{bg:'#E24B4A',text:'#fff',dot:'#FCA5A5'},info:{bg:'var(--acc)',text:'#fff',dot:'#A5B4FC'}};
  return(
    <ToastContext.Provider value={showToast}>
      {children}
      <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,display:'flex',flexDirection:'column',gap:6,pointerEvents:'none'}}>
        {toasts.map((t,i)=>{const c=COLORS[t.type]||COLORS.success;return(
          <div key={t.id} style={{display:'flex',alignItems:'center',gap:8,padding:'9px 14px',
            backgroundColor:c.bg,borderRadius:8,boxShadow:'0 4px 18px rgba(0,0,0,0.18)',
            fontSize:13,color:c.text,fontWeight:500,letterSpacing:'-0.1px',
            animation:'slideInToast 0.25s ease',whiteSpace:'nowrap',minWidth:180,maxWidth:320}}>
            <span style={{width:7,height:7,borderRadius:'50%',backgroundColor:c.dot,flexShrink:0}}/>
            <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis'}}>{t.message}</span>
          </div>
        );})}
      </div>
    </ToastContext.Provider>
  );
}
const useToast=()=>useContext(ToastContext);

// Dynamic CAT style based on customizable category colors
const useDynCatStyle=()=>{
  const{state}=useStore();
  const wc=state.workColor||'#B79C7A';
  const pc=state.personalColor||'#185FA5';
  const oc=state.outlookColor||'#BA7517';
  const base={
    work:{bg:lighten(wc,0.88),text:wc,border:lighten(wc,0.55),dot:wc},
    personal:{bg:lighten(pc,0.88),text:pc,border:lighten(pc,0.55),dot:pc},
    outlook:{bg:lighten(oc,0.88),text:oc,border:lighten(oc,0.55),dot:oc},
  };

// ─── FREE LAYER CONSTANTS ─────────────────────
const STICKY_COLORS=['#FFFDE7','#E3F2FD','#E8F5E9','#FCE4EC','#EDE7F6','#FFF3E0'];

function StickyNote({note,isActive,onUpdate,onDelete,onFocus,freeLayerVisible}){
  const isText=note.type==='text';
  const collapsed=isText?false:(note.collapsed||false);
  const fontSize=note.fontSize||(isText?15:13);
  const textColor=note.textColor||(isText?'#1A1A1A':'#333');
  const bgColor=isText?(note.bgColor||'transparent'):(note.color||STICKY_COLORS[0]);
  const edRef=React.useRef(null);
  const rootRef=React.useRef(null);
  const[hovered,setHovered]=React.useState(false);

  /* contentEditable 초기화 (plain text → HTML 마이그레이션) */
  React.useEffect(()=>{
    if(edRef.current){
      const h=(note.html!=null&&note.html!=='')?note.html:(note.text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
      if(edRef.current.innerHTML!==h)edRef.current.innerHTML=h;
    }
  },[collapsed]);
  const syncNote=()=>{const el=edRef.current;if(el)onUpdate({html:el.innerHTML,text:el.textContent||''});};
  const fmt=(cmd,val)=>{document.execCommand(cmd,false,val||null);edRef.current?.focus();syncNote();};

  /* 드래그 이동 */
  const startDrag=(e)=>{
    e.stopPropagation();e.preventDefault();
    const sx=e.clientX,sy=e.clientY,nx=note.x,ny=note.y;
    const onMove=(ev)=>onUpdate({x:nx+(ev.clientX-sx),y:ny+(ev.clientY-sy)});
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  };
  const onRootDown=(e)=>{
    onFocus?.();
    if(!freeLayerVisible)return;
    if(e.target.isContentEditable||e.target.tagName==='BUTTON'||e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
    rootRef.current&&rootRef.current.focus();
    startDrag(e);
  };
  /* 리사이즈: 텍스트박스는 가로만, 포스트잇은 양방향 */
  const onResizeStart=(e)=>{
    e.stopPropagation();e.preventDefault();
    const sx=e.clientX,sy=e.clientY,sw=note.w||170,sh=note.h||(isText?36:140);
    const onMove=(ev)=>{
      if(isText)onUpdate({w:Math.max(60,sw+(ev.clientX-sx)),h:Math.max(24,sh+(ev.clientY-sy))});
      else onUpdate({w:Math.max(120,sw+(ev.clientX-sx)),h:Math.max(60,sh+(ev.clientY-sy))});
    };
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  };

  const tbBtn={color:'#3F3E45',fontSize:11.5,background:'none',border:'none',minWidth:22,height:22,padding:'0 4px',borderRadius:5,cursor:'pointer',fontFamily:'inherit',lineHeight:1,display:'inline-flex',alignItems:'center',justifyContent:'center',flexShrink:0};
  const[openPicker,setOpenPicker]=React.useState(null);
  const SN_TEXT_COLORS=['#1A1A1A','var(--acc)','#1B7FDB','#2FAE60','#E8792B','#E24B4A','#8B5CF6','#96969E','#fff'];
  const SN_HL_COLORS=['#FFF176','#CCFF90','#FFB3C6','#80DEEA','#FFCC80','#CF9FFF'];
  const SN_BG_COLORS=isText?['transparent','#FFFDE7','#FFF3E0','#E3F2FD','#E8F5E9','#FCE4EC','#EDE7F6','#F1EAFE','#1F1F29']:STICKY_COLORS;
  const applySel=(cmd,val,fallback)=>{
    const sel=window.getSelection();
    const has=sel&&!sel.isCollapsed&&edRef.current&&edRef.current.contains(sel.anchorNode);
    if(has){document.execCommand(cmd,false,val);syncNote();}
    else if(fallback)fallback();
  };

  return(
    <div ref={rootRef} data-sticky-note="true" tabIndex={0}
      className={isText?'txt-note':''}
      onKeyDown={e=>{if((e.key==='Delete'||e.key==='Backspace')&&isActive&&e.target===e.currentTarget){e.preventDefault();e.stopPropagation();onDelete();}}}
      onMouseDown={onRootDown}
      onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
      style={{position:'absolute',left:note.x,top:note.y,
        width:note.w||170,
        height:collapsed?(isActive?26:22):(isText?(note.h||'auto'):undefined),
        minHeight:collapsed?undefined:(isText?Math.round(fontSize*1.6)+6:(note.h||140)),
        backgroundColor:bgColor,
        borderRadius:isText?3:6,
        boxShadow:isText?'none':(isActive?'0 4px 20px rgba(0,0,0,0.18)':'0 2px 10px rgba(0,0,0,0.11)'),
        border:isText?(isActive?'1px solid var(--acc-brd)':'1px solid transparent'):'0.5px solid rgba(0,0,0,0.07)',
        padding:collapsed?'2px 8px':(isText?'2px 5px':'8px 10px'),
        cursor:freeLayerVisible?(isActive?'default':'grab'):'default',
        pointerEvents:'all',
        userSelect:'none',display:'flex',flexDirection:'column',
        overflow:isText?'visible':'hidden',
        zIndex:isActive?50:30,outline:'none',
        transition:'box-shadow 0.15s,border-color 0.15s'}}>
      {(hovered||isActive)&&freeLayerVisible&&(
        <button title="삭제" onMouseDown={e=>e.stopPropagation()}
          onClick={e=>{e.stopPropagation();onDelete();}}
          style={{position:'absolute',top:4,right:4,width:18,height:18,borderRadius:'50%',
            backgroundColor:'#E24B4A',color:'#fff',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',
            border:'2px solid #fff',boxShadow:'0 2px 6px rgba(0,0,0,0.3)',zIndex:80,lineHeight:1,padding:0,cursor:'pointer'}}>×</button>
      )}

      {/* ── 플로팅 서식 툴바 (선택 시, Miro 스타일) ── */}
      {isActive&&freeLayerVisible&&!collapsed&&(
        <div onMouseDown={e=>e.stopPropagation()}
          style={{position:'absolute',top:openPicker?-62:-36,left:-1,display:'flex',flexDirection:'column',gap:1,
            padding:'3px 4px',backgroundColor:'#fff',border:'0.5px solid #E4E4EA',borderRadius:8,
            boxShadow:'0 0 0 0.5px rgba(15,15,35,0.04), 0 6px 18px rgba(15,15,35,0.14)',zIndex:70,whiteSpace:'nowrap'}}>
          <div style={{display:'flex',alignItems:'center',gap:1}}>
            <span title="드래그하여 이동" onMouseDown={startDrag}
              style={{cursor:'grab',color:'#B0B0B8',fontSize:11,padding:'0 5px',userSelect:'none',lineHeight:1}}>⠿</span>
            <div style={{width:1,height:14,backgroundColor:'#ECECF1',margin:'0 2px'}}/>
            <button className="fmt-btn" title="굵게" onMouseDown={e=>{e.preventDefault();fmt('bold');}} style={{...tbBtn,fontWeight:700}}>B</button>
            <button className="fmt-btn" title="기울임" onMouseDown={e=>{e.preventDefault();fmt('italic');}} style={{...tbBtn,fontStyle:'italic',fontFamily:'Georgia,serif'}}>i</button>
            <button className="fmt-btn" title="밑줄" onMouseDown={e=>{e.preventDefault();fmt('underline');}} style={{...tbBtn,textDecoration:'underline'}}>U</button>
            <button className="fmt-btn" title="취소선" onMouseDown={e=>{e.preventDefault();fmt('strikeThrough');}} style={{...tbBtn,textDecoration:'line-through'}}>S</button>
            <button className="fmt-btn" title="글머리 기호" onMouseDown={e=>{e.preventDefault();fmt('insertUnorderedList');}} style={tbBtn}>•</button>
            <div style={{width:1,height:14,backgroundColor:'#ECECF1',margin:'0 2px'}}/>
            <button className="fmt-btn" title="글자색 (드래그한 부분 또는 전체)" onMouseDown={e=>{e.preventDefault();setOpenPicker(p=>p==='fore'?null:'fore');}}
              style={{...tbBtn,flexDirection:'column',gap:1.5,backgroundColor:openPicker==='fore'?'#F1F1F5':'transparent'}}>
              <span style={{lineHeight:1,fontSize:10.5,fontWeight:700}}>A</span>
              <span style={{width:11,height:3,borderRadius:1.5,backgroundColor:textColor==='#fff'?'#C8C8D0':textColor,display:'block'}}/>
            </button>
            <button className="fmt-btn" title="마커 (드래그한 부분 색칠)" onMouseDown={e=>{e.preventDefault();setOpenPicker(p=>p==='hl'?null:'hl');}}
              style={{...tbBtn,backgroundColor:openPicker==='hl'?'#F1F1F5':'transparent'}}>
              <span style={{width:12,height:12,borderRadius:3,background:'linear-gradient(135deg,#FFF176 50%,#80DEEA 50%)',display:'block',boxShadow:'inset 0 0 0 0.5px rgba(0,0,0,0.12)'}}/>
            </button>
            <button className="fmt-btn" title="박스 배경색" onMouseDown={e=>{e.preventDefault();setOpenPicker(p=>p==='bg'?null:'bg');}}
              style={{...tbBtn,backgroundColor:openPicker==='bg'?'#F1F1F5':'transparent'}}>
              <span style={{width:12,height:12,borderRadius:3,backgroundColor:bgColor==='transparent'?'#fff':bgColor,border:bgColor==='transparent'?'1px dashed #C8C8D0':'none',display:'block',boxShadow:'inset 0 0 0 0.5px rgba(0,0,0,0.12)'}}/>
            </button>
            <div style={{width:1,height:14,backgroundColor:'#ECECF1',margin:'0 2px'}}/>
            <button className="fmt-btn" title="글자 작게" onMouseDown={e=>{e.preventDefault();onUpdate({fontSize:Math.max(9,fontSize-1)});}} style={{...tbBtn,fontSize:10}}>A−</button>
            <button className="fmt-btn" title="글자 크게" onMouseDown={e=>{e.preventDefault();onUpdate({fontSize:Math.min(48,fontSize+1)});}} style={{...tbBtn,fontSize:12.5}}>A+</button>
            <div style={{width:1,height:14,backgroundColor:'#ECECF1',margin:'0 2px'}}/>
            {!isText&&(
              <button className="fmt-btn" title="접기" onMouseDown={e=>{e.preventDefault();onUpdate({collapsed:!collapsed});}} style={{...tbBtn,fontSize:9}}>▲</button>
            )}
            <button className="fmt-btn" title="삭제" onMouseDown={e=>{e.preventDefault();onDelete();}} style={{...tbBtn,color:'#C94B4A',fontSize:13}}>×</button>
          </div>
          {openPicker&&(
            <div style={{display:'flex',alignItems:'center',gap:3,padding:'3px 3px 1px',borderTop:'0.5px solid #F0F0F3'}}>
              {openPicker==='fore'&&SN_TEXT_COLORS.map(c=>(
                <button key={c} onMouseDown={e=>{e.preventDefault();applySel('foreColor',c,()=>onUpdate({textColor:c}));}}
                  style={{width:17,height:17,borderRadius:'50%',border:'none',cursor:'pointer',padding:0,backgroundColor:c,flexShrink:0,
                    boxShadow:c==='#fff'?'inset 0 0 0 1px #D6D6DE':'inset 0 0 0 0.5px rgba(0,0,0,0.14)'}}/>
              ))}
              {openPicker==='hl'&&(<>
                {SN_HL_COLORS.map(c=>(
                  <button key={c} title="드래그한 텍스트에 마커" onMouseDown={e=>{e.preventDefault();applySel('backColor',c,null);}}
                    style={{width:17,height:17,borderRadius:4,border:'none',cursor:'pointer',padding:0,backgroundColor:c,flexShrink:0,boxShadow:'inset 0 0 0 0.5px rgba(0,0,0,0.12)'}}/>
                ))}
                <button title="마커 제거" onMouseDown={e=>{e.preventDefault();applySel('backColor','rgba(0,0,0,0)',null);}}
                  style={{width:17,height:17,borderRadius:4,border:'none',cursor:'pointer',padding:0,backgroundColor:'#fff',boxShadow:'inset 0 0 0 1px #D6D6DE',fontSize:8,color:'#96969E',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>✕</button>
                <span style={{fontSize:9,color:'#A8A8B0',paddingLeft:2}}>드래그한 부분에 적용</span>
              </>)}
              {openPicker==='bg'&&SN_BG_COLORS.map(c=>(
                <button key={c} onMouseDown={e=>{e.preventDefault();onUpdate(isText?{bgColor:c}:{color:c});}}
                  style={{width:17,height:17,borderRadius:4,cursor:'pointer',padding:0,flexShrink:0,
                    backgroundColor:c==='transparent'?'#fff':c,
                    border:c==='transparent'?'1px dashed #C8C8D0':'none',
                    boxShadow:c==='transparent'?'none':'inset 0 0 0 0.5px rgba(0,0,0,0.10)'}}/>
              ))}
            </div>
          )}
        </div>
      )}
      {/* 접힘 상태 툴바 */}
      {isActive&&collapsed&&(
        <div onMouseDown={e=>e.stopPropagation()}
          style={{position:'absolute',top:-32,left:-1,display:'flex',alignItems:'center',gap:1,padding:'2px 3px',
            backgroundColor:'#fff',border:'0.5px solid #E4E4EA',borderRadius:7,
            boxShadow:'0 4px 14px rgba(15,15,35,0.12)',zIndex:70}}>
          <button className="fmt-btn" title="펼치기" onMouseDown={e=>{e.preventDefault();onUpdate({collapsed:false});}} style={{...tbBtn,fontSize:9}}>▼</button>
          <button className="fmt-btn" title="삭제" onMouseDown={e=>{e.preventDefault();onDelete();}} style={{...tbBtn,color:'#C94B4A',fontSize:13}}>×</button>
        </div>
      )}

      {/* ── 본문 (리치 텍스트) ── */}
      {!collapsed&&(
        <div ref={edRef} contentEditable={freeLayerVisible} suppressContentEditableWarning
          className="note-editor"
          data-placeholder={isText?'텍스트 입력':'메모 입력...'}
          spellCheck={false}
          onMouseDown={e=>{e.stopPropagation();if(!freeLayerVisible)return;if(!isActive){e.preventDefault();onFocus?.();rootRef.current&&rootRef.current.focus();startDrag(e);}}}
          onFocus={()=>onFocus?.()}
          onInput={syncNote}
          onBlur={syncNote}
          style={{flex:1,minHeight:isText?Math.round(fontSize*1.5):80,
            fontSize,color:textColor,
            outline:'none',cursor:'text',lineHeight:1.55,fontFamily:'inherit',
            fontWeight:isText?500:400,padding:0,wordBreak:'break-word',whiteSpace:'pre-wrap',userSelect:'text'}}/>
      )}
      {collapsed&&<span style={{fontSize:11,color:textColor,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,opacity:0.7}}>
        {note.text||'(빈 노트)'}
      </span>}

      {/* ── 작성일 (포스트잇만) ── */}
      {!isText&&!collapsed&&note.createdAt&&(
        <div style={{fontSize:7,color:'rgba(0,0,0,0.25)',textAlign:'right',flexShrink:0,
          marginTop:'auto',paddingTop:2,lineHeight:1.4,letterSpacing:'0.2px'}}>
          {(()=>{const d=new Date(note.createdAt);const yy=String(d.getFullYear()).slice(2);const mm=String(d.getMonth()+1).padStart(2,'0');const dd=String(d.getDate()).padStart(2,'0');const hh=String(d.getHours()).padStart(2,'0');const mi=String(d.getMinutes()).padStart(2,'0');return`'${yy}.${mm}.${dd} ${hh}:${mi}`;})()}
        </div>
      )}
      {/* ── 리사이즈 핸들 ── */}
      {freeLayerVisible&&!collapsed&&isActive&&(
        <div onMouseDown={onResizeStart}
          style={{position:'absolute',right:-4,bottom:-4,width:16,height:16,cursor:'se-resize',
            display:'flex',alignItems:'center',justifyContent:'center',zIndex:60}}
          onClick={e=>e.stopPropagation()}>
          <div style={{width:9,height:9,borderRadius:2.5,backgroundColor:'var(--acc-brd)',border:'1.5px solid #fff',boxShadow:'0 1px 3px rgba(15,15,35,0.25)'}}/>
        </div>
      )}
    </div>
  );
}

// StickyNotesCanvas: renders inside CalendarSection
function StickyNotesCanvas(){
  const{state,dispatch}=useStore();
  const{freeLayerVisible,calendarScrollRef,activeNoteId,setActiveNoteId,centerTab}=useLayout();
  const curView=centerTab||'monthly';

  // Deactivate note when clicking outside any note
  useEffect(()=>{
    const h=(e)=>{if(!e.target.closest('[data-sticky-note]')&&!e.target.closest('[data-free-note-panel]'))setActiveNoteId(null);};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[setActiveNoteId]);

  useEffect(()=>{
    const h=(e)=>{
      if((e.key==='Delete'||e.key==='Backspace')&&activeNoteId){
        const t=e.target;
        if(t.tagName==='TEXTAREA'||t.tagName==='INPUT'||t.isContentEditable)return;
        e.preventDefault();
        dispatch({type:'DELETE_STICKY_NOTE',id:activeNoteId});
        setActiveNoteId(null);
      }
    };
    document.addEventListener('keydown',h);
    return()=>document.removeEventListener('keydown',h);
  },[activeNoteId,dispatch,setActiveNoteId]);

  const handleDblClick=useCallback((e)=>{
    if(!freeLayerVisible)return;
    if(e.target!==e.currentTarget)return;
    const container=calendarScrollRef?.current;
    if(!container)return;
    const rect=container.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const y=container.scrollTop+(e.clientY-rect.top);
    const newId='n'+Date.now();
    dispatch({type:'ADD_STICKY_NOTE',note:{id:newId,x,y,w:170,h:140,text:'',color:STICKY_COLORS[0],type:'sticky',view:curView,createdAt:new Date().toISOString()}});
    setActiveNoteId(newId);
  },[freeLayerVisible,calendarScrollRef,dispatch]);

  return(
    <div onDoubleClick={handleDblClick}
      style={{position:'absolute',top:0,left:0,right:0,bottom:0,minHeight:'100%',
        pointerEvents:freeLayerVisible?'all':'none',
        visibility:freeLayerVisible?'visible':'hidden',
        cursor:'default',
        zIndex:20}}>
      {(state.stickyNotes||[]).filter(n=>(n.view||'monthly')===curView).map(note=>(
        <StickyNote
          key={note.id}
          note={note}
          isActive={activeNoteId===note.id}
          freeLayerVisible={freeLayerVisible}
          onFocus={()=>setActiveNoteId(note.id)}
          onUpdate={updates=>dispatch({type:'UPDATE_STICKY_NOTE',id:note.id,updates})}
          onDelete={()=>{dispatch({type:'DELETE_STICKY_NOTE',id:note.id});setActiveNoteId(null);}}
        />
      ))}
    </div>
  );
}

const FACE_STICKERS=[
  {id:'f-happy', emoji:'😊'},
  {id:'f-laugh', emoji:'😆'},
  {id:'f-cry',   emoji:'😭'},
  {id:'f-angry', emoji:'😡'},
  {id:'f-cool',  emoji:'😎'},

  {id:'f-wink',  emoji:'😉'},
  {id:'f-party', emoji:'🥳'},
  {id:'f-smirk', emoji:'😏'},
  {id:'f-nerd',  emoji:'🤓'},
  {id:'f-star',  emoji:'🤩'},
  {id:'f-sick',  emoji:'🤒'},
  {id:'f-hug',   emoji:'🥰'},
];

function PlacedSticker({sticker,freeLayerVisible,selectedId,setSelectedId}){
  const[hovered,setHovered]=React.useState(false);
  const{dispatch}=useStore();
  const ref=useRef(null);
  const isSelected=selectedId===sticker.id;
  const size=sticker.size||44;
  const rotation=sticker.rotation||0;

  // Delete key when selected
  useEffect(()=>{
    if(!isSelected)return;
    const onKey=(e)=>{
      if(e.key==='Delete'||e.key==='Backspace'){
        const t=e.target;
        if(t&&(t.tagName==='TEXTAREA'||t.tagName==='INPUT'||t.isContentEditable))return;
        e.preventDefault();
        dispatch({type:'DELETE_PLACED_STICKER',id:sticker.id});
        setSelectedId(null);
      }
    };
    document.addEventListener('keydown',onKey);
    return()=>document.removeEventListener('keydown',onKey);
  },[isSelected,sticker.id,dispatch,setSelectedId]);

  // Drag to move body
  const onBodyMouseDown=useCallback((e)=>{
    if(!freeLayerVisible)return;
    e.stopPropagation();e.preventDefault();
    setSelectedId(sticker.id);
    const startX=e.clientX,startY=e.clientY,ox=sticker.x,oy=sticker.y;
    const onMove=(ev)=>dispatch({type:'UPDATE_PLACED_STICKER',id:sticker.id,updates:{x:ox+(ev.clientX-startX),y:oy+(ev.clientY-startY)}});
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  },[freeLayerVisible,sticker.id,sticker.x,sticker.y,dispatch,setSelectedId]);

  // Resize handle (bottom-right drag)
  const onResizeMouseDown=useCallback((e)=>{
    e.stopPropagation();e.preventDefault();
    const startX=e.clientX,startSz=size;
    const onMove=(ev)=>{
      const ns=Math.max(20,Math.min(200,startSz+(ev.clientX-startX)));
      dispatch({type:'UPDATE_PLACED_STICKER',id:sticker.id,updates:{size:ns}});
    };
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  },[sticker.id,size,dispatch]);

  // Rotation handle (top-center drag)
  const onRotateMouseDown=useCallback((e)=>{
    e.stopPropagation();e.preventDefault();
    const rect=ref.current.getBoundingClientRect();
    const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
    const startAngle=Math.atan2(e.clientY-cy,e.clientX-cx)*(180/Math.PI);
    const startRot=rotation;
    const onMove=(ev)=>{
      const angle=Math.atan2(ev.clientY-cy,ev.clientX-cx)*(180/Math.PI);
      dispatch({type:'UPDATE_PLACED_STICKER',id:sticker.id,updates:{rotation:startRot+(angle-startAngle)}});
    };
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  },[sticker.id,rotation,dispatch]);

  const shapeDef=SHAPE_STICKERS.find(s=>s.id===sticker.content);
  const arrowDef=sticker.type==='arrow_svg'?ARROW_SVG_STICKERS.find(s=>s.id===sticker.content):null;
  const sketchDef=sticker.type==='sketch'?SKETCH_STICKERS.find(s=>s.id===sticker.content):null;
  const faceEmoji=sticker.type==='face'?FACE_STICKERS.find(s=>s.id===sticker.content)?.emoji:null;
  const slongDef=sticker.type==='slong'?SLONG_STICKERS.find(s=>s.id===sticker.content):null;

  return(
    <div ref={ref} onMouseDown={onBodyMouseDown}
      onClick={(e)=>{e.stopPropagation();if(freeLayerVisible)setSelectedId(sticker.id);}}
      onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
      style={{position:'absolute',left:sticker.x,top:sticker.y,width:size,height:size,
        transform:`rotate(${rotation}deg)`,
        cursor:freeLayerVisible?'grab':'default',
        userSelect:'none',pointerEvents:freeLayerVisible?'all':'none',
        zIndex:isSelected?26:22,
        outline:isSelected?'2px solid var(--acc)':'none',
        outlineOffset:2,borderRadius:4,
        boxShadow:isSelected?'0 0 0 4px rgba(var(--acc-rgb),0.12)':'none',
        transition:'box-shadow 0.1s'}}>
      {sticker.type==='shape'?(
        <div style={{width:'100%',height:'100%'}}>{shapeDef&&shapeDef.render()}</div>
      ):sticker.type==='arrow_svg'?(
        <div style={{width:'100%',height:'100%'}}>{arrowDef&&arrowDef.render()}</div>
      ):sticker.type==='sketch'?(
        <div style={{width:'100%',height:'100%'}}>{sketchDef&&sketchDef.render()}</div>
      ):sticker.type==='slong'?(
        <img src={slongDef?slongDef.src:''} alt="" draggable={false} style={{width:'100%',height:'100%',objectFit:'contain',pointerEvents:'none'}}/>
      ):(
        <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:size*0.8,lineHeight:1,textAlign:'center'}}>

function IdeaPageModal({initialNote,onClose}){

    const seen={};const arr=[];
    state.ideaNotes.forEach(n=>{const t=n.tag||'미분류';if(!seen[t]){seen[t]=1;arr.push(t);}});
    return arr;
  },[state.ideaNotes]);
  const save=()=>{
    const upd={...note,updatedAt:new Date().toISOString()};
    if(isNew)dispatch({type:'ADD_IDEA_PAGE',note:upd});

  React.useEffect(()=>{if(initialSnapRef.current===null)initialSnapRef.current=JSON.stringify(note);},[]);
  const tryClose=()=>{
    const dirty=initialSnapRef.current!==null&&JSON.stringify(note)!==initialSnapRef.current;
    if(!dirty||confirm('저장하지 않은 변경사항이 있습니다. 닫을까요?'))onClose();

  React.useEffect(()=>{
    const h=(e)=>{

/* ─── Layer context menu (right-click on any layer chip) ─── */
function LayerCtxMenu({menu,onClose,dispatch,workLabel,workColor,personalLabel,personalColor,outlookColor,customLayers}){
  const isCustom=menu.type==='custom';
  const isOutlook=menu.type==='outlook';
  const layer=isCustom?(customLayers||[]).find(l=>l.id===menu.id):null;
  const initName=menu.type==='work'?workLabel:menu.type==='personal'?personalLabel:layer?.name||'';
  const initColor=menu.type==='work'?workColor:menu.type==='personal'?personalColor:isOutlook?(outlookColor||'#BA7517'):layer?.color||PROJECT_COLORS[0];
  const[name,setName]=React.useState(initName);
  const[color,setColor]=React.useState(initColor);
  const save=()=>{
    if(menu.type==='work')dispatch({type:'UPDATE_WORK_CAT',label:name.trim()||undefined,color});
    else if(menu.type==='personal')dispatch({type:'UPDATE_PERSONAL_CAT',label:name.trim()||undefined,color});
    else if(isOutlook)dispatch({type:'SET_OUTLOOK_COLOR',color});
    else if(isCustom)dispatch({type:'UPDATE_CUSTOM_LAYER',id:menu.id,updates:{name:name.trim()||layer.name,color}});
    onClose();
  };
  const del=()=>{if(isCustom&&confirm(`'${layer?.name}' 레이어를 삭제하시겠습니까?`)){dispatch({type:'DELETE_CUSTOM_LAYER',id:menu.id});onClose();}};
  React.useEffect(()=>{
    const onKey=e=>{if(e.key==='Escape')onClose();};
    const onOut=e=>{if(!e.target.closest('[data-layer-ctx]'))onClose();};
    setTimeout(()=>{document.addEventListener('mousedown',onOut);document.addEventListener('keydown',onKey);},0);
    return()=>{document.removeEventListener('mousedown',onOut);document.removeEventListener('keydown',onKey);};
  },[]);
  const mx=Math.min(menu.x,window.innerWidth-220);
  const my=Math.min(menu.y+4,window.innerHeight-240);
  return(
    <div data-layer-ctx="true" style={{position:'fixed',top:my,left:mx,backgroundColor:'#fff',
      border:'0.5px solid #E0E0E0',borderRadius:10,padding:'12px 14px',
      boxShadow:'0 8px 28px rgba(0,0,0,0.15)',zIndex:5000,minWidth:190,
      display:'flex',flexDirection:'column',gap:10}}>
      <div style={{fontSize:11,color:'#888',fontWeight:600,letterSpacing:'0.2px',textTransform:'uppercase'}}>
        {menu.type==='work'?'업무 레이어':menu.type==='personal'?'개인 레이어':menu.type==='outlook'?'아웃룩 레이어':'커스텀 레이어'}
      </div>
      {!isOutlook&&(
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{width:12,height:12,borderRadius:'50%',backgroundColor:color,flexShrink:0,border:'1.5px solid rgba(0,0,0,0.12)'}}/>
          <input autoFocus value={name} onChange={e=>setName(e.target.value)}

// ═══ iCal(ICS) 캘린더 구독 ═══
const _icHash=(s)=>{let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))>>>0;return h.toString(36);};
function parseICS(text,lo,hi){
  const lines=text.replace(/\r\n[ \t]/g,'').replace(/\n[ \t]/g,'').split(/\r?\n/);
  const evs=[];let cur=null;
  for(const ln of lines){
    if(ln==='BEGIN:VEVENT'){cur={};continue;}
    if(ln==='END:VEVENT'){if(cur)evs.push(cur);cur=null;continue;}
    if(!cur)continue;
    const ci=ln.indexOf(':');if(ci<0)continue;
    const key=ln.slice(0,ci),val=ln.slice(ci+1),k=key.split(';')[0];
    if(k==='SUMMARY')cur.summary=val.replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\n/g,' ');
    else if(k==='DTSTART'){cur.dt=val;cur.allDay=key.indexOf('VALUE=DATE')>-1&&val.length===8;}
    else if(k==='RRULE')cur.rrule=val;
    else if(k==='UID')cur.uid=val;
    else if(k==='STATUS')cur.status=val;
  }
  const pad=(x)=>String(x).padStart(2,'0');
  const addD=(iso,k)=>{const t=new Date(iso+'T12:00:00Z');t.setUTCDate(t.getUTCDate()+k);return t.toISOString().slice(0,10);};
  const dow=(iso)=>new Date(iso+'T12:00:00Z').getUTCDay();
  const BY={SU:0,MO:1,TU:2,WE:3,TH:4,FR:5,SA:6};
  const out=[];
  for(const e of evs){
    if(!e.dt||!e.summary||e.status==='CANCELLED')continue;
    let date,time=null;
    if(e.allDay){date=e.dt.slice(0,4)+'-'+e.dt.slice(4,6)+'-'+e.dt.slice(6,8);}
    else{
      const y=+e.dt.slice(0,4),mo=+e.dt.slice(4,6),d=+e.dt.slice(6,8),h=+e.dt.slice(9,11)||0,mi=+e.dt.slice(11,13)||0;
      if(e.dt.slice(-1)==='Z'){const t=new Date(Date.UTC(y,mo-1,d,h,mi)+9*3600e3);date=t.toISOString().slice(0,10);time=pad(t.getUTCHours())+':'+pad(t.getUTCMinutes());}
      else{date=y+'-'+pad(mo)+'-'+pad(d);time=pad(h)+':'+pad(mi);}
    }
    const dates=[];
    if(e.rrule){
      const fr=(e.rrule.match(/FREQ=(\w+)/)||[])[1];
      const until=(e.rrule.match(/UNTIL=(\d{8})/)||[])[1];
      const end=until?[until.slice(0,4),until.slice(4,6),until.slice(6,8)].join('-'):hi;
      const stop=end<hi?end:hi;
      const from=date>lo?date:lo;
      if(fr==='WEEKLY'){
        const bydayM=(e.rrule.match(/BYDAY=([A-Z,]+)/)||[])[1];
        const days=bydayM?bydayM.split(',').map(x=>BY[x]).filter(x=>x!==undefined):[dow(date)];
        for(let cd=from;cd<=stop;cd=addD(cd,1)){if(days.indexOf(dow(cd))>-1)dates.push(cd);}
      }else if(fr==='DAILY'){for(let cd=from;cd<=stop;cd=addD(cd,1))dates.push(cd);}
      else if(fr==='YEARLY'){const mmdd=date.slice(5);for(let y2=+lo.slice(0,4);y2<=+hi.slice(0,4);y2++){const s=y2+'-'+mmdd;if(s>=from&&s<=stop)dates.push(s);}}
      else if(fr==='MONTHLY'){const dd=date.slice(8);let cd=lo.slice(0,7);for(let k=0;k<26;k++){const s=cd+'-'+dd;if(s>stop)break;if(s>=from)dates.push(s);let y2=+cd.slice(0,4),m2=+cd.slice(5,7)+1;if(m2>12){m2=1;y2++;}cd=y2+'-'+pad(m2);}}
      else if(date>=lo&&date<=hi)dates.push(date);
    }else if(date>=lo&&date<=hi)dates.push(date);
    for(const dt of dates)out.push({date:dt,time,title:e.summary,uid:(e.uid||e.summary)+'_'+dt});
  }
  return out;
}
async function icalFetchIcsText(url){
  const tries=[url,'https://corsproxy.io/?url='+encodeURIComponent(url),'https://api.allorigins.win/raw?url='+encodeURIComponent(url)];
  let lastErr=null;
  for(const u of tries){
    try{
      const res=await fetch(u);
      if(!res.ok)throw new Error('HTTP '+res.status);
      const t=await res.text();
      if(t.indexOf('BEGIN:VCALENDAR')<0)throw new Error('ICS 형식이 아님');
      return t;
    }catch(e2){lastErr=e2;}
  }
  throw(lastErr||new Error('가져오기 실패'));
}

            if(dragIdx<0||overIdx<0||dragIdx===overIdx)return 0;

function MonthlyHighlights(){
  const{state,dispatch}=useStore();const{monthlyHighlights,projects,hlYear,hlMonth}=state;

  const goNextHl=()=>{if(hlMonth===11)dispatch({type:'SET_HL_MONTH',hlYear:hlYear+1,hlMonth:0});else dispatch({type:'SET_HL_MONTH',hlYear,hlMonth:hlMonth+1});};
  const getProject=id=>projects.find(p=>p.id===id)||null;
  const currentYM=`${hlYear}-${String(hlMonth+1).padStart(2,'0')}`;

        </div>
        <button onClick={()=>dispatch({type:'ADD_HIGHLIGHT',yearMonth:currentYM})} style={{fontSize:11,color:'#96969E',padding:'1px 5px',borderRadius:3,border:'0.5px solid #E4E4E4',lineHeight:1.6}} onMouseEnter={e=>{e.currentTarget.style.color='var(--acc)';e.currentTarget.style.borderColor='var(--acc-brd)';}} onMouseLeave={e=>{e.currentTarget.style.color='#96969E';e.currentTarget.style.borderColor='#E4E4E4';}}>+ 추가</button>

    </section>
  );
}
function MemoItem({memo,projectId,projectColor,memoIdx,memoCount,dispatch}){
  const[editTitle,setEditTitle]=useState(false);
  const[titleVal,setTitleVal]=useState(memo.title);
  const[bodyFocus,setBodyFocus]=useState(false);
  const[hovered,setHovered]=useState(false);
  const[memoDragOver,setMemoDragOver]=useState(false);
  const[selBar,setSelBar]=useState(null);
  const editorRef=React.useRef(null);
  // Init contentEditable when expanded — migrate plain text → HTML
  React.useEffect(()=>{
    if(editorRef.current&&!memo.collapsed){
      const b=memo.body||'';
      if(!b.includes('<')){
        editorRef.current.innerHTML=b.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
      }else{
        editorRef.current.innerHTML=b;
      }
    }
  },[memo.collapsed]);
  const save=()=>{if(editorRef.current)dispatch({type:'UPDATE_MEMO',projectId,id:memo.id,updates:{body:editorRef.current.innerHTML}});};
  const checkSel=()=>{
    const sel=window.getSelection();
    if(sel&&sel.toString().length>0&&editorRef.current?.contains(sel.anchorNode)){
      const rect=sel.getRangeAt(0).getBoundingClientRect();
      setSelBar({x:rect.left+rect.width/2,y:rect.top-6});
    }else setSelBar(null);

function AgendaDayGroup({dateKey,events,label,isToday,catStyle,catLabel}){
  const{dispatch}=useStore();
  const[dragId,setDragId]=useState(null);
  const[overId,setOverId]=useState(null);
  const onDrop=(targetId)=>{
    if(!dragId||dragId===targetId){setDragId(null);setOverId(null);return;}
    const arr=events.slice();
    const fi=arr.findIndex(e=>e.id===dragId),ti=arr.findIndex(e=>e.id===targetId);
    if(fi>=0&&ti>=0){const[item]=arr.splice(fi,1);arr.splice(ti,0,item);dispatch({type:'SET_AGENDA_ORDER',date:dateKey,order:arr.map(e=>e.id)});}
    setDragId(null);setOverId(null);
  };
  return(
    <div style={{marginBottom:8}}>
      <div style={{fontSize:10.5,fontWeight:700,color:isToday?'var(--acc)':'#B0B0B6',marginBottom:3,letterSpacing:'0.2px'}}>{label}</div>
      {events.length===0
        ?<div style={{fontSize:11,color:'#D5D5D8',paddingLeft:16}}>일정 없음</div>
        :events.map(ev=><AgendaEventRow key={ev.id} ev={ev} catLabel={catLabel} dragId={dragId} overId={overId}
            onDragStart={setDragId} onDragEnd={()=>{setDragId(null);setOverId(null);}}
            onDragOver={setOverId} onDrop={onDrop} catStyle={catStyle}/>)}
    </div>
  );
}
function WeeklyAgenda(){
  const{state}=useStore();
  const catStyle=useDynCatStyle();
  const projById=React.useMemo(()=>Object.fromEntries((state.projects||[]).map(p=>[p.id,p])),[state.projects]);
  const visOk=(e)=>{
    if(e.category==='work')return state.workVisible;
    if(e.category==='personal')return state.personalVisible;
    if(e.isOutlook)return state.outlookVisible!==false;
    const cl=(state.customLayers||[]).find(l=>l.id===e.category);
    if(cl)return cl.visible!==false;
    return true;
  };
  const days=React.useMemo(()=>{
    const today=new Date();today.setHours(12,0,0,0);
    const dowKr=['일','월','화','수','목','금','토'];
    const arr=[];
    for(let i=0;i<7;i++){
      const d=new Date(today);d.setDate(today.getDate()+i);
      const k=toDateKey(d);
      const label=i===0?'오늘':i===1?`내일 · ${d.getMonth()+1}/${d.getDate()} ${dowKr[d.getDay()]}`:`${d.getMonth()+1}/${d.getDate()} ${dowKr[d.getDay()]}`;
      let evs=(state.weeklyEvents||[]).filter(e=>e.date===k&&visOk(e)).map(e=>({...e,projectColor:e.projectId&&projById[e.projectId]?projById[e.projectId].color:null}));
      const order=state.leftAgendaOrder[k];
      if(order&&order.length){
        const byId=Object.fromEntries(evs.map(e=>[e.id,e]));
        const ordered=order.filter(id=>byId[id]).map(id=>byId[id]);
        const rest=evs.filter(e=>!order.includes(e.id)).sort((a,b)=>(a.time||'99').localeCompare(b.time||'99'));
        evs=[...ordered,...rest];
      } else evs.sort((a,b)=>(a.time||'99').localeCompare(b.time||'99'));
      arr.push({k,label,evs,isToday:i===0});
    }
    return arr;
  },[state.weeklyEvents,state.leftAgendaOrder,state.workVisible,state.personalVisible,state.outlookVisible,state.customLayers,projById]);
  const visibleDays=days.filter((d,i)=>i===0||d.evs.length>0);
  const catLabel=(cat)=>{
    if(cat==='work')return state.workLabel||'업무';
    if(cat==='personal')return state.personalLabel||'개인';
    if(cat==='outlook')return '아웃룩';
    const cl=(state.customLayers||[]).find(l=>l.id===cat);return cl?.name||cat;
  };
  return(
    <div style={{marginBottom:16,paddingBottom:10,borderBottom:'0.5px solid #EEEEF1'}}>
      <div style={{marginBottom:6}}>
        <span style={{fontSize:11,color:'#7BA88B',letterSpacing:'1px',textTransform:'uppercase',fontWeight:700}}>주간 일정</span>
      </div>
      {visibleDays.map(d=><AgendaDayGroup key={d.k} dateKey={d.k} events={d.evs} label={d.label} isToday={d.isToday} catStyle={catStyle} catLabel={catLabel}/>)}
    </div>
  );
}
function ProjectItem({project,dragId,dragOverId,onDragStart,onDragEnd,onDragOver,onDrop}){

          {cpOpen&&<ColorPickerPopover selectedColor={myColor} colors={shadesOf(baseColor)} onSelect={c=>dispatch({type:'UPDATE_PROJECT',id:project.id,updates:{color:c}})} onClose={()=>setCpOpen(false)} style={{top:12,left:0}}/>}

                    <button onClick={handleAdd} style={{fontSize:12,color:'#fff',padding:'3px 8px',backgroundColor:'var(--acc)',borderRadius:4,opacity:newName.trim()?1:0.4}}>추가</button>
                  </div>
                </div>
              )}
              {projs.length===0&&addLayer!==c.key&&<div style={{fontSize:11,color:'#C2C2CA',padding:'1px 0'}}>하위 프로젝트 없음</div>}
            </div>
          </div>
        );
      })}
    </section>
  );
}
// ─── FREE NOTE PANEL ─────────────────────────
function FreeNotePanel(){

  const[textOpen,setTextOpen]=useState(true);
  const[stickerTab,setStickerTab]=useState(0);
  const[stickerH,setStickerH]=useState(320);
  const onStickerResize=useCallback((e)=>{
    e.preventDefault();
    const startY=e.clientY,startH=stickerH;
    const onMove=(ev)=>{setStickerH(Math.max(150,Math.min(600,startH+(startY-ev.clientY))));};
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  },[stickerH]);
  // Auto-expand panel when sticker section opens
  useEffect(()=>{
    if(stickerMode) setFreeNotePanelHeight(h=>Math.max(h,400));
  },[stickerMode,setFreeNotePanelHeight]);
  const notes=state.stickyNotes||[];
  const stickyNotes=notes.filter(n=>n.type!=='text');
  const textNotes=notes.filter(n=>n.type==='text');

  const onResizeMouseDown=useCallback((e)=>{
    e.preventDefault();
    const startY=e.clientY,startH=freeNotePanelHeight;
    const onMove=(ev)=>{const h=Math.max(80,Math.min(500,startH-(ev.clientY-startY)));setFreeNotePanelHeight(h);};
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);

  const updateActiveNote=(updates)=>{if(activeNote)dispatch({type:'UPDATE_STICKY_NOTE',id:activeNote.id,updates});};

}

    return cl?{text:cl.color,bg:lighten(cl.color,0.88),border:lighten(cl.color,0.5),dot:cl.color}:catStyle.work;

    if(cat==='work')return state.workLabel||'업무';

function MiniCalendar(){
  const{state}=useStore();
  const catStyle=useDynCatStyle();
  const{scrollToDateRef}=useLayout();
  const now=new Date();
  const[vy,setVy]=React.useState(now.getFullYear());
  const[vm,setVm]=React.useState(now.getMonth()); // 0-based
  const MDOW=['일','월','화','수','목','금','토'];
  // date → visible events (same visibility rules as main calendar)
  const evByDate=React.useMemo(()=>{
    const m={};
    (state.weeklyEvents||[]).forEach(e=>{
      let visible=false;
      if(e.category==='work'&&state.workVisible)visible=true;
      if(e.category==='personal'&&state.personalVisible)visible=true;
      if(e.isOutlook&&state.outlookVisible!==false)visible=true;
      const cl=(state.customLayers||[]).find(l=>l.id===e.category);
      if(cl&&cl.visible!==false)visible=true;
      if(visible){(m[e.date]=m[e.date]||[]).push(e);}
    });
    return m;
  },[state.weeklyEvents,state.workVisible,state.personalVisible,state.outlookVisible,state.customLayers]);
  const first=new Date(vy,vm,1);
  const lead=first.getDay(); // 0=Sun
  const daysInMonth=new Date(vy,vm+1,0).getDate();
  const cells=[];
  for(let i=0;i<lead;i++){const d=new Date(vy,vm,1-lead+i);cells.push({d,other:true});}
  for(let dnum=1;dnum<=daysInMonth;dnum++){cells.push({d:new Date(vy,vm,dnum),other:false});}
  while(cells.length%7!==0){const last=cells[cells.length-1].d;const d=new Date(last);d.setDate(last.getDate()+1);cells.push({d,other:true});}
  const go=(delta)=>{const nd=new Date(vy,vm+delta,1);setVy(nd.getFullYear());setVm(nd.getMonth());};
  const goToday=()=>{setVy(now.getFullYear());setVm(now.getMonth());};
  const cell=({d,other})=>{
    const dk=toDateKey(d);const dow=d.getDay();const td=isToday(d);
    const hol=!!getHoliday(dk);const red=(dow===0||hol);const sat=dow===6;
    const evts=evByDate[dk]||[];
    const dots=evts.slice(0,4).map((e,i)=>{const cs=catStyle[e.category]||catStyle.work;return(<span key={i} style={{width:3,height:3,borderRadius:'50%',background:cs.dot}}/>);});
    let numColor=other?'#D8D8D2':(red?'#D06A6A':sat?SAT_TEAL:'#3A3A3C');
    return(
      <div key={dk+(other?'o':'')} onClick={()=>{if(scrollToDateRef?.current)scrollToDateRef.current(dk);}}
        style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'2px 0',cursor:'pointer',borderRadius:4}}
        onMouseEnter={e=>e.currentTarget.style.background='var(--acc-soft)'}
        onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        <span style={{fontSize:10.5,fontWeight:600,width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'50%',
          ...(td?{background:'var(--acc)',color:'#fff',fontSize:10}:{color:numColor})}}>{d.getDate()}</span>
        <span style={{display:'flex',gap:1.5,marginTop:0.5,minHeight:3}}>{dots}</span>
      </div>
    );
  };
  return(
    <div style={{marginBottom:14}}>
      <div style={{display:'flex',alignItems:'baseline',gap:4,padding:'0 2px 6px'}}>
        <span style={{fontSize:13,fontWeight:800}}>{vy}년 {vm+1}월</span>
        <span style={{flex:1}}/>
        <button onClick={()=>go(-1)} style={{fontSize:12,color:'var(--acc)',fontWeight:600,padding:'0 3px'}}>‹</button>
        <button onClick={goToday} style={{fontSize:10,color:'var(--acc)',fontWeight:600,padding:'0 2px'}}>오늘</button>
        <button onClick={()=>go(1)} style={{fontSize:12,color:'var(--acc)',fontWeight:600,padding:'0 3px'}}>›</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:1}}>
        {MDOW.map((w,i)=><span key={w} style={{textAlign:'center',fontSize:8,fontWeight:600,padding:'2px 0',color:i===0?'#D06A6A':i===6?SAT_TEAL:'#C4C4C0'}}>{w}</span>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>{cells.map(cell)}</div>
    </div>
  );
}

function LeftPanel(){
  const{leftWidth,setLeftWidth,leftCollapsed}=useLayout();
  const onResizeMouseDown=React.useCallback((e)=>{
    e.preventDefault();
    const startX=e.clientX,startW=leftWidth;
    const onMove=(ev)=>{const w=Math.max(180,Math.min(520,startW+(ev.clientX-startX)));setLeftWidth(w);};
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  },[leftWidth,setLeftWidth]);
  return(
    <aside style={{position:'fixed',top:46,left:0,width:leftCollapsed?0:leftWidth,height:'calc(100vh - 46px)',
      borderRight:'0.5px solid #E7E7EC',backgroundColor:'var(--p-bg)',

function EventPopover({date,onClose}){
  const{state,dispatch}=useStore();const catStyle=useDynCatStyle();const showToast=useToast();const[form,setForm]=useState({time:'',title:'',category:'work',projectId:null,isHighlight:false,recurring:false,recurType:'weekly',recurDay:0,recurWeeks:12});const titleRef=useRef(null);
  useEffect(()=>{setTimeout(()=>titleRef.current?.focus(),60);},[]);
  useEffect(()=>{const h=(e)=>{if(e.key==='Escape')onClose();};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[]);
  const dateObj=new Date(date+'T00:00:00');
  const dateLabel=`${dateObj.getMonth()+1}월 ${dateObj.getDate()}일`;
  const handleSave=()=>{
    if(!form.title.trim())return;
    if(!form.recurring){
      dispatch({type:'ADD_EVENT',event:{date,time:form.time.trim()||undefined,title:form.title.trim(),category:form.category,projectId:form.projectId,isOutlook:false}});
    } else if(form.recurType==='yearly'){
      const dObj=new Date(date+'T00:00:00');
      for(let y=0;y<5;y++){const d=new Date(dObj);d.setFullYear(dObj.getFullYear()+y);dispatch({type:'ADD_EVENT',event:{date:toDateKey(d),time:form.time.trim()||undefined,title:form.title.trim(),category:form.category,projectId:form.projectId,isOutlook:false,isRecurring:true}});}
    } else {
      const dObj=new Date(date+'T00:00:00');const todayDow=(dObj.getDay()+6)%7;
      const weekStart=new Date(dObj);weekStart.setDate(dObj.getDate()-todayDow);
      const first=new Date(weekStart);first.setDate(weekStart.getDate()+form.recurDay);
      if(toDateKey(first)<toDateKey(dObj))first.setDate(first.getDate()+7);
      for(let i=0;i<(form.recurWeeks||12);i++){
        const d=new Date(first);d.setDate(first.getDate()+i*7);
        dispatch({type:'ADD_EVENT',event:{date:toDateKey(d),time:form.time.trim()||undefined,title:form.title.trim(),category:form.category,projectId:form.projectId,isOutlook:false,isRecurring:true}});
      }
    }
    if(form.isHighlight&&!form.recurring){
      const dObj=new Date(date+'T00:00:00');
      dispatch({type:'SET_HL_MONTH',hlYear:dObj.getFullYear(),hlMonth:dObj.getMonth()});
      dispatch({type:'ADD_HIGHLIGHT_PREFILLED',projectId:form.projectId||null,date:`${dObj.getMonth()+1}/${dObj.getDate()}`,text:form.title.trim(),yearMonth:`${dObj.getFullYear()}-${String(dObj.getMonth()+1).padStart(2,'0')}`});
    }
    showToast(form.recurring?`반복 일정 저장됨 — ${form.title.trim()}`:`일정 저장됨 — ${form.title.trim()}`,'success');
    onClose();
  };
  return(
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:'fixed',inset:0,backgroundColor:'rgba(0,0,0,0.06)',zIndex:4000,display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn 0.15s ease'}}>
      <div style={{backgroundColor:'#fff',border:'0.5px solid #E0E0E0',borderRadius:12,boxShadow:'0 0 0 1px rgba(15,15,35,0.05), 0 8px 20px rgba(15,15,35,0.09), 0 22px 48px rgba(15,15,35,0.12)',padding:'18px 20px',minWidth:280,maxWidth:340,maxHeight:'88vh',overflowY:'auto',animation:'popIn 0.16s ease'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div><span style={{fontSize:15,fontWeight:600,letterSpacing:'-0.3px'}}>일정 추가</span><span style={{fontSize:13,color:'#A2A2AA',marginLeft:6}}>— {dateLabel}</span></div>
          <button onClick={onClose} style={{fontSize:16,color:'#CCC',lineHeight:1}} onMouseEnter={e=>e.currentTarget.style.color='#999'} onMouseLeave={e=>e.currentTarget.style.color='#CCC'}>×</button>
        </div>
        <div style={{display:'flex',gap:5,marginBottom:14,flexWrap:'wrap'}}>
          {['work','personal'].map(cat=>{const s=catStyle[cat];const active=form.category===cat;const lbl=cat==='work'?(state.workLabel||'업무'):(state.personalLabel||'개인');return(<button key={cat} onClick={()=>setForm(f=>({...f,category:cat}))} style={{flex:1,padding:'5px 0',borderRadius:6,fontSize:12,fontWeight:500,border:`0.5px solid ${active?s.border:'#EBEBEB'}`,backgroundColor:active?s.bg:'#F8F8F8',color:active?s.text:'#ACACB4',transition:'all 0.15s'}}>{lbl}</button>);})}
          {(state.customLayers||[]).filter(l=>(state.layerOrder||[]).includes(l.id)).map(l=>{const active=form.category===l.id;return(<button key={l.id} onClick={()=>setForm(f=>({...f,category:l.id}))} style={{flex:1,padding:'5px 0',borderRadius:6,fontSize:12,fontWeight:500,border:`0.5px solid ${active?lighten(l.color,0.55):'#EBEBEB'}`,backgroundColor:active?lighten(l.color,0.88):'#F8F8F8',color:active?l.color:'#ACACB4',transition:'all 0.15s'}}>{l.name}</button>);})}
        </div>
        <div style={{marginBottom:12}}><label style={{fontSize:11,color:'#8E8E96',display:'block',marginBottom:4,letterSpacing:'0.3px'}}>시간 (선택)</label><input value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))} placeholder="예) 14:00" style={{width:'100%',fontSize:13,color:'#333',borderBottom:'0.5px solid #EDEDEA',paddingBottom:4}}/></div>
        <div style={{marginBottom:14}}><label style={{fontSize:11,color:'#8E8E96',display:'block',marginBottom:4,letterSpacing:'0.3px'}}>제목</label><input ref={titleRef} value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} onKeyDown={e=>{if(e.key==='Enter')handleSave();if(e.key==='Escape')onClose();}} placeholder="일정 제목" style={{width:'100%',fontSize:14,color:'#333',borderBottom:'0.5px solid #EDEDEA',paddingBottom:4,fontWeight:500}}/></div>

        <div style={{marginBottom:12}}>

            <button onClick={()=>setForm(f=>({...f,recurring:true,recurType:'weekly'}))} style={{flex:1,padding:'4px',borderRadius:5,fontSize:11,border:`0.5px solid ${form.recurring&&form.recurType==='weekly'?'var(--acc)':'#EBEBEB'}`,backgroundColor:form.recurring&&form.recurType==='weekly'?'var(--acc-bg)':'#F8F8F8',color:form.recurring&&form.recurType==='weekly'?'var(--acc)':'#A2A2AA'}}>매주반복</button>
            <button onClick={()=>setForm(f=>({...f,recurring:true,recurType:'yearly'}))} style={{flex:1,padding:'4px',borderRadius:5,fontSize:11,border:`0.5px solid ${form.recurring&&form.recurType==='yearly'?'var(--acc)':'#EBEBEB'}`,backgroundColor:form.recurring&&form.recurType==='yearly'?'var(--acc-bg)':'#F8F8F8',color:form.recurring&&form.recurType==='yearly'?'var(--acc)':'#A2A2AA'}}>매해반복</button>
          </div>
          {form.recurring&&form.recurType==='weekly'&&(
            <div style={{padding:'8px',backgroundColor:'#FAFAFE',borderRadius:6,border:'0.5px solid var(--acc-bg)',display:'flex',flexDirection:'column',gap:6}}>
              <div style={{display:'flex',gap:4}}>

                  <button key={i} onClick={()=>setForm(f=>({...f,recurDay:i}))}
                    style={{width:24,height:24,borderRadius:'50%',fontSize:10,fontWeight:500,
                      border:`0.5px solid ${form.recurDay===i?'var(--acc)':'#E0E0E0'}`,
                      backgroundColor:form.recurDay===i?'var(--acc)':'#F8F8F8',
                      color:form.recurDay===i?'#fff':i>=5?'#E24B4A':'#666'}}>
                    {d}
                  </button>

              </div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:11,color:'#888'}}>반복 횟수</span>
                <input type="number" value={form.recurWeeks} min="1" max="52"
