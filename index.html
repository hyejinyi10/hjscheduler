function ProjectsSection(){
  const{state,dispatch}=useStore();const[adding,setAdding]=useState(false);const[newName,setNewName]=useState('');const[newColor,setNewColor]=useState(PROJECT_COLORS[3]);const[cpOpen,setCpOpen]=useState(false);const nameRef=useRef(null);
  const[newLayer,setNewLayer]=useState('work');const handleAdd=()=>{const t=newName.trim();if(!t)return;dispatch({type:'ADD_PROJECT',name:t,color:newColor,layer:newLayer});setNewName('');setNewColor(PROJECT_COLORS[3]);setAdding(false);};
  const[dragId,setDragId]=useState(null);const[dragOverId,setDragOverId]=useState(null);
  const handleDragStart=(id)=>{setDragId(id);setDragOverId(null);};
  const handleDragEnd=()=>{setDragId(null);setDragOverId(null);};
  const handleDragOver=(id)=>{if(dragOverId!==id)setDragOverId(id);};
  const handleDrop=(toId)=>{
    if(!dragId||dragId===toId){setDragId(null);setDragOverId(null);return;}
    const ps=[...state.projects];
    const fi=ps.findIndex(p=>p.id===dragId);const ti=ps.findIndex(p=>p.id===toId);
    if(fi<0||ti<0){setDragId(null);setDragOverId(null);return;}
    const[item]=ps.splice(fi,1);ps.splice(ti,0,item);
    dispatch({type:'REORDER_PROJECTS',projects:ps});
    setDragId(null);setDragOverId(null);
  };
  return(
    <section>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,paddingBottom:6,borderBottom:'0.5px solid #F0F0F0'}}>
        <span style={{fontSize:11,color:'#8B85C9',letterSpacing:'1px',textTransform:'uppercase',fontWeight:700}}>프로젝트</span>
        <button onClick={()=>{setAdding(true);setTimeout(()=>nameRef.current?.focus(),30);}} style={{fontSize:11,color:'#96969E',padding:'1px 5px',borderRadius:3,border:'0.5px solid #E4E4E4',lineHeight:1.6}} onMouseEnter={e=>{e.currentTarget.style.color='#534AB7';e.currentTarget.style.borderColor='#AFA9EC';}} onMouseLeave={e=>{e.currentTarget.style.color='#96969E';e.currentTarget.style.borderColor='#E4E4E4';}}>+ 추가</button>
      </div>
      {adding&&<div style={{border:'0.5px solid #E8E8E8',borderRadius:6,padding:'8px',marginBottom:10,backgroundColor:'#FAFAFA'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
          <div style={{position:'relative',flexShrink:0}}><div onClick={()=>setCpOpen(v=>!v)} style={{width:14,height:14,borderRadius:'50%',backgroundColor:newColor,cursor:'pointer',border:`1.5px solid ${newColor}`}}/>{cpOpen&&<ColorPickerPopover selectedColor={newColor} onSelect={c=>setNewColor(c)} onClose={()=>setCpOpen(false)} style={{top:18,left:0}}/>}</div>
          <input ref={nameRef} value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')handleAdd();if(e.key==='Escape')setAdding(false);}} placeholder="프로젝트명" style={{flex:1,fontSize:13,color:'#333',borderBottom:'0.5px solid #E0E0E0',paddingBottom:2,minWidth:0}}/>
          <button onClick={()=>setNewLayer(l=>l==='work'?'personal':'work')} style={{fontSize:10,padding:'1px 6px',borderRadius:3,border:'0.5px solid #E0E0E0',color:newLayer==='personal'?'#185FA5':'#534AB7',backgroundColor:newLayer==='personal'?'#E6F1FB':'#EEEDFE',flexShrink:0}}>{newLayer==='personal'?'개인':'업무'}</button>
        </div>
        <div style={{display:'flex',gap:5,justifyContent:'flex-end'}}>
          <button onClick={()=>setAdding(false)} style={{fontSize:12,color:'#999',padding:'3px 8px',border:'0.5px solid #E0E0E0',borderRadius:4}}>취소</button>
          <button onClick={handleAdd} style={{fontSize:12,color:'#fff',padding:'3px 8px',backgroundColor:'#534AB7',borderRadius:4,opacity:newName.trim()?1:0.4}}>추가</button>
        </div>
      </div>}
      {state.projects.length===0&&!adding?<div style={{fontSize:13,color:'#C2C2CA',textAlign:'center',padding:'10px 0'}}>프로젝트를 추가해보세요</div>:<div style={{display:'flex',flexDirection:'column',gap:8}}>{state.projects.map(p=><ProjectItem key={p.id} project={p} dragId={dragId} dragOverId={dragOverId} onDragStart={handleDragStart} onDragEnd={handleDragEnd} onDragOver={handleDragOver} onDrop={handleDrop}/>)}</div>}
    </section>
  );
}
// ─── FREE NOTE PANEL ─────────────────────────
function FreeNotePanel(){
  const{state,dispatch}=useStore();
  const{freeLayerVisible,setFreeLayerVisible,calendarScrollRef,freeNotePanelHeight,setFreeNotePanelHeight,activeNoteId,setActiveNoteId,stickerMode,setStickerMode,selectedStickerId,setSelectedStickerId}=useLayout();
  const[stickyOpen,setStickyOpen]=useState(true);
  const[textOpen,setTextOpen]=useState(true);
  const[stickerTab,setStickerTab]=useState(0);
  const[stickerH,setStickerH]=useState(320);
  const onStickerResize=useCallback((e)=>{
    e.preventDefault();
    const startY=e.clientY,startH=stickerH;
    const onMove=(ev)=>{setStickerH(Math.max(150,Math.min(600,startH+(startY-ev.clientY))));};
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  },[stickerH]);
  // Auto-expand panel when sticker section opens
  useEffect(()=>{
    if(stickerMode) setFreeNotePanelHeight(h=>Math.max(h,400));
  },[stickerMode,setFreeNotePanelHeight]);
  const notes=state.stickyNotes||[];
  const stickyNotes=notes.filter(n=>n.type!=='text');
  const textNotes=notes.filter(n=>n.type==='text');

  const onResizeMouseDown=useCallback((e)=>{
    e.preventDefault();
    const startY=e.clientY,startH=freeNotePanelHeight;
    const onMove=(ev)=>{const h=Math.max(80,Math.min(500,startH-(ev.clientY-startY)));setFreeNotePanelHeight(h);};
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  },[freeNotePanelHeight,setFreeNotePanelHeight]);
  const activeNote=notes.find(n=>n.id===activeNoteId)||null;
  const FONT_SIZES=[11,12,13,14,16,18,20,24];
  const TEXT_COLORS=['#1A1A1A','#534AB7','#1D9E75','#E24B4A','#D97706','#4A90D9','#888','#fff'];
  const BG_COLORS=['transparent','#FFFDE7','#FFF3E0','#E3F2FD','#E8F5E9','#FCE4EC','#EDE7F6','#F3E5F5','#1A1A1A','#534AB7'];
  const updateActiveNote=(updates)=>{if(activeNote)dispatch({type:'UPDATE_STICKY_NOTE',id:activeNote.id,updates});};

  const scrollToNote=(note)=>{
    const c=calendarScrollRef?.current;
    if(c)c.scrollTo({top:Math.max(0,note.y-c.clientHeight/2+70),behavior:'smooth'});
  };
  const addNote=(type)=>{
    const c=calendarScrollRef?.current;
    const n=(state.stickyNotes||[]).length;
    const off=(n%5)*26;
    const x=c?Math.max(24,(c.clientWidth-170)/2-90+off):80;
    const y=c?c.scrollTop+c.clientHeight/2-(type==='text'?30:70)-40+off:200;
    const newId='n'+Date.now();
    dispatch({type:'ADD_STICKY_NOTE',note:{id:newId,x,y,w:type==='text'?200:170,h:type==='text'?32:140,text:'',
      color:type==='text'?'transparent':STICKY_COLORS[n%STICKY_COLORS.length],type,createdAt:new Date().toISOString()}});
    if(!freeLayerVisible)setFreeLayerVisible(true);
    setActiveNoteId(newId);
    setTimeout(()=>{if(c)c.scrollTo({top:Math.max(0,y-c.clientHeight/2+70),behavior:'smooth'});},60);
  };
  const addSticker=(stickerType,content)=>{
    const c=calendarScrollRef?.current;
    const n=(state.placedStickers||[]).length;
    const off=(n%6)*30;
    const x=c?Math.max(24,(c.clientWidth-48)/2-80+off):200;
    const y=c?c.scrollTop+c.clientHeight/2-84+off*0.7:200;
    dispatch({type:'ADD_PLACED_STICKER',sticker:{type:stickerType,content,x,y,size:48,rotation:0}});
  };
  const StickerRow=({s})=>{
    const faceEmoji=s.type==='face'?FACE_STICKERS.find(f=>f.id===s.content)?.emoji:null;
        const shapeDef=s.type==='shape'?SHAPE_STICKERS.find(f=>f.id===s.content):null;
        const arrowDef2=s.type==='arrow_svg'?ARROW_SVG_STICKERS.find(f=>f.id===s.content):null;
        const sketchDef2=s.type==='sketch'?SKETCH_STICKERS.find(f=>f.id===s.content):null;
        const isSelected=selectedStickerId===s.id;
    return(
      <div style={{display:'flex',alignItems:'center',gap:5,padding:'3px 4px',borderRadius:4,cursor:'pointer',marginBottom:1,
        backgroundColor:isSelected?'rgba(83,74,183,0.08)':'transparent'}}
        onMouseEnter={e=>{if(!isSelected)e.currentTarget.style.backgroundColor='#F5F4FF';}}
        onMouseLeave={e=>{e.currentTarget.style.backgroundColor=isSelected?'rgba(83,74,183,0.08)':'transparent';}}
        onClick={()=>{setSelectedStickerId(s.id);const c=calendarScrollRef?.current;if(c)c.scrollTo({top:Math.max(0,s.y-c.clientHeight/2),behavior:'smooth'});}}>
        <div style={{width:18,height:18,flexShrink:0,borderRadius:3,overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center'}}>
          {s.type==='shape'&&shapeDef?shapeDef.render():
           s.type==='arrow_svg'&&arrowDef2?arrowDef2.render():
           s.type==='sketch'&&sketchDef2?sketchDef2.render():
           <span style={{fontSize:14,lineHeight:1}}>{s.type==='face'?faceEmoji:s.content}</span>}
        </div>
        <span style={{fontSize:11,color:'#555',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
          {Math.round(s.x)},{Math.round(s.y)} · {Math.round(s.size||44)}px
        </span>
        <button onClick={e=>{e.stopPropagation();dispatch({type:'DELETE_PLACED_STICKER',id:s.id});if(selectedStickerId===s.id)setSelectedStickerId(null);}}
          style={{fontSize:11,color:'#DDD',flexShrink:0,lineHeight:1,padding:'0 2px'}}
          onMouseEnter={e=>e.currentTarget.style.color='#E24B4A'}
          onMouseLeave={e=>e.currentTarget.style.color='#DDD'}>×</button>
      </div>
    );
  };
  const NoteRow=({note})=>(
    <div style={{display:'flex',alignItems:'center',gap:5,padding:'3px 4px',borderRadius:4,cursor:'pointer',marginBottom:1}}
      onMouseEnter={e=>e.currentTarget.style.backgroundColor='#F5F4FF'}
      onMouseLeave={e=>e.currentTarget.style.backgroundColor='transparent'}
      onClick={()=>{scrollToNote(note);setActiveNoteId(note.id);}}>
      <span style={{width:8,height:8,borderRadius:note.type==='text'?2:'50%',
        backgroundColor:note.type==='text'?'#999':note.color||STICKY_COLORS[0],
        flexShrink:0,border:'0.5px solid rgba(0,0,0,0.08)'}}/>
      <span style={{fontSize:11,color:'#555',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
        {note.text?(note.text.slice(0,28)+(note.text.length>28?'…':'')):'(빈 노트)'}
      </span>
      <button onClick={e=>{e.stopPropagation();dispatch({type:'DELETE_STICKY_NOTE',id:note.id});}}
        style={{fontSize:11,color:'#DDD',flexShrink:0,lineHeight:1,padding:'0 2px'}}
        onMouseEnter={e=>e.currentTarget.style.color='#E24B4A'}
        onMouseLeave={e=>e.currentTarget.style.color='#DDD'}>×</button>
    </div>
  );
  return(
    <div data-free-note-panel="true" style={{flex:1,minHeight:0,backgroundColor:'#fff',
      display:'flex',flexDirection:'column',
      overflow:'hidden',position:'relative',paddingTop:6}}>
      <div style={{flex:1,overflowY:'auto',padding:'0 14px 14px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,paddingTop:4}}>
          <span style={{fontSize:11,fontWeight:600,color:'#8E8E96',letterSpacing:'0.5px',textTransform:'uppercase'}}>자유 노트</span>
          <div style={{display:'flex',gap:4,alignItems:'center'}}>
            <button onClick={()=>addNote('sticky')}
              style={{fontSize:11,color:'#534AB7',padding:'2px 7px',border:'0.5px solid #AFA9EC',borderRadius:4,backgroundColor:'#EEEDFE'}}>+ 포스트잇</button>
            <button onClick={()=>addNote('text')}
              style={{fontSize:11,color:'#555',padding:'2px 7px',border:'0.5px solid #E0E0E0',borderRadius:4,backgroundColor:'#F8F8F8'}}>+ 텍스트</button>
            <button onClick={()=>setFreeLayerVisible(v=>!v)}
              style={{fontSize:11,padding:'2px 8px',borderRadius:4,
                border:`0.5px solid ${freeLayerVisible?'#AFA9EC':'#E0E0E0'}`,
                backgroundColor:freeLayerVisible?'#EEEDFE':'#F4F4F4',
                color:freeLayerVisible?'#534AB7':'#AAA'}}>
              {freeLayerVisible?'● 편집 중':'편집'}
            </button>
          </div>
        </div>
        {/* Active note format controls */}
        {activeNote&&(
          <div style={{padding:'9px 11px',backgroundColor:'#FBFBFD',borderRadius:8,marginBottom:8,border:'0.5px solid #ECECF1'}}>
            <div style={{fontSize:10,color:'#8B85C9',marginBottom:7,fontWeight:700,letterSpacing:'0.6px',textTransform:'uppercase'}}>{activeNote.type==='text'?'텍스트박스 서식':'포스트잇 서식'}</div>
            <div style={{display:'flex',flexDirection:'column',gap:7}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:10,color:'#96969E',width:32,flexShrink:0}}>크기</span>
                <select value={activeNote.fontSize||(activeNote.type==='text'?15:13)} onChange={e=>updateActiveNote({fontSize:+e.target.value})}
                  style={{fontSize:11,color:'#3F3E45',backgroundColor:'#F1F1F4',borderRadius:5,padding:'3px 6px',cursor:'pointer',flex:1,border:'none'}}>
                  {FONT_SIZES.map(s=><option key={s} value={s}>{s}px</option>)}
                </select>
              </div>
              <div style={{display:'flex',alignItems:'flex-start',gap:6}}>
                <span style={{fontSize:10,color:'#96969E',width:32,flexShrink:0,paddingTop:2}}>글자색</span>
                <div style={{display:'flex',gap:3.5,flexWrap:'wrap'}}>
                  {TEXT_COLORS.map(c=>(
                    <button key={c} onClick={()=>updateActiveNote({textColor:c})}
                      style={{width:16,height:16,borderRadius:'50%',backgroundColor:c,cursor:'pointer',padding:0,border:'none',flexShrink:0,
                        boxShadow:(activeNote.textColor||(activeNote.type==='text'?'#1A1A1A':'#333'))===c?'0 0 0 1.5px #fff, 0 0 0 3px #534AB7':(c==='#fff'?'inset 0 0 0 1px #D6D6DE':'inset 0 0 0 0.5px rgba(0,0,0,0.14)')}}/>
                  ))}
                </div>
              </div>
              <div style={{display:'flex',alignItems:'flex-start',gap:6}}>
                <span style={{fontSize:10,color:'#96969E',width:32,flexShrink:0,paddingTop:2}}>배경</span>
                <div style={{display:'flex',gap:3.5,flexWrap:'wrap'}}>
                  {(activeNote.type==='text'?BG_COLORS:STICKY_COLORS).map(c=>{
                    const cur=activeNote.type==='text'?(activeNote.bgColor||'transparent'):(activeNote.color||STICKY_COLORS[0]);
                    return(
                      <button key={c} onClick={()=>updateActiveNote(activeNote.type==='text'?{bgColor:c}:{color:c})}
                        style={{width:16,height:16,borderRadius:4,cursor:'pointer',padding:0,flexShrink:0,
                          backgroundColor:c==='transparent'?'#fff':c,
                          border:c==='transparent'?'1px dashed #C8C8D0':'none',
                          boxShadow:cur===c?'0 0 0 1.5px #fff, 0 0 0 3px #534AB7':(c==='transparent'?'none':'inset 0 0 0 0.5px rgba(0,0,0,0.10)')}}/>
                    );
                  })}
                </div>
              </div>
              <div style={{fontSize:9.5,color:'#A8A8B0',lineHeight:1.5}}>드래그한 부분만 색칠(마커)은 박스 위 툴바에서 할 수 있어요.</div>
            </div>
          </div>
        )}
        {notes.length===0?(
          <div style={{fontSize:11,color:'#C2C2CA',textAlign:'center',padding:'8px 0'}}>포스트잇을 추가해보세요</div>
        ):(
          <>
            {stickyNotes.length>0&&(
              <div style={{marginBottom:4}}>
                <button onClick={()=>setStickyOpen(v=>!v)}
                  style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'#999',marginBottom:3,width:'100%',textAlign:'left'}}>
                  <span style={{fontSize:9}}>{stickyOpen?'▼':'▶'}</span>
                  포스트잇<span style={{color:'#A2A2AA',marginLeft:3}}>({stickyNotes.length})</span>
                </button>
                {stickyOpen&&stickyNotes.map(n=><NoteRow key={n.id} note={n}/>)}
              </div>
            )}
            {textNotes.length>0&&(
              <div>
                <button onClick={()=>setTextOpen(v=>!v)}
                  style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'#999',marginBottom:3,width:'100%',textAlign:'left'}}>
                  <span style={{fontSize:9}}>{textOpen?'▼':'▶'}</span>
                  텍스트<span style={{color:'#A2A2AA',marginLeft:3}}>({textNotes.length})</span>
                </button>
                {textOpen&&textNotes.map(n=><NoteRow key={n.id} note={n}/>)}
              </div>
            )}
          </>
        )}
      </div>
            {/* ─── STICKER SECTION: always show list, palette only when stickerMode ─── */}
      <div style={{borderTop:'0.5px solid #ECECF1',padding:'0 12px 8px',flexShrink:0,height:stickerMode?stickerH:'auto',display:'flex',flexDirection:'column',minHeight:0,paddingTop:stickerMode?0:6}}>
        {stickerMode&&<div onMouseDown={onStickerResize} title="드래그로 크기 조절"
          style={{height:8,cursor:'row-resize',margin:'0 -12px',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',transition:'background-color 0.12s'}}
          onMouseEnter={e=>e.currentTarget.style.backgroundColor='rgba(83,74,183,0.08)'}
          onMouseLeave={e=>e.currentTarget.style.backgroundColor='transparent'}>
          <div style={{width:28,height:3,borderRadius:2,backgroundColor:'#E0E0E6'}}/>
        </div>}
        {/* Header always visible */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
          <button onClick={()=>setStickerMode(v=>!v)}
            style={{display:'flex',alignItems:'center',gap:5,fontSize:11,fontWeight:600,
              color:stickerMode?'#E91E63':'#8E8E96',background:'none',border:'none',cursor:'pointer',padding:0}}>
            <span style={{fontSize:14}}>🎨</span>
            스티커 {stickerMode?'▲':'▼'}
          </button>
          <div style={{display:'flex',gap:4,alignItems:'center'}}>
            <button onClick={()=>setFreeLayerVisible(v=>!v)}
              style={{fontSize:10,padding:'1px 6px',borderRadius:3,
                border:`0.5px solid ${freeLayerVisible?'#AFA9EC':'#E0E0E0'}`,
                backgroundColor:freeLayerVisible?'#EEEDFE':'#F4F4F4',
                color:freeLayerVisible?'#534AB7':'#AAA'}}>
              {freeLayerVisible?'편집 중':'편집'}
            </button>
            {(state.placedStickers||[]).length>0&&(
              <button onClick={()=>{if(confirm('스티커를 모두 삭제?'))dispatch({type:'CLEAR_ALL_STICKERS'});}}
                style={{fontSize:10,color:'#E24B4A',padding:'1px 5px',border:'0.5px solid #FFCDD2',borderRadius:3,backgroundColor:'#FFF5F5'}}>전체삭제</button>
            )}
          </div>
        </div>
        {/* Placed sticker mini-list — always visible */}
        {(state.placedStickers||[]).length>0&&(
          <div style={{maxHeight:96,overflowY:'auto',marginBottom:stickerMode?6:0,flexShrink:0}}>
            {(state.placedStickers||[]).map(s=><StickerRow key={s.id} s={s}/>)}
          </div>
        )}
        {/* Full palette — only when stickerMode */}
        {stickerMode&&(
          <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
            {/* Tabs */}
            <div style={{display:'flex',gap:1,marginBottom:5,overflowX:'auto',paddingBottom:2}}>
              {EMOJI_TABS.groups.map((g,i)=>(
                <button key={i} onClick={()=>setStickerTab(i)}
                  style={{flexShrink:0,padding:'2px 7px',borderRadius:8,fontSize:10,
                    border:`0.5px solid ${stickerTab===i?'#F48FB1':'#F0F0F0'}`,
                    backgroundColor:stickerTab===i?'#FCE4EC':'transparent',
                    color:stickerTab===i?'#E91E63':'#8E8E96',fontWeight:stickerTab===i?500:400}}>
                  {g.name}
                </button>
              ))}
            </div>
            {/* Palette grid — scrollable, max height */}
            <div style={{flex:1,minHeight:0,overflowY:'auto',overflowX:'hidden'}}>
              {(()=>{
                const g=EMOJI_TABS.groups[stickerTab];
                const svgBtn=(s,w,h,type)=>(
                  <button key={s.id} onClick={()=>addSticker(type,s.id)}
                    style={{width:w,height:h,padding:3,borderRadius:6,border:'0.5px solid #EFEFF3',
                      backgroundColor:'#FAFAFC',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.1s'}}
                    onMouseEnter={e=>{e.currentTarget.style.backgroundColor='#F0EFFE';e.currentTarget.style.borderColor='#C5C0F0';e.currentTarget.style.transform='scale(1.08)';}}
                    onMouseLeave={e=>{e.currentTarget.style.backgroundColor='#FAFAFC';e.currentTarget.style.borderColor='#EFEFF3';e.currentTarget.style.transform='scale(1)';}}>
                    {s.render()}
                  </button>
                );
                const emojiGrid=(items)=>(
                  <div style={{display:'grid',gridTemplateColumns:'repeat(8,1fr)',gap:1}}>
                    {items.map((em,i)=>(
                      <button key={i} onClick={()=>addSticker('emoji',em)}
                        style={{fontSize:16,padding:'3px 1px',borderRadius:4,border:'none',
                          backgroundColor:'transparent',cursor:'pointer',lineHeight:1}}
                        onMouseEnter={e=>{e.currentTarget.style.backgroundColor='#F5F0FF';e.currentTarget.style.transform='scale(1.2)';}}
                        onMouseLeave={e=>{e.currentTarget.style.backgroundColor='transparent';e.currentTarget.style.transform='scale(1)';}}>
                        {em}
                      </button>
                    ))}
                  </div>
                );
                if(g.type==='work'||g.type==='life')return(
                  <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                    {SKETCH_STICKERS.filter(s=>s.cat===g.type).map(s=>svgBtn(s,64,32,'sketch'))}
                  </div>

function MeetingNoteList({onOpen}){
  const{state}=useStore();
  const[projTab,setProjTab]=React.useState('all');
  const notes=state.meetingNotes||[];
  const catStyle=useDynCatStyle();
  const getCatColor=(cat)=>{
    if(cat==='work')return catStyle.work;
    if(cat==='personal')return catStyle.personal;
    const cl=(state.customLayers||[]).find(l=>l.id===cat);
    return cl?{text:cl.color,bg:lighten(cl.color,0.88),border:lighten(cl.color,0.5),dot:cl.color}:catStyle.work;
  };
  const getCatLabel=(cat)=>{
    if(cat==='work')return state.workLabel||'업무';
    if(cat==='personal')return state.personalLabel||'개인';
    const cl=(state.customLayers||[]).find(l=>l.id===cat);
    return cl?.name||cat;
  };
  /* projects that appear in at least one note */
  const usedProjectIds=[...new Set(notes.filter(n=>n.projectId).map(n=>n.projectId))];
  const usedProjects=usedProjectIds.map(pid=>(state.projects||[]).find(p=>p.id===pid)).filter(Boolean);
  /* filtered + sorted notes */
  const filtered=(projTab==='all'?notes:notes.filter(n=>n.projectId===projTab))
    .slice().sort((a,b)=>b.date.localeCompare(a.date));
  /* group by month */
  const grouped={};
  filtered.forEach(n=>{const key=n.date.slice(0,7);if(!grouped[key])grouped[key]=[];grouped[key].push(n);});

  if(notes.length===0)return(
    <div style={{textAlign:'center',padding:'28px 0',color:'#C2C2CA'}}>
      <div style={{fontSize:32,marginBottom:8}}>📋</div>
      <div style={{fontSize:13}}>회의록이 없습니다</div>
      <div style={{fontSize:11,marginTop:4}}>+ 새 회의록 버튼으로 추가하세요</div>
    </div>
  );
  return(
    <div style={{display:'flex',flexDirection:'column',gap:0}}>
      {/* Project filter tabs */}
      <div style={{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap'}}>
        {[{id:'all',label:'전체'},...usedProjects.map(p=>({id:p.id,label:p.name,color:p.color}))].map(tab=>{
          const active=projTab===tab.id;
          return(
            <button key={tab.id} onClick={()=>setProjTab(tab.id)}
              style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:active?600:400,
                border:`0.5px solid ${active?(tab.color||'#534AB7'):'#E8E8E8'}`,
                backgroundColor:active?(tab.color?lighten(tab.color,0.88):'#EEEDFE'):'transparent',
                color:active?(tab.color||'#534AB7'):'#AAAAAA',cursor:'pointer',transition:'all 0.1s'}}>
              {tab.label}
            </button>
          );
        })}
      </div>
      {filtered.length===0?(
        <div style={{textAlign:'center',padding:'20px 0',color:'#C2C2CA',fontSize:12}}>
          이 프로젝트에 회의록이 없습니다
        </div>
      ):(
        Object.entries(grouped).map(([ym,items])=>{
          const [yr,mo]=ym.split('-');
          return(
            <div key={ym} style={{marginBottom:12}}>
              <div style={{fontSize:10,fontWeight:700,color:'#A2A2AA',letterSpacing:'0.8px',
                textTransform:'uppercase',marginBottom:5,paddingLeft:2}}>
                {yr}년 {parseInt(mo)}월
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:3}}>
                {items.map(n=>{
                  const cs=getCatColor(n.category);
                  const proj=n.projectId?(state.projects||[]).find(p=>p.id===n.projectId):null;
                  const preview=n.blocks?.map(b=>b.text||'').filter(Boolean).join(' ').slice(0,50);
                  return(
                    <div key={n.id} onClick={()=>onOpen(n)}
                      style={{padding:'7px 10px',borderRadius:8,cursor:'pointer',
                        border:'0.5px solid #F0F0F0',backgroundColor:'#FAFAFA',transition:'all 0.12s'}}
                      onMouseEnter={e=>{e.currentTarget.style.backgroundColor='#F0EFFE';e.currentTarget.style.borderColor='#AFA9EC';}}
                      onMouseLeave={e=>{e.currentTarget.style.backgroundColor='#FAFAFA';e.currentTarget.style.borderColor='#F0F0F0';}}>
                      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
                        <span style={{fontSize:10,padding:'1px 6px',borderRadius:8,
                          backgroundColor:cs.bg,color:cs.text,border:`0.5px solid ${cs.border}`,flexShrink:0}}>
                          {getCatLabel(n.category)}
                        </span>
                        {proj&&<span style={{fontSize:10,color:proj.color,fontWeight:500,flexShrink:0}}>{proj.name}</span>}
                        <span style={{fontSize:10,color:'#A2A2AA',marginLeft:'auto',flexShrink:0}}>
                          {n.date.slice(5).replace('-','/')}{n.time?' '+n.time:''}
                        </span>
                      </div>
                      <div style={{fontSize:12,fontWeight:600,color:'#222',marginBottom:1,
                        overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {n.title||'(제목 없음)'}
                      </div>
                      {n.attendees&&<div style={{fontSize:10,color:'#8E8E96'}}>👥 {n.attendees}</div>}
                      {preview&&<div style={{fontSize:11,color:'#A2A2AA',marginTop:2,
                        overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{preview}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })
      )}
    </div>
  );
}

function EventPopover({date,onClose}){
  const{state,dispatch}=useStore();const catStyle=useDynCatStyle();const showToast=useToast();const[form,setForm]=useState({time:'',title:'',category:'work',projectId:null,isHighlight:false,recurring:false,recurType:'weekly',recurDay:0,recurWeeks:12});const titleRef=useRef(null);
  useEffect(()=>{setTimeout(()=>titleRef.current?.focus(),60);},[]);
  useEffect(()=>{const h=(e)=>{if(e.key==='Escape')onClose();};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[]);
  const dateObj=new Date(date+'T00:00:00');
  const dateLabel=`${dateObj.getMonth()+1}월 ${dateObj.getDate()}일`;
  const handleSave=()=>{
    if(!form.title.trim())return;
    if(!form.recurring){
      dispatch({type:'ADD_EVENT',event:{date,time:form.time.trim()||undefined,title:form.title.trim(),category:form.category,projectId:form.projectId,isOutlook:false}});
    } else if(form.recurType==='yearly'){
      const dObj=new Date(date+'T00:00:00');
      for(let y=0;y<5;y++){const d=new Date(dObj);d.setFullYear(dObj.getFullYear()+y);dispatch({type:'ADD_EVENT',event:{date:toDateKey(d),time:form.time.trim()||undefined,title:form.title.trim(),category:form.category,projectId:form.projectId,isOutlook:false,isRecurring:true}});}
    } else {
      const dObj=new Date(date+'T00:00:00');const todayDow=(dObj.getDay()+6)%7;
      const weekStart=new Date(dObj);weekStart.setDate(dObj.getDate()-todayDow);
      const first=new Date(weekStart);first.setDate(weekStart.getDate()+form.recurDay);
      if(toDateKey(first)<toDateKey(dObj))first.setDate(first.getDate()+7);
      for(let i=0;i<(form.recurWeeks||12);i++){
        const d=new Date(first);d.setDate(first.getDate()+i*7);
        dispatch({type:'ADD_EVENT',event:{date:toDateKey(d),time:form.time.trim()||undefined,title:form.title.trim(),category:form.category,projectId:form.projectId,isOutlook:false,isRecurring:true}});
      }
    }
    if(form.isHighlight&&!form.recurring){
      const dObj=new Date(date+'T00:00:00');
      dispatch({type:'SET_HL_MONTH',hlYear:dObj.getFullYear(),hlMonth:dObj.getMonth()});
      dispatch({type:'ADD_HIGHLIGHT_PREFILLED',projectId:form.projectId||null,date:`${dObj.getMonth()+1}/${dObj.getDate()}`,text:form.title.trim(),yearMonth:`${dObj.getFullYear()}-${String(dObj.getMonth()+1).padStart(2,'0')}`});
    }
    showToast(form.recurring?`반복 일정 저장됨 — ${form.title.trim()}`:`일정 저장됨 — ${form.title.trim()}`,'success');
    onClose();

        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div><span style={{fontSize:15,fontWeight:600,letterSpacing:'-0.3px'}}>일정 추가</span><span style={{fontSize:13,color:'#A2A2AA',marginLeft:6}}>— {dateLabel}</span></div>
          <button onClick={onClose} style={{fontSize:16,color:'#CCC',lineHeight:1}} onMouseEnter={e=>e.currentTarget.style.color='#999'} onMouseLeave={e=>e.currentTarget.style.color='#CCC'}>×</button>
        </div>
        <div style={{display:'flex',gap:5,marginBottom:14,flexWrap:'wrap'}}>

          {(state.customLayers||[]).filter(l=>(state.layerOrder||[]).includes(l.id)).map(l=>{const active=form.category===l.id;return(<button key={l.id} onClick={()=>setForm(f=>({...f,category:l.id}))} style={{flex:1,padding:'5px 0',borderRadius:6,fontSize:12,fontWeight:500,border:`0.5px solid ${active?lighten(l.color,0.55):'#EBEBEB'}`,backgroundColor:active?lighten(l.color,0.88):'#F8F8F8',color:active?l.color:'#ACACB4',transition:'all 0.15s'}}>{l.name}</button>);})}

        <div style={{marginBottom:12}}>

            <button onClick={()=>setForm(f=>({...f,recurring:true,recurType:'yearly'}))} style={{flex:1,padding:'4px',borderRadius:5,fontSize:11,border:`0.5px solid ${form.recurring&&form.recurType==='yearly'?'#534AB7':'#EBEBEB'}`,backgroundColor:form.recurring&&form.recurType==='yearly'?'#EEEDFE':'#F8F8F8',color:form.recurring&&form.recurType==='yearly'?'#534AB7':'#A2A2AA'}}>매해반복</button>

        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:14,padding:'8px 10px',backgroundColor:'#F8F8FF',borderRadius:6,border:'0.5px solid #E8E8F8'}}>

/* ─── 회의록 미리보기 패널 (일정 팝오버 우측) ─── */
function MeetingNotePreviewPane({note,onEdit}){
  const{state}=useStore();
  const proj=note.projectId?(state.projects||[]).find(p=>p.id===note.projectId):null;
  const bulletMark=(indent)=>['•','◦','▪'][(indent||0)%3];
  const items=[];
  (note.blocks||[]).forEach((b,i,arr)=>{
    let numLabel='';
    if(b.type==='numbered'){
      let n=1;
      for(let j=i-1;j>=0;j--){const x=arr[j];const xi=x.indent||0;const bi=b.indent||0;if(xi<bi)break;if(xi===bi){if(x.type==='numbered')n++;else break;}}
      numLabel=n+'.';
    }
    const base={h1:{fontSize:15,fontWeight:700,color:'#111',marginTop:i===0?0:10,marginBottom:2,borderBottom:'1px solid #EEEEEE',paddingBottom:3},
      h2:{fontSize:13.5,fontWeight:600,color:'#1C1C1C',marginTop:i===0?0:8,marginBottom:2},
      h3:{fontSize:12.5,fontWeight:600,color:'#2A2A2A',marginTop:i===0?0:6,marginBottom:1},
    }[b.type]||{fontSize:12,fontWeight:400,color:'#3D3D3D',lineHeight:1.65};
    const hasContent=(b.text||'').trim()||(b.html||'').replace(/<br\s*\/?>/g,'').trim();
    if(!hasContent&&b.type==='p')return;
    items.push(
      <div key={b.id||i} style={{display:'flex',alignItems:'flex-start',gap:5,paddingLeft:(b.indent||0)*14}}>
        {b.type==='bullet'&&<span style={{fontSize:11,color:'#909090',lineHeight:1.65,flexShrink:0}}>{bulletMark(b.indent)}</span>}
        {b.type==='numbered'&&<span style={{fontSize:11,color:'#909090',lineHeight:1.65,flexShrink:0,minWidth:14}}>{numLabel}</span>}
        {b.type==='todo'&&<span style={{fontSize:12,lineHeight:1.5,flexShrink:0,color:b.checked?'#7CB87C':'#B8B8B8'}}>{b.checked?'☑':'☐'}</span>}
        <div style={{...base,flex:1,minWidth:0,wordBreak:'break-word',whiteSpace:'pre-wrap',
          textDecoration:b.type==='todo'&&b.checked?'line-through':'none',
          opacity:b.type==='todo'&&b.checked?0.55:1}}
          dangerouslySetInnerHTML={{__html:(b.html&&b.html.trim())?b.html:_escHtml(b.text||'')}}/>
      </div>
    );
  });
  return(
    <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',borderLeft:'0.5px solid #EEEEF2',backgroundColor:'#FBFBFD'}}>
      <div style={{padding:'14px 16px 10px',borderBottom:'0.5px solid #F0F0F3',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
          <span style={{fontSize:11,fontWeight:700,color:'#8B85C9',letterSpacing:'0.5px'}}>📋 회의록</span>
          {proj&&<span style={{fontSize:10,color:proj.color,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{proj.name}</span>}
        </div>
        <div style={{fontSize:13,fontWeight:600,color:'#222',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{note.title||'(제목 없음)'}</div>
        <div style={{fontSize:10.5,color:'#A8A8B0',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
          {note.date}{note.time?' · '+note.time:''}{note.attendees?' · 👥 '+note.attendees:''}
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'12px 16px 14px',display:'flex',flexDirection:'column',gap:3}}>
        {items.length>0?items:<div style={{fontSize:11.5,color:'#C4C4CA',textAlign:'center',padding:'24px 0'}}>아직 작성된 내용이 없습니다<br/><span style={{fontSize:10.5}}>아래 버튼으로 내용을 작성해 보세요</span></div>}
      </div>
      {onEdit&&<div style={{padding:'10px 16px',borderTop:'0.5px solid #F0F0F3',flexShrink:0,backgroundColor:'#FBFBFD'}}>
        <button onClick={onEdit} style={{width:'100%',fontSize:12,fontWeight:500,color:'#534AB7',padding:'7px 10px',border:'0.5px solid #AFA9EC',borderRadius:7,backgroundColor:'#EEEDFE',cursor:'pointer',transition:'background-color 0.12s'}}
          onMouseEnter={e=>e.currentTarget.style.backgroundColor='#E3E1FB'}
          onMouseLeave={e=>e.currentTarget.style.backgroundColor='#EEEDFE'}>✏️ 회의록 편집</button>
      </div>}
    </div>
  );
}
function EventDetailPopover({event,onClose,onDelete,onUpdate,onOpenNote}){

/* Returns anniversary emoji prefix if layer name contains '기념일' or '생일' */
function getBdayPrefix(category,state){
  if(!category||!state)return'';
  const layers=[
    {id:'work',name:state.workLabel||'업무'},
    {id:'personal',name:state.personalLabel||'개인'},
    ...(state.customLayers||[]),
  ];
  const layer=layers.find(l=>l.id===category);
  return(layer?.name?.includes('기념일')||layer?.name?.includes('생일'))?'🎉 ':'';
}

function MemoEditor({memoKey,value,onUpdate}){

  const prevKey=useRef(memoKey);
  useEffect(()=>{
    if(ref.current){ref.current.innerHTML=value||'';}
  },[]);

    if(ref.current&&!focused){
      ref.current.innerHTML=value||'';
      prevKey.current=memoKey;
    }
  },[memoKey,value,focused]);
  const execCmd=(cmd,e)=>{e.preventDefault();document.execCommand(cmd,false,null);ref.current?.focus();onUpdate(ref.current?.innerHTML||'');};

    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>

        <div style={{display:'inline-flex',gap:1,padding:'2px 3px',backgroundColor:'#fff',border:'0.5px solid #E6E6EC',borderRadius:7,boxShadow:'0 2px 8px rgba(15,15,35,0.09)',flexShrink:0,alignSelf:'flex-start',marginBottom:2}}>

        data-placeholder="메모"/>
    </div>
  );

  const numColor=todayCell?'#534AB7':isRed?'#E24B4A':isBlue?'#4A7BC4':isFirstOfMonth?'#0EA5E9':'#3A3A40';

// CalendarWeekRow: multi-day blocks overlaid on top of date cells
function CalendarWeekRow({weekDates,eventsByDate,multiDayBlocks,drag,onCellMouseDown,onCellMouseEnter,onCellMouseUp,onDblClickCell,onBlockClick,onEventClick,projects,ref_}){
  const{state}=useStore();
  const catStyle=useDynCatStyle();const wsk=toDateKey(weekDates[0]),wek=toDateKey(weekDates[6]);
  const weekBlocks=multiDayBlocks.filter(b=>{
    if(b.startDate>wek||b.endDate<wsk)return false;
    if(b.category==='work')return state.workVisible;
    if(b.category==='personal')return state.personalVisible;
    const cl=(state.customLayers||[]).find(l=>l.id===b.category);
    if(cl)return cl.visible!==false;
    return true;
  });
  const blocksWithLanes=assignLanes(weekBlocks,weekDates);
  const numLanes=blocksWithLanes.length>0?Math.max(...blocksWithLanes.map(b=>b.lane))+1:0;
  const LANE_H=16;
  const blockAreaH=numLanes>0?numLanes*LANE_H+4:0;
  const dragSorted=drag?[drag.start,drag.current].sort():null;
  return(
    <div ref={ref_} style={{position:'relative'}}>
      {/* Date cells row - block area reserved at bottom */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',paddingBottom:blockAreaH}}>
        {weekDates.map(date=>{
          const dk=toDateKey(date);
          const inDrag=dragSorted&&dk>=dragSorted[0]&&dk<=dragSorted[1];
          const events=eventsByDate[dk]||[];
          return(
            <CalendarDateCell key={dk} date={date} holiday={getHoliday(dk)}
              events={events} isInDragRange={!!inDrag}
              onMouseDown={(e)=>onCellMouseDown(dk,e)}
              onMouseEnter={()=>onCellMouseEnter(dk)}
              onMouseUp={()=>onCellMouseUp(dk)}
              onDoubleClick={(e)=>{e.stopPropagation();onDblClickCell(dk);}}
              onEventClick={onEventClick}
            />
          );
        })}
      </div>
      {/* Multi-day blocks: absolute overlay at bottom */}
      {numLanes>0&&(
        <div style={{position:'absolute',bottom:0,left:0,right:0,height:blockAreaH,zIndex:3,pointerEvents:'none'}}>
          <div style={{position:'relative',height:'100%'}}>
            {blocksWithLanes.map(b=>{
              const pos=getBlockWeekPos(b,weekDates);
              const proj=projects.find(p=>p.id===b.projectId);
              const cs=catStyle[b.category]||catStyle.work;
              const color=proj?proj.color:cs.dot;
              const bg=proj?lighten(proj.color,0.82):cs.bg;
              return(
                <div key={b.id} onClick={e=>{e.stopPropagation();onBlockClick(b);}}
                  style={{position:'absolute',top:b.lane*LANE_H+2,
                    left:`${(pos.startCol/7)*100}%`,width:`${((pos.endCol-pos.startCol+1)/7)*100}%`,
                    height:LANE_H-2,backgroundColor:bg,
                    borderLeft:pos.isStart?`3px solid ${color}`:'none',
                    borderRadius:pos.isStart&&pos.isEnd?4:pos.isStart?'4px 0 0 4px':pos.isEnd?'0 4px 4px 0':0,
                    padding:'0 5px',overflow:'hidden',whiteSpace:'nowrap',
                    fontSize:11,fontWeight:500,color,display:'flex',alignItems:'center',
                    cursor:'pointer',boxSizing:'border-box',pointerEvents:'all'}}>
                  {pos.isStart&&<span style={{overflow:'hidden',textOverflow:'ellipsis'}}>{getBdayPrefix(b.category,state)}{b.title}</span>}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── CALENDAR SECTION ────────────────────────
function YearView({year,onSelectMonth}){
  const{state}=useStore();
  const today=new Date();
  const[bdayTooltip,setBdayTooltip]=useState(null);
  const[holidayTooltip,setHolidayTooltip]=useState(null);
  const scrollRef=useRef(null);
  const yearRefs=useRef({});
  const years=Array.from({length:8},(_,i)=>today.getFullYear()-2+i);
  const getBdayEvents=(dateKey)=>(state.weeklyEvents||[]).filter(e=>getBdayPrefix(e.category,state)!==''&&e.date===dateKey);
  useEffect(()=>{
    const el=yearRefs.current[year];
    if(el&&scrollRef.current)scrollRef.current.scrollTo({top:el.offsetTop-24,behavior:'instant'});
  },[year]);
  const renderMonthCard=(yr,mo)=>{
    const firstDay=new Date(yr,mo,1);const lastDay=new Date(yr,mo+1,0);
    const startDow=(firstDay.getDay()+6)%7;const daysInMonth=lastDay.getDate();
    const cells=[];
    for(let i=0;i<startDow;i++)cells.push(null);
    for(let d=1;d<=daysInMonth;d++)cells.push(d);
    return(
      <div key={mo} onClick={()=>onSelectMonth(yr,mo)}
        style={{cursor:'pointer',borderRadius:10,padding:'14px 12px',backgroundColor:'#fff',
          border:'1px solid #EFEFEF',boxShadow:'0 1px 4px rgba(0,0,0,0.05)',transition:'box-shadow 0.15s,border-color 0.15s'}}
        onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 4px 14px rgba(83,74,183,0.13)';e.currentTarget.style.borderColor='#C5C0F0';}}
        onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 1px 4px rgba(0,0,0,0.05)';e.currentTarget.style.borderColor='#EFEFEF';}}>
        <div style={{fontSize:13,fontWeight:700,color:'#534AB7',marginBottom:10,paddingLeft:2,letterSpacing:'-0.2px'}}>{mo+1}월</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',rowGap:2,columnGap:0}}>
          {['M','T','W','T','F','S','S'].map((d,i)=>(
            <div key={i} style={{textAlign:'center',fontSize:9,color:i===6?'#FDAAB0':i===5?'#A9C4E8':'#D0D0D0',paddingBottom:5,fontWeight:600,letterSpacing:'0.2px'}}>{d}</div>
          ))}
          {cells.map((d,ci)=>{
            if(!d)return<div key={'e'+ci}/>;
            const colDow=(startDow+d-1)%7;
            const dateKey=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const holiday=getHoliday(dateKey);
            const isHoliday=holiday!==null;
            const bdayEvs=getBdayEvents(dateKey);
            const isBday=bdayEvs.length>0;
            const isTd=today.getFullYear()===yr&&today.getMonth()===mo&&today.getDate()===d;
            const isRed=isHoliday||colDow===6;
            const isBlue=colDow===5&&!isHoliday;
            const textColor=isTd?'#fff':isRed?'#E24B4A':isBlue?'#4A7BC4':'#444';
            return(
              <div key={d} onClick={e=>{e.stopPropagation();onSelectMonth(yr,mo);}}
                style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                  fontSize:10,position:'relative',height:24,fontWeight:isTd?700:400,color:textColor}}>
                <div
                  style={{width:18,height:18,display:'flex',alignItems:'center',justifyContent:'center',
                    backgroundColor:isTd?'#534AB7':'transparent',borderRadius:'50%',fontSize:10,lineHeight:1}}
                  onMouseEnter={isHoliday&&!isTd?e=>{e.stopPropagation();const r=e.currentTarget.getBoundingClientRect();setHolidayTooltip({name:holiday,x:r.left+r.width/2,y:r.top});}:undefined}
                  onMouseLeave={isHoliday&&!isTd?()=>setHolidayTooltip(null):undefined}
                >{d}</div>
                {isBday&&!isTd&&(
                  <div
                    style={{position:'absolute',bottom:0,left:'50%',transform:'translateX(-50%)',
                      width:16,height:10,display:'flex',alignItems:'flex-end',justifyContent:'center',
                      cursor:'default',zIndex:2,paddingBottom:1}}
                    onClick={e=>e.stopPropagation()}
                    onMouseEnter={e=>{e.stopPropagation();const r=e.currentTarget.getBoundingClientRect();setBdayTooltip({names:bdayEvs.map(ev=>ev.title),x:r.left+r.width/2,y:r.top});}}
                    onMouseLeave={()=>setBdayTooltip(null)}
                  >
                    <div style={{width:5,height:5,borderRadius:'50%',backgroundColor:'#EC4899'}}/>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  };
  return(
    <div ref={scrollRef} style={{flex:1,overflowY:'auto',padding:'20px 16px',backgroundColor:'#fff'}}>
      {years.map((yr)=>(
        <div key={yr} ref={el=>yearRefs.current[yr]=el}
          style={{opacity:yr===year?1:0.38,marginBottom:44,transition:'opacity 0.2s',pointerEvents:yr===year?undefined:'auto'}}>
          <div style={{fontSize:16,fontWeight:700,color:'#534AB7',marginBottom:16,textAlign:'center',letterSpacing:'-0.3px'}}>{yr}년</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,240px)',gap:16,justifyContent:'center'}}>
            {Array.from({length:12},(_,mo)=>renderMonthCard(yr,mo))}
          </div>
        </div>
      ))}
      {bdayTooltip&&(
        <div style={{position:'fixed',left:bdayTooltip.x,top:bdayTooltip.y-38,transform:'translateX(-50%)',
          backgroundColor:'#1F2937',color:'#fff',fontSize:11,padding:'5px 9px',borderRadius:6,
          pointerEvents:'none',zIndex:9999,whiteSpace:'nowrap',
          boxShadow:'0 2px 10px rgba(0,0,0,0.18)',letterSpacing:'-0.2px'}}>
          🎂 {bdayTooltip.names.join(', ')}
          <div style={{position:'absolute',bottom:-5,left:'50%',transform:'translateX(-50%)',
            width:0,height:0,borderLeft:'5px solid transparent',
            borderRight:'5px solid transparent',borderTop:'5px solid #1F2937'}}/>
        </div>
      )}
      {holidayTooltip&&(
        <div style={{position:'fixed',left:holidayTooltip.x,top:holidayTooltip.y-38,transform:'translateX(-50%)',
          backgroundColor:'rgba(226,75,74,0.95)',color:'#fff',fontSize:11,padding:'5px 9px',borderRadius:6,
          pointerEvents:'none',zIndex:9999,whiteSpace:'nowrap',
          boxShadow:'0 2px 10px rgba(0,0,0,0.18)',letterSpacing:'-0.2px'}}>
          🎌 {holidayTooltip.name}
          <div style={{position:'absolute',bottom:-5,left:'50%',transform:'translateX(-50%)',
            width:0,height:0,borderLeft:'5px solid transparent',
            borderRight:'5px solid transparent',borderTop:'5px solid rgba(226,75,74,0.95)'}}/>
        </div>
      )}
    </div>
  );
}
function CalendarSection(){
  const{state,dispatch}=useStore();
  const{freeLayerVisible,setFreeLayerVisible,setStickerMode,setRightDockOpen,calendarScrollRef,scrollToTodayRef}=useLayout();
  const showToast=useToast();
  const today_=new Date();
  const[navLabel,setNavLabel]=useState('');
  const[drag,setDrag]=useState(null);
  const[eventPopoverDate,setEventPopoverDate]=useState(null);
  const[blockPopoverDates,setBlockPopoverDates]=useState(null);
  const[editBlock,setEditBlock]=useState(null);
  const[detailEvent,setDetailEvent]=useState(null);
  const[noteMdl,setNoteMdl]=useState(null);
  const weekRefs=useRef({});
  const[yearView,setYearView]=useState(false);
  const[navYear,setNavYear]=useState(today_.getFullYear());
  const[navMonth,setNavMonth]=useState(today_.getMonth());

  // Generate flat list of all weeks (-13..+13 months from today)
  const allWeeks=useMemo(()=>{
    const weeks=[];
    const start=new Date(today_.getFullYear()-2,0,1);
    // Align to Monday
    const dow=(start.getDay()+6)%7;
    start.setDate(start.getDate()-dow);
    const end=new Date(today_.getFullYear()+5,11,31);
    const cur=new Date(start);
    while(cur<=end){
      const wk=Array.from({length:7},(_,i)=>{const d=new Date(cur);d.setDate(cur.getDate()+i);return d;});
      weeks.push(wk);
      cur.setDate(cur.getDate()+7);
    }
    return weeks;
  },[]);

  // Scroll handler: update header label based on visible week
  const updateNavFromScroll=useCallback(()=>{
    const container=calendarScrollRef?.current;
    if(!container)return;
    const scrollTop=container.scrollTop;
    const entries=Object.entries(weekRefs.current).filter(([,el])=>el).map(([i,el])=>({i:+i,el})).sort((a,b)=>a.el.offsetTop-b.el.offsetTop);
    for(const{i,el}of entries){
      if(el.offsetTop+el.offsetHeight>scrollTop+2){
        const wk=allWeeks[i];
        if(wk){
          // Use the majority month of this week
          const months=wk.map(d=>d.getMonth());
          const mCount={};months.forEach(m=>mCount[m]=(mCount[m]||0)+1);
          const dominantM=+Object.entries(mCount).sort((a,b)=>b[1]-a[1])[0][0];
          const yr=wk.find(d=>d.getMonth()===dominantM)?.getFullYear()||wk[0].getFullYear();
          setNavYear(yr);
          setNavMonth(dominantM);
          setNavLabel(`${yr}년 ${dominantM+1}월`);
        }
        break;
      }
    }
  },[allWeeks,calendarScrollRef]);

  useEffect(()=>{
    const container=calendarScrollRef?.current;
    if(!container)return;
    container.addEventListener('scroll',updateNavFromScroll,{passive:true});
    return()=>container.removeEventListener('scroll',updateNavFromScroll);
  },[updateNavFromScroll,calendarScrollRef]);

  // Scroll to a specific year/month
  const scrollToYearMonth=useCallback((yr,mo)=>{
    const idx=allWeeks.findIndex(wk=>wk.some(d=>d.getFullYear()===yr&&d.getMonth()===mo&&d.getDate()===1));
    const el=weekRefs.current[idx>=0?idx:0];
    if(el&&calendarScrollRef?.current)calendarScrollRef.current.scrollTo({top:el.offsetTop,behavior:'auto'});
  },[allWeeks,calendarScrollRef]);

  useEffect(()=>{
    scrollToTodayRef.current=()=>{scrollToYearMonth(today_.getFullYear(),today_.getMonth());updateNavFromScroll();};
    const _go=()=>{scrollToYearMonth(today_.getFullYear(),today_.getMonth());updateNavFromScroll();};
    setTimeout(_go,250);setTimeout(_go,900);setTimeout(_go,2000);
  },[scrollToYearMonth,updateNavFromScroll]);
  const goPrev=()=>{const nm=navMonth===0?11:navMonth-1;const ny=navMonth===0?navYear-1:navYear;setNavYear(ny);setNavMonth(nm);scrollToYearMonth(ny,nm);};
  const goNext=()=>{const nm=navMonth===11?0:navMonth+1;const ny=navMonth===11?navYear+1:navYear;setNavYear(ny);setNavMonth(nm);scrollToYearMonth(ny,nm);};
  const goToday=()=>{
    const todayDate=new Date();
    const todayKey=toDateKey(todayDate);
    const idx=allWeeks.findIndex(wk=>wk.some(d=>toDateKey(d)===todayKey));
    const container=calendarScrollRef?.current;
    if(idx>=0&&container){
      const el=weekRefs.current[idx];
      if(el){
        const containerH=container.clientHeight;
        const targetScroll=el.offsetTop-containerH/2+el.offsetHeight/2;
        container.scrollTo({top:Math.max(0,targetScroll),behavior:'auto'});
      }
    } else {
      scrollToYearMonth(todayDate.getFullYear(),todayDate.getMonth());
    }
    setNavYear(todayDate.getFullYear());setNavMonth(todayDate.getMonth());
  };
  const _minYear=today_.getFullYear()-2,_maxYear=today_.getFullYear()+5;
  const goPrevYear=()=>{const ny=Math.max(_minYear,navYear-1);setNavYear(ny);scrollToYearMonth(ny,navMonth);};
  const goNextYear=()=>{const ny=Math.min(_maxYear,navYear+1);setNavYear(ny);scrollToYearMonth(ny,navMonth);};
  const handleYearInput=(e)=>{const y=parseInt(e.target.value,10);if(y>=_minYear&&y<=_maxYear){setNavYear(y);scrollToYearMonth(y,navMonth);}};

  const handleCellMouseDown=(dk,e)=>{e.preventDefault();setDrag({start:dk,current:dk});};
  const handleCellMouseEnter=(dk)=>{if(drag)setDrag(d=>({...d,current:dk}));};
  const handleCellMouseUp=(dk)=>{
    if(!drag)return;
    const{start,current}=drag;setDrag(null);
    if(start===current)return; // single click = handled by dblclick or mousedown
    const sorted=[start,current].sort();setBlockPopoverDates({start:sorted[0],end:sorted[1]});
  };
  const handleDblClick=(dk)=>setEventPopoverDate(dk);
  useEffect(()=>{const h=()=>setDrag(null);document.addEventListener('mouseup',h);return()=>document.removeEventListener('mouseup',h);},[]);

  const eventsByDate=useMemo(()=>{
    const m={};
    (state.weeklyEvents||[]).forEach(e=>{
      let visible=false;
      if(e.category==='work'&&state.workVisible)visible=true;
      if(e.category==='personal'&&state.personalVisible)visible=true;
      if(e.isOutlook&&state.outlookVisible!==false)visible=true;
      const cl=(state.customLayers||[]).find(l=>l.id===e.category);
      if(cl&&cl.visible!==false)visible=true;
      if(visible){if(!m[e.date])m[e.date]=[];m[e.date].push(e);}
    });
    return m;
  },[state.weeklyEvents,state.workVisible,state.personalVisible,state.outlookVisible,state.customLayers]);

  const visibleMonthLabel=navLabel||`${navYear}년 ${navMonth+1}월`;

  return(
    <section style={{display:'flex',flexDirection:'column',flex:1,minHeight:0}}>
      {/* Sticky header */}
      <div style={{flexShrink:0,backgroundColor:'#fff',borderBottom:'0.5px solid #EBEBEB',zIndex:10}}>
        {/* Year/month nav row */}
        <div style={{height:36,display:'flex',alignItems:'center',padding:'0 14px',gap:4}}>
          <span onClick={()=>setYearView(v=>!v)} style={{fontSize:11,fontWeight:700,color:yearView?'#fff':'#534AB7',letterSpacing:'0.8px',flexShrink:0,cursor:'pointer',userSelect:'none',padding:'3px 9px',borderRadius:6,backgroundColor:yearView?'#534AB7':'#F0EFFE',transition:'background-color 0.15s,color 0.15s'}} title="클릭 시 1년 달력">먼슬리</span>
          <div style={{display:'flex',alignItems:'center',gap:0}}>
            <button onClick={goPrevYear} style={{fontSize:15,color:'#C4C4CA',padding:'2px 5px',borderRadius:4}} onMouseEnter={e=>e.currentTarget.style.color='#534AB7'} onMouseLeave={e=>e.currentTarget.style.color='#C8C8C8'}>‹</button>
            <input type="number" value={navYear} onChange={handleYearInput}
              style={{width:54,textAlign:'center',fontSize:16,fontWeight:700,color:'#1A1A1A',letterSpacing:'-0.3px',borderBottom:'none',paddingBottom:0}}
              onFocus={e=>e.target.select()}/>
            <button onClick={goNextYear} style={{fontSize:15,color:'#C4C4CA',padding:'2px 5px',borderRadius:4}} onMouseEnter={e=>e.currentTarget.style.color='#534AB7'} onMouseLeave={e=>e.currentTarget.style.color='#C8C8C8'}>›</button>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:0}}>
            <button onClick={goPrev} style={{fontSize:15,color:'#C4C4CA',padding:'2px 5px',borderRadius:4}} onMouseEnter={e=>e.currentTarget.style.color='#534AB7'} onMouseLeave={e=>e.currentTarget.style.color='#C8C8C8'}>&#8249;</button>
            <span style={{fontSize:16,color:'#1A1A1A',fontWeight:700,minWidth:48,textAlign:'center',userSelect:'none',letterSpacing:'-0.3px'}}>{navMonth+1}월</span>
            <button onClick={goNext} style={{fontSize:15,color:'#C4C4CA',padding:'2px 5px',borderRadius:4}} onMouseEnter={e=>e.currentTarget.style.color='#534AB7'} onMouseLeave={e=>e.currentTarget.style.color='#C8C8C8'}>&#8250;</button>
          </div>
          <div style={{flex:1}}/>
          {freeLayerVisible&&<span style={{fontSize:11,color:'#534AB7',opacity:0.7,marginRight:4}}>더블클릭 → 포스트잇</span>}
          {!freeLayerVisible&&<span style={{fontSize:11,color:'#8E8E96',marginRight:4}}>더블클릭 → 일정 | 드래그 → 기간</span>}
          <button onClick={goToday} style={{fontSize:12,color:'#fff',padding:'4px 12px',backgroundColor:'#534AB7',borderRadius:6,fontWeight:600,flexShrink:0,boxShadow:'0 1px 3px rgba(83,74,183,0.28)'}} onMouseEnter={e=>e.currentTarget.style.backgroundColor='#463DA3'} onMouseLeave={e=>e.currentTarget.style.backgroundColor='#534AB7'}>오늘로</button>
        </div>
        {/* Day names row (sticky) — hidden in year view */}
        {!yearView&&<div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',backgroundColor:'#F7F7FA',borderTop:'0.5px solid #EFEFF3'}}>
          {DAY_NAMES.map((d,i)=><div key={d} style={{textAlign:'center',padding:'5px 0',fontSize:11,color:i===6?'#E24B4A':i===5?'#4A7BC4':'#9A9AA2',fontWeight:600,letterSpacing:'0.5px'}}>{d}</div>)}
        </div>}
      </div>
      {yearView&&<YearView year={navYear} onSelectMonth={(yr,mo)=>{setNavYear(yr);setNavMonth(mo);scrollToYearMonth(yr,mo);setYearView(false);}}/>}
      {/* Scrollable weeks */}
      <div ref={calendarScrollRef} style={{flex:1,overflowY:'auto',position:'relative',display:yearView?'none':'block',borderLeft:'0.5px solid #EBEBEB'}}>
        {allWeeks.map((weekDates,i)=>(
          <CalendarWeekRow key={i}
            ref_={el=>weekRefs.current[i]=el}
            weekDates={weekDates}
            eventsByDate={eventsByDate}
            multiDayBlocks={state.multiDayBlocks.filter(b=>{
              if(!state.workVisible&&b.category==='work')return false;
              if(!state.personalVisible&&b.category==='personal')return false;
              return true;
            })}
            drag={drag}
            onCellMouseDown={handleCellMouseDown}
            onCellMouseEnter={handleCellMouseEnter}
            onCellMouseUp={handleCellMouseUp}
            onDblClickCell={handleDblClick}
            onBlockClick={(b)=>setEditBlock(b)}
            onEventClick={(ev)=>setDetailEvent(ev)}
            projects={state.projects}
          />
        ))}
        <StickyNotesCanvas/>
        <StickerCanvas/>
      </div>
      {/* 노트·스티커 추가 FAB */}
      {!yearView&&<button data-fab="true" onClick={()=>{setFreeLayerVisible(true);setStickerMode(true);setRightDockOpen(true);}}
        title="포스트잇·스티커 추가"
        style={{position:'fixed',right:26,bottom:26,width:48,height:48,borderRadius:'50%',
          backgroundColor:'#534AB7',color:'#fff',fontSize:26,fontWeight:300,lineHeight:1,zIndex:940,
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:'0 4px 14px rgba(83,74,183,0.38), 0 1px 3px rgba(15,15,35,0.12)',
          transition:'transform 0.15s,background-color 0.15s'}}
        onMouseEnter={e=>{e.currentTarget.style.backgroundColor='#463DA3';e.currentTarget.style.transform='scale(1.06)';}}
        onMouseLeave={e=>{e.currentTarget.style.backgroundColor='#534AB7';e.currentTarget.style.transform='scale(1)';}}>+</button>}
      {eventPopoverDate&&<EventPopover date={eventPopoverDate} onClose={()=>setEventPopoverDate(null)}/>}
      {(blockPopoverDates||editBlock)&&<MultiDayBlockPopover
        initialStart={blockPopoverDates?.start}
        initialEnd={blockPopoverDates?.end}
        editBlock={editBlock}
        onClose={()=>{setBlockPopoverDates(null);setEditBlock(null);}}/>}
      {detailEvent&&<EventDetailPopover event={detailEvent}
        onClose={()=>setDetailEvent(null)}
        onDelete={()=>{dispatch({type:'DELETE_EVENT',id:detailEvent.id});setDetailEvent(null);showToast('일정 삭제됨','info');}}
        onUpdate={updates=>{dispatch({type:'UPDATE_EVENT',id:detailEvent.id,updates});setDetailEvent(null);}}
        onOpenNote={note=>{setDetailEvent(null);setTimeout(()=>setNoteMdl(note),50);}}/>}
      {noteMdl&&<MeetingNoteModal initialNote={noteMdl} onClose={()=>setNoteMdl(null)}/>}
    </section>
  );
}
// ─── MAIN AREA ───────────────────────────────
function MainArea(){
  const{leftWidth,leftCollapsed}=useLayout();
  return(
    <main style={{marginLeft:leftCollapsed?0:leftWidth,marginTop:56,height:'calc(100vh - 56px)',display:'flex',flexDirection:'column',backgroundColor:'#FAFAFA',transition:'margin-left 0.2s ease'}}>
      <WeeklySection/>
      <div style={{height:8,backgroundColor:'#F3F3F3',flexShrink:0,borderBottom:'0.5px solid #EBEBEB'}}/>
      <CalendarSection/>
    </main>
  );
}
// ─── APP ──────────────────────────────────────────────────────────
function PanelToggle(){
  const{leftWidth,leftCollapsed,setLeftCollapsed}=useLayout();
  return(
    <button onClick={()=>setLeftCollapsed(c=>!c)} title={leftCollapsed?'패널 열기':'패널 닫기'}
      style={{position:'fixed',top:80,left:leftCollapsed?0:leftWidth,
        width:16,height:36,backgroundColor:'#F0EFF8',borderRadius:'0 7px 7px 0',zIndex:200,
        display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#534AB7',
        border:'0.5px solid #D5D2EE',borderLeft:'none',cursor:'pointer',
        transition:'left 0.2s ease',padding:0,
        boxShadow:'2px 0 6px rgba(83,74,183,0.12)'}}>
      {leftCollapsed?'›':'‹'}
    </button>
  );
}
function RightDock(){
  const{rightDockOpen,setRightDockOpen,setStickerMode}=useLayout();
  React.useEffect(()=>{
    if(!rightDockOpen)return;
    const h=(e)=>{
      const t=e.target;
      if(t.closest('[data-right-dock]')||t.closest('[data-sticky-note]')||t.closest('[data-sticker]')||t.closest('[data-fab]')||t.closest('[data-free-note-panel]'))return;
      setRightDockOpen(false);setStickerMode(false);
    };
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[rightDockOpen,setRightDockOpen,setStickerMode]);
  if(!rightDockOpen)return null;
  return(
    <aside data-right-dock="true" style={{position:'fixed',top:66,right:12,bottom:12,width:308,backgroundColor:'#fff',
      border:'0.5px solid #E6E6EC',borderRadius:14,zIndex:950,display:'flex',flexDirection:'column',overflow:'hidden',
      boxShadow:'0 0 0 0.5px rgba(15,15,35,0.04), 0 12px 32px rgba(15,15,35,0.13), 0 32px 70px rgba(15,15,35,0.15)',animation:'popIn 0.16s ease'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',borderBottom:'0.5px solid #F0F0F3',flexShrink:0}}>
        <span style={{fontSize:11,color:'#8B85C9',letterSpacing:'1px',textTransform:'uppercase',fontWeight:700}}>노트 · 스티커</span>
        <button onClick={()=>{setRightDockOpen(false);setStickerMode(false);}} style={{fontSize:16,color:'#ACACB4',lineHeight:1}}
          onMouseEnter={e=>e.currentTarget.style.color='#666'}
          onMouseLeave={e=>e.currentTarget.style.color='#ACACB4'}>×</button>
      </div>
      <FreeNotePanel/>
    </aside>
  );
}
function App(){
  const[leftWidth,setLeftWidth]=React.useState(300);
  const[leftCollapsed,setLeftCollapsed]=React.useState(false);
  const[weeklyHeight,setWeeklyHeight]=React.useState(220);
  const[freeNotePanelHeight,setFreeNotePanelHeight]=React.useState(200);
  const[freeLayerVisible,setFreeLayerVisible]=React.useState(false);
  const[activeNoteId,setActiveNoteId]=React.useState(null);
  const[stickerMode,setStickerMode]=React.useState(false);
  const[selectedStickerId,setSelectedStickerId]=React.useState(null);
  const[rightDockOpen,setRightDockOpen]=React.useState(false);
  const calendarScrollRef=React.useRef(null);
  const scrollToTodayRef=React.useRef(null);
  React.useEffect(()=>{if(activeNoteId)setRightDockOpen(true);},[activeNoteId]);
  React.useEffect(()=>{if(selectedStickerId)setRightDockOpen(true);},[selectedStickerId]);
  return(
    <LayoutContext.Provider value={{leftWidth,setLeftWidth,leftCollapsed,setLeftCollapsed,weeklyHeight,setWeeklyHeight,freeLayerVisible,setFreeLayerVisible,calendarScrollRef,scrollToTodayRef,freeNotePanelHeight,setFreeNotePanelHeight,activeNoteId,setActiveNoteId,stickerMode,setStickerMode,selectedStickerId,setSelectedStickerId,rightDockOpen,setRightDockOpen}}>
      <StoreProvider>
        <ToastProvider>
          <TopBar/>
          <LeftPanel/>
          <PanelToggle/>
          <MainArea/>
          <RightDock/>
        </ToastProvider>
      </StoreProvider>
    </LayoutContext.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
