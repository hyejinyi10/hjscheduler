// ─── DATE UTILS ──────────────────────────────
const toDateKey = (d)=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${day}`;};
const getWeekStart=(off=0)=>{const t=new Date();t.setHours(0,0,0,0);const dow=t.getDay(),toMon=dow===0?-6:1-dow,m=new Date(t);m.setDate(t.getDate()+toMon+off*7);return m;};
const getWeekDates=(off=0)=>{const mon=getWeekStart(off);return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});};
const isToday=(date)=>toDateKey(date)===toDateKey(new Date());
const isSat=(d)=>d.getDay()===6;
const isSun=(d)=>d.getDay()===0;

function getMonthWeeks(year,month){
  const first=new Date(year,month,1),last=new Date(year,month+1,0);
  const startDow=(first.getDay()+6)%7;
  const cur=new Date(first);cur.setDate(1-startDow);
  const weeks=[];
  while(cur<=last){
    const week=Array.from({length:7},(_,i)=>{const d=new Date(cur);d.setDate(cur.getDate()+i);return d;});
    weeks.push(week);cur.setDate(cur.getDate()+7);
  }
  return weeks;
}

function getBlockWeekPos(block,weekDates){
  const wsk=toDateKey(weekDates[0]),wek=toDateKey(weekDates[6]);
  const cs=block.startDate<wsk?wsk:block.startDate;
  const ce=block.endDate>wek?wek:block.endDate;
  let sc=weekDates.findIndex(d=>toDateKey(d)===cs);
  let ec=weekDates.findIndex(d=>toDateKey(d)===ce);
  // fallback if exact date not in this week (shouldn't happen)
  if(sc<0)sc=0;if(ec<0)ec=6;
  return{startCol:sc,endCol:ec,isStart:block.startDate>=wsk,isEnd:block.endDate<=wek};
}

function assignLanes(blocks,weekDates){
  const wsk=toDateKey(weekDates[0]),wek=toDateKey(weekDates[6]);
  const lanes=[];
  return blocks.map(b=>{
    const cs=b.startDate<wsk?wsk:b.startDate;
    const ce=b.endDate>wek?wek:b.endDate;
    let lane=0;
    while(lane<lanes.length&&lanes[lane].some(r=>!(r.end<cs||r.start>ce)))lane++;
    if(!lanes[lane])lanes[lane]=[];
    lanes[lane].push({start:cs,end:ce});
    return{...b,lane};
  });
}

// 기존 Block[] 데이터를 새 Memo[] 형식으로 변환
function getMemoList(raw){
  if(!raw)return[];
  if(Array.isArray(raw)&&raw.length>0){
    // 이미 새 형식 (Memo: {id, title, body, collapsed})
    if(raw[0]&&typeof raw[0]==='object'&&'title' in raw[0]&&'body' in raw[0])return raw;
    // 기존 Block[] 형식 → 하나의 메모로 변환
    const text=raw.filter(b=>b.text&&b.text.trim()).map(b=>b.text.trim()).join('\n');
    if(!text)return[];
    return[{id:'migrated-'+Date.now(),title:'메모',body:text,collapsed:false}];
  }
  return[];
}
function reducer(state,action){
  switch(action.type){
    case 'SET_WORK_VISIBLE':return{...state,workVisible:action.payload};
    case 'SET_PERSONAL_VISIBLE':return{...state,personalVisible:action.payload};
    case 'ADD_PROJECT':return{...state,projects:[...state.projects,{id:uid(),name:action.name,color:action.color,layer:action.layer||'work'}]};
    case 'UPDATE_PROJECT':return{...state,projects:state.projects.map(p=>p.id===action.id?{...p,...action.updates}:p)};
    case 'DELETE_PROJECT':return{...state,projects:state.projects.filter(p=>p.id!==action.id)};
    case 'ADD_HIGHLIGHT':return{...state,monthlyHighlights:[...state.monthlyHighlights,{id:uid(),projectId:null,date:'',text:'',yearMonth:action.yearMonth||''}]};
    case 'ADD_HIGHLIGHT_PREFILLED':return{...state,monthlyHighlights:[...state.monthlyHighlights,{id:uid(),projectId:action.projectId||null,date:action.date||'',text:action.text||'',yearMonth:action.yearMonth||''}]};
    case 'UPDATE_HIGHLIGHT':return{...state,monthlyHighlights:state.monthlyHighlights.map(h=>h.id===action.id?{...h,...action.updates}:h)};
    case 'DELETE_HIGHLIGHT':return{...state,monthlyHighlights:state.monthlyHighlights.filter(h=>h.id!==action.id)};
    case 'REORDER_PROJECTS':return{...state,projects:action.projects};
    case 'UPDATE_MEMOS':return{...state,projectMemos:{...state.projectMemos,[action.projectId]:action.lines}};
    case 'ADD_MEMO':{const newMemo={id:uid(),title:action.title||'메모',body:'',collapsed:false};return{...state,projectMemos:{...state.projectMemos,[action.projectId]:[...(getMemoList(state.projectMemos[action.projectId])||[]),newMemo]}};}
    case 'UPDATE_MEMO':return{...state,projectMemos:{...state.projectMemos,[action.projectId]:(getMemoList(state.projectMemos[action.projectId])||[]).map(m=>m.id===action.id?{...m,...action.updates}:m)}};

    case 'UPDATE_STICKY_NOTE':return{...state,stickyNotes:state.stickyNotes.map(n=>n.id===action.id?{...n,...action.updates}:n)};
    case 'DELETE_STICKY_NOTE':return{...state,stickyNotes:state.stickyNotes.filter(n=>n.id!==action.id)};
    case 'ADD_PLACED_STICKER':return{...state,placedStickers:[...state.placedStickers,{id:uid(),...action.sticker}]};
    case 'UPDATE_PLACED_STICKER':return{...state,placedStickers:state.placedStickers.map(s=>s.id===action.id?{...s,...action.updates}:s)};
    case 'DELETE_PLACED_STICKER':return{...state,placedStickers:state.placedStickers.filter(s=>s.id!==action.id)};
      case 'CLEAR_ALL_STICKERS':return{...state,placedStickers:[]};
    case 'SET_HL_MONTH':return{...state,hlYear:action.hlYear,hlMonth:action.hlMonth};
    case 'SET_OUTLOOK_EVENTS':return{...state,weeklyEvents:[...state.weeklyEvents.filter(e=>!e.isOutlook),...action.events],outlookSyncedAt:new Date().toISOString()};
    case 'SET_OUTLOOK_USER':return{...state,outlookUser:action.user,outlookClientId:action.clientId||state.outlookClientId};
    case 'DISCONNECT_OUTLOOK':return{...state,outlookUser:null,weeklyEvents:state.weeklyEvents.filter(e=>!e.isOutlook),outlookSyncedAt:null};
    case 'RESTORE_FULL':return{...state,...action.state,weekOffset:0};
    case 'RESTORE_STATE':return action.state;
    default:return state;
  }
}


// ─── AUTO-SNAPSHOT ───────────────────────────
// 배경 이미지는 용량이 커 스냅샷에서 제외 (localStorage 5MB 한도 보호; 복원 시 현재 이미지 유지됨)
function _snapState(state){const{topBarImg,...rest}=state;return rest;}
// 10개 초과 시 '자동' 스냅샷 중 가장 오래된 것부터 삭제 — 수동 저장은 보호
function _pushSnap(snaps,snap){
  let all=[snap,...snaps];
  while(all.length>10){
    let idx=-1;
    for(let i=all.length-1;i>=0;i--){if(all[i].auto){idx=i;break;}}
    if(idx===-1)idx=all.length-1;
    all.splice(idx,1);
  }
  return all;
}
function autoSnapshot(state){
  try{
    const snaps=JSON.parse(localStorage.getItem('snapshots')||'[]');
    const lastAuto=snaps.find(s=>s.auto);const now=Date.now();
    if(lastAuto&&(now-new Date(lastAuto.createdAt).getTime())<3600000)return;
    const snap={id:uid(),createdAt:new Date().toISOString(),label:'자동 스냅샷',auto:true,state:_snapState(state)};
    localStorage.setItem('snapshots',JSON.stringify(_pushSnap(snaps,snap)));
  }catch{}
}
function manualSnapshot(state,label){
  try{
    const snaps=JSON.parse(localStorage.getItem('snapshots')||'[]');
    const snap={id:uid(),createdAt:new Date().toISOString(),label:label||'수동 저장',auto:false,state:_snapState(state)};
    localStorage.setItem('snapshots',JSON.stringify(_pushSnap(snaps,snap)));
  }catch{}
}

// ─── OUTLOOK / MSAL API ──────────────────────
let _msalApp=null;
async function getMsal(clientId){
  if(!window.msal)throw new Error('MSAL 라이브러리 로드 실패. 인터넷 연결 확인 후 새로고침 해주세요.');
  if(_msalApp&&_msalApp._bhClientId===clientId)return _msalApp;
  const cfg={auth:{clientId,authority:'https://login.microsoftonline.com/common',
    // 로그인 후 스케줄러 자기 주소로 복귀 (Azure 앱 등록의 SPA 리디렉션 URI와 정확히 일치해야 함)
    redirectUri:location.origin+location.pathname,
    navigateToLoginRequestUrl:false},
    cache:{cacheLocation:'localStorage',storeAuthStateInCookie:false}};
  const app=new window.msal.PublicClientApplication(cfg);
  await app.initialize();
  app._bhClientId=clientId;_msalApp=app;return app;
}
async function outlookConnect(clientId){
  const app=await getMsal(clientId);
  return await app.loginPopup({scopes:['Calendars.Read','User.Read'],prompt:'select_account'});
}
async function outlookSync(clientId){
  const app=await getMsal(clientId);
  const accounts=app.getAllAccounts();
  if(!accounts.length)throw new Error('로그인 필요');
  let token;
  try{token=await app.acquireTokenSilent({scopes:['Calendars.Read'],account:accounts[0]});}
  catch(e){token=await app.acquireTokenPopup({scopes:['Calendars.Read'],account:accounts[0]});}
  const now=new Date();
  const s=new Date(now.getFullYear()-1,0,1).toISOString();
  const e=new Date(now.getFullYear()+2,0,1).toISOString();
  const resp=await fetch(`https://graph.microsoft.com/v1.0/me/calendarView?startDateTime=${s}&endDateTime=${e}&$top=999&$select=subject,start,end,isAllDay,id`,
    {headers:{Authorization:`Bearer ${token.accessToken}`,'Content-Type':'application/json'}});
  if(!resp.ok)throw new Error('Graph API 오류: '+resp.status);
  const data=await resp.json();
  return(data.value||[]).map(ev=>({
    id:'ol_'+(ev.id||uid()).slice(0,12),
    date:ev.start.dateTime?ev.start.dateTime.slice(0,10):ev.start.date,
    time:ev.start.dateTime?ev.start.dateTime.slice(11,16):undefined,
    title:(ev.subject||'(제목 없음)').normalize('NFC').trim(),
    category:'outlook',isOutlook:true,projectId:null
  }));
}
async function outlookDisconnect(clientId){
  try{
    const app=await getMsal(clientId);
    const accounts=app.getAllAccounts();
    for(const a of accounts)await app.logoutPopup({account:a}).catch(()=>{});
  }catch{}
  _msalApp=null;
}

// ─── CLOUD SYNC (JSONBin.io) ─────────────────
const CLOUD_KEY='cloudApiKey',CLOUD_BIN='cloudBinId',CLOUD_STATUS='cloudStatus';
function cloudGetCreds(){return{apiKey:localStorage.getItem(CLOUD_KEY)||'',binId:localStorage.getItem(CLOUD_BIN)||''};}
// 아웃룩 계정 정보(이름·이메일·Client ID)는 이 기기에만 보관 — 클라우드로 올리지 않음
function _stripLocalOnly(state){const{outlookUser,outlookClientId,outlookSyncedAt,...rest}=state;return rest;}
// rev: 저장 세대 번호. 다른 기기가 먼저 저장했는지 감지해 조용한 덮어쓰기를 막는다.
let _cloudRev=0,_lastRevCheck=0,_conflictWarned=false;
async function cloudCreate(apiKey,state){
  const r=await fetch('https://api.jsonbin.io/v3/b',{
    method:'POST',
    headers:{'Content-Type':'application/json','X-Master-Key':apiKey,'X-Bin-Name':'hyejin-scheduler','X-Bin-Private':'true'},
    body:JSON.stringify({version:2,rev:1,state:_stripLocalOnly(state)})
  });
  if(!r.ok)throw new Error('JSONBin 생성 실패: '+r.status);
  const d=await r.json();_cloudRev=1;return d.metadata.id;
}
async function cloudSave(apiKey,binId,state){
  // 충돌 감지: 60초에 한 번 클라우드 rev 확인. 다른 기기가 앞서 저장했으면 덮어쓰기 중단.
  const now=Date.now();
  if(now-_lastRevCheck>60000){
    _lastRevCheck=now;
    let remoteRev=null;
    try{
      const r0=await fetch('https://api.jsonbin.io/v3/b/'+binId+'/latest',{headers:{'X-Master-Key':apiKey}});
      if(r0.ok){const d0=await r0.json();remoteRev=(d0.record&&d0.record.rev)||0;}
    }catch(e){/* 네트워크 오류 시 이번 검사만 건너뜀 */}
    if(remoteRev!==null&&remoteRev>_cloudRev){
      localStorage.setItem(CLOUD_STATUS,'conflict');
      if(!_conflictWarned){
        _conflictWarned=true;
        alert('⚠️ 다른 기기에서 변경된 데이터가 감지되어 클라우드 저장을 중단했습니다.\n페이지를 새로고침해 최신 데이터를 받은 뒤 이어서 작업해 주세요.\n(새로고침 전까지의 이 기기 변경사항은 클라우드에 반영되지 않습니다)');
      }
      throw new Error('다른 기기 변경 감지 — 새로고침 필요');
    }
  }
  const r=await fetch('https://api.jsonbin.io/v3/b/'+binId,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':apiKey},
    body:JSON.stringify({version:2,rev:_cloudRev+1,state:_stripLocalOnly(state)})
  });
  if(!r.ok)throw new Error('저장 실패: '+r.status);
  _cloudRev+=1;
}
async function cloudLoad(apiKey,binId){
  const r=await fetch('https://api.jsonbin.io/v3/b/'+binId+'/latest',{
    headers:{'X-Master-Key':apiKey}
  });
  if(!r.ok)throw new Error('불러오기 실패: '+r.status);
  const d=await r.json();
  _cloudRev=(d.record&&d.record.rev)||0;
  const s=d.record?.state||d.record;
  if(s&&typeof s==='object'){delete s.outlookUser;delete s.outlookClientId;delete s.outlookSyncedAt;}
  return s;
}

function StoreProvider({children}){
  const [state,rawDispatch]=useReducer(reducer,initialState);
  const historyRef=useRef([]);
  const stateRef=useRef(state);
  // cloudLoadedRef: cloudLoad 완료 전에는 cloudSave 차단 (race condition 방지)
  const cloudLoadedRef=useRef(false);
  useEffect(()=>{stateRef.current=state;},[state]);
  const dispatch=useCallback((action)=>{
    historyRef.current=[...historyRef.current.slice(-49),stateRef.current];
    rawDispatch(action);
  },[rawDispatch]);
  // Auto-snapshot: 시작 1초 후 1회 + 이후 1시간 간격 (앱을 켜둔 상태에서도 동작)
  useEffect(()=>{
    const t=setTimeout(()=>autoSnapshot(stateRef.current),1000);
    const iv=setInterval(()=>autoSnapshot(stateRef.current),3600000);
    return()=>{clearTimeout(t);clearInterval(iv);};
  },[]);

  // 할일 자동 이동: 오전 7시 이후, 미완료 과거 할일 → 오늘(금요일 미완료 → 다음 월요일)
  // 클라우드 로드가 '완료된 뒤' 최신 todos 기준으로 호출됨 (기존 1.5초 타이머 추측 방식 제거)
  const runTodoAutoMove=useCallback((todosArr)=>{
    const today=toDateKey(new Date());
    const hour=new Date().getHours();
    const lastRun=localStorage.getItem('lastTodoAutoMove');
    if(lastRun===today||hour<7)return;
    const todos=todosArr||[];
    const pastUndone=[...new Set(todos.filter(t=>!t.done&&t.date<today).map(t=>t.date))];
    if(pastUndone.length===0){localStorage.setItem('lastTodoAutoMove',today);return;}
    const toToday=[];const toMonday={};
    pastUndone.forEach(dk=>{
      const d=new Date(dk);const dow=d.getDay();
      if(dow===5){// 금요일 → 다음 월요일
        const mon=new Date(d);mon.setDate(d.getDate()+3);const mk=toDateKey(mon);
        if(!toMonday[mk])toMonday[mk]=[];toMonday[mk].push(dk);
      }else{toToday.push(dk);}
    });
    if(toToday.length>0)rawDispatch({type:'BULK_MOVE_TODOS',fromDates:toToday,toDate:today});
    Object.entries(toMonday).forEach(([mk,dates])=>rawDispatch({type:'BULK_MOVE_TODOS',fromDates:dates,toDate:mk}));
    localStorage.setItem('lastTodoAutoMove',today);
  },[rawDispatch]);
  // Cloud sync: load on mount (+ 생일→기념일 마이그레이션)
  useEffect(()=>{
    const doMigrate=(layers)=>{
      const hasBday=(layers||[]).some(l=>l.name==='생일');
      if(hasBday)rawDispatch({type:'MIGRATE_LAYER_NAME',from:'생일',to:'기념일'});
    };
    const{apiKey,binId}=cloudGetCreds();
    if(!apiKey||!binId){
      // 클라우드 미설정이면 저장 즉시 허용
      cloudLoadedRef.current=true;
      doMigrate(stateRef.current.customLayers);
      runTodoAutoMove(stateRef.current.todos);
      return;
    }
    cloudLoad(apiKey,binId).then(s=>{
      if(s){rawDispatch({type:'RESTORE_FULL',state:s});doMigrate(s.customLayers);runTodoAutoMove(s.todos||stateRef.current.todos);}
      else{doMigrate(stateRef.current.customLayers);runTodoAutoMove(stateRef.current.todos);}
      localStorage.setItem(CLOUD_STATUS,'ok');
    }).catch(()=>{
      localStorage.setItem(CLOUD_STATUS,'error');
      doMigrate(stateRef.current.customLayers);
      runTodoAutoMove(stateRef.current.todos);
    }).finally(()=>{
      // 로드 성공/실패 모두 완료 후 저장 허용
      cloudLoadedRef.current=true;
    });
  },[]);
  useEffect(()=>{
    const onKey=(e)=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){
        const t=e.target;
        if(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable)return;
        e.preventDefault();
        const hist=historyRef.current;
        if(hist.length===0)return;
        const prev=hist[hist.length-1];
        historyRef.current=hist.slice(0,-1);
        rawDispatch({type:'RESTORE_STATE',state:prev});
      }
    };
    document.addEventListener('keydown',onKey);
    return()=>document.removeEventListener('keydown',onKey);
  },[rawDispatch]);
  // ── Debounced localStorage (300ms) ──
  const lsTimerRef=useRef(null);
  useEffect(()=>{
    if(lsTimerRef.current)clearTimeout(lsTimerRef.current);
    lsTimerRef.current=setTimeout(()=>{
      const LS_KEYS=['workVisible','personalVisible','projects','monthlyHighlights','projectMemos',
        'weeklyEvents','todos','weekMemos','weeklyCollapsed','multiDayBlocks','outlookVisible','outlookColor',
        'customLayers','layerOrder','meetingNotes','stickyNotes','placedStickers','workLabel','personalLabel','workColor','personalColor',
        'titleText','topBarBg','topBarImg',
        'outlookUser','outlookClientId','outlookSyncedAt'];
      LS_KEYS.forEach(k=>lsSave(k,state[k]));
      // Also push to cloud if configured — cloudLoad 완료 후에만 실행
      const{apiKey,binId}=cloudGetCreds();
      if(apiKey&&binId&&cloudLoadedRef.current){
        cloudSave(apiKey,binId,state)
          .then(()=>localStorage.setItem(CLOUD_STATUS,'ok'))
          .catch(()=>localStorage.setItem(CLOUD_STATUS,'error'));
      }
    },300);
    return()=>{if(lsTimerRef.current)clearTimeout(lsTimerRef.current);};
  },[state]);
  return<StoreContext.Provider value={{state,dispatch}}>{children}</StoreContext.Provider>;
}
const useStore=()=>useContext(StoreContext);

const ToastContext=createContext(null);
function ToastProvider({children}){
  const[toasts,setToasts]=useState([]);

    const id=Date.now();
    setToasts(t=>[...t.slice(-4),{id,message,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2800);
  },[]);
  const COLORS={success:{bg:'#1A1A1A',text:'#fff',dot:'#4ADE80'},error:{bg:'#E24B4A',text:'#fff',dot:'#FCA5A5'},info:{bg:'#534AB7',text:'#fff',dot:'#A5B4FC'}};
  return(
    <ToastContext.Provider value={showToast}>
      {children}
      <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,display:'flex',flexDirection:'column',gap:6,pointerEvents:'none'}}>
        {toasts.map((t,i)=>{const c=COLORS[t.type]||COLORS.success;return(
          <div key={t.id} style={{display:'flex',alignItems:'center',gap:8,padding:'9px 14px',
            backgroundColor:c.bg,borderRadius:8,boxShadow:'0 4px 18px rgba(0,0,0,0.18)',
            fontSize:13,color:c.text,fontWeight:500,letterSpacing:'-0.1px',
            animation:'slideInToast 0.25s ease',whiteSpace:'nowrap',minWidth:180,maxWidth:320}}>
            <span style={{width:7,height:7,borderRadius:'50%',backgroundColor:c.dot,flexShrink:0}}/>
            <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis'}}>{t.message}</span>
          </div>
        );})}
      </div>
    </ToastContext.Provider>
  );
}

const STICKY_COLORS=['#FFFDE7','#E3F2FD','#E8F5E9','#FCE4EC','#EDE7F6','#FFF3E0'];

function StickyNote({note,isActive,onUpdate,onDelete,onFocus,freeLayerVisible}){
  const isText=note.type==='text';
  const collapsed=isText?false:(note.collapsed||false);
  const fontSize=note.fontSize||(isText?15:13);
  const textColor=note.textColor||(isText?'#1A1A1A':'#333');
  const bgColor=isText?(note.bgColor||'transparent'):(note.color||STICKY_COLORS[0]);
  const edRef=React.useRef(null);
  const rootRef=React.useRef(null);

  /* contentEditable 초기화 (plain text → HTML 마이그레이션) */
  React.useEffect(()=>{
    if(edRef.current){
      const h=(note.html!=null&&note.html!=='')?note.html:(note.text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
      if(edRef.current.innerHTML!==h)edRef.current.innerHTML=h;
    }
  },[collapsed]);
  const syncNote=()=>{const el=edRef.current;if(el)onUpdate({html:el.innerHTML,text:el.textContent||''});};
  const fmt=(cmd,val)=>{document.execCommand(cmd,false,val||null);edRef.current?.focus();syncNote();};

  /* 드래그 이동 */
  const startDrag=(e)=>{
    e.stopPropagation();e.preventDefault();
    const sx=e.clientX,sy=e.clientY,nx=note.x,ny=note.y;
    const onMove=(ev)=>onUpdate({x:nx+(ev.clientX-sx),y:ny+(ev.clientY-sy)});
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  };
  const onRootDown=(e)=>{
    onFocus?.();
    if(!freeLayerVisible)return;
    if(e.target.isContentEditable||e.target.tagName==='BUTTON'||e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
    rootRef.current&&rootRef.current.focus();
    startDrag(e);
  };
  /* 리사이즈: 텍스트박스는 가로만, 포스트잇은 양방향 */
  const onResizeStart=(e)=>{
    e.stopPropagation();e.preventDefault();
    const sx=e.clientX,sy=e.clientY,sw=note.w||170,sh=note.h||(isText?36:140);
    const onMove=(ev)=>{
      if(isText)onUpdate({w:Math.max(60,sw+(ev.clientX-sx)),h:Math.max(24,sh+(ev.clientY-sy))});
      else onUpdate({w:Math.max(120,sw+(ev.clientX-sx)),h:Math.max(60,sh+(ev.clientY-sy))});
    };
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  };

  const tbBtn={color:'#3F3E45',fontSize:11.5,background:'none',border:'none',minWidth:22,height:22,padding:'0 4px',borderRadius:5,cursor:'pointer',fontFamily:'inherit',lineHeight:1,display:'inline-flex',alignItems:'center',justifyContent:'center',flexShrink:0};
  const[openPicker,setOpenPicker]=React.useState(null);
  const SN_TEXT_COLORS=['#1A1A1A','#534AB7','#1B7FDB','#2FAE60','#E8792B','#E24B4A','#8B5CF6','#96969E','#fff'];
  const SN_HL_COLORS=['#FFF176','#CCFF90','#FFB3C6','#80DEEA','#FFCC80','#CF9FFF'];
  const SN_BG_COLORS=isText?['transparent','#FFFDE7','#FFF3E0','#E3F2FD','#E8F5E9','#FCE4EC','#EDE7F6','#F1EAFE','#1F1F29']:STICKY_COLORS;
  const applySel=(cmd,val,fallback)=>{
    const sel=window.getSelection();
    const has=sel&&!sel.isCollapsed&&edRef.current&&edRef.current.contains(sel.anchorNode);
    if(has){document.execCommand(cmd,false,val);syncNote();}
    else if(fallback)fallback();
  };

  return(
    <div ref={rootRef} data-sticky-note="true" tabIndex={0}
      className={isText?'txt-note':''}
      onKeyDown={e=>{if((e.key==='Delete'||e.key==='Backspace')&&isActive&&e.target===e.currentTarget){e.preventDefault();e.stopPropagation();onDelete();}}}
      onMouseDown={onRootDown}
      style={{position:'absolute',left:note.x,top:note.y,
        width:note.w||170,
        height:collapsed?(isActive?26:22):(isText?(note.h||'auto'):undefined),
        minHeight:collapsed?undefined:(isText?Math.round(fontSize*1.6)+6:(note.h||140)),
        backgroundColor:bgColor,
        borderRadius:isText?3:6,
        boxShadow:isText?'none':(isActive?'0 4px 20px rgba(0,0,0,0.18)':'0 2px 10px rgba(0,0,0,0.11)'),
        border:isText?(isActive?'1px solid #AFA9EC':'1px solid transparent'):'0.5px solid rgba(0,0,0,0.07)',
        padding:collapsed?'2px 8px':(isText?'2px 5px':'8px 10px'),
        cursor:freeLayerVisible?(isActive?'default':'grab'):'default',
        pointerEvents:'all',
        userSelect:'none',display:'flex',flexDirection:'column',
        overflow:isText?'visible':'hidden',
        zIndex:isActive?50:30,outline:'none',
        transition:'box-shadow 0.15s,border-color 0.15s'}}>

      {/* ── 플로팅 서식 툴바 (선택 시, Miro 스타일) ── */}
      {isActive&&freeLayerVisible&&!collapsed&&(
        <div onMouseDown={e=>e.stopPropagation()}
          style={{position:'absolute',top:openPicker?-62:-36,left:-1,display:'flex',flexDirection:'column',gap:1,
            padding:'3px 4px',backgroundColor:'#fff',border:'0.5px solid #E4E4EA',borderRadius:8,
            boxShadow:'0 0 0 0.5px rgba(15,15,35,0.04), 0 6px 18px rgba(15,15,35,0.14)',zIndex:70,whiteSpace:'nowrap'}}>
          <div style={{display:'flex',alignItems:'center',gap:1}}>
            <span title="드래그하여 이동" onMouseDown={startDrag}
              style={{cursor:'grab',color:'#B0B0B8',fontSize:11,padding:'0 5px',userSelect:'none',lineHeight:1}}>⠿</span>
            <div style={{width:1,height:14,backgroundColor:'#ECECF1',margin:'0 2px'}}/>
            <button className="fmt-btn" title="굵게" onMouseDown={e=>{e.preventDefault();fmt('bold');}} style={{...tbBtn,fontWeight:700}}>B</button>
            <button className="fmt-btn" title="기울임" onMouseDown={e=>{e.preventDefault();fmt('italic');}} style={{...tbBtn,fontStyle:'italic',fontFamily:'Georgia,serif'}}>i</button>
            <button className="fmt-btn" title="밑줄" onMouseDown={e=>{e.preventDefault();fmt('underline');}} style={{...tbBtn,textDecoration:'underline'}}>U</button>
            <button className="fmt-btn" title="취소선" onMouseDown={e=>{e.preventDefault();fmt('strikeThrough');}} style={{...tbBtn,textDecoration:'line-through'}}>S</button>
            <button className="fmt-btn" title="글머리 기호" onMouseDown={e=>{e.preventDefault();fmt('insertUnorderedList');}} style={tbBtn}>•</button>
            <div style={{width:1,height:14,backgroundColor:'#ECECF1',margin:'0 2px'}}/>
            <button className="fmt-btn" title="글자색 (드래그한 부분 또는 전체)" onMouseDown={e=>{e.preventDefault();setOpenPicker(p=>p==='fore'?null:'fore');}}
              style={{...tbBtn,flexDirection:'column',gap:1.5,backgroundColor:openPicker==='fore'?'#F1F1F5':'transparent'}}>
              <span style={{lineHeight:1,fontSize:10.5,fontWeight:700}}>A</span>
              <span style={{width:11,height:3,borderRadius:1.5,backgroundColor:textColor==='#fff'?'#C8C8D0':textColor,display:'block'}}/>
            </button>
            <button className="fmt-btn" title="마커 (드래그한 부분 색칠)" onMouseDown={e=>{e.preventDefault();setOpenPicker(p=>p==='hl'?null:'hl');}}
              style={{...tbBtn,backgroundColor:openPicker==='hl'?'#F1F1F5':'transparent'}}>
              <span style={{width:12,height:12,borderRadius:3,background:'linear-gradient(135deg,#FFF176 50%,#80DEEA 50%)',display:'block',boxShadow:'inset 0 0 0 0.5px rgba(0,0,0,0.12)'}}/>
            </button>
            <button className="fmt-btn" title="박스 배경색" onMouseDown={e=>{e.preventDefault();setOpenPicker(p=>p==='bg'?null:'bg');}}
              style={{...tbBtn,backgroundColor:openPicker==='bg'?'#F1F1F5':'transparent'}}>
              <span style={{width:12,height:12,borderRadius:3,backgroundColor:bgColor==='transparent'?'#fff':bgColor,border:bgColor==='transparent'?'1px dashed #C8C8D0':'none',display:'block',boxShadow:'inset 0 0 0 0.5px rgba(0,0,0,0.12)'}}/>
            </button>
            <div style={{width:1,height:14,backgroundColor:'#ECECF1',margin:'0 2px'}}/>
            <button className="fmt-btn" title="글자 작게" onMouseDown={e=>{e.preventDefault();onUpdate({fontSize:Math.max(9,fontSize-1)});}} style={{...tbBtn,fontSize:10}}>A−</button>
            <button className="fmt-btn" title="글자 크게" onMouseDown={e=>{e.preventDefault();onUpdate({fontSize:Math.min(48,fontSize+1)});}} style={{...tbBtn,fontSize:12.5}}>A+</button>
            <div style={{width:1,height:14,backgroundColor:'#ECECF1',margin:'0 2px'}}/>
            {!isText&&(
              <button className="fmt-btn" title="접기" onMouseDown={e=>{e.preventDefault();onUpdate({collapsed:!collapsed});}} style={{...tbBtn,fontSize:9}}>▲</button>
            )}
            <button className="fmt-btn" title="삭제" onMouseDown={e=>{e.preventDefault();onDelete();}} style={{...tbBtn,color:'#C94B4A',fontSize:13}}>×</button>
          </div>
          {openPicker&&(
            <div style={{display:'flex',alignItems:'center',gap:3,padding:'3px 3px 1px',borderTop:'0.5px solid #F0F0F3'}}>
              {openPicker==='fore'&&SN_TEXT_COLORS.map(c=>(
                <button key={c} onMouseDown={e=>{e.preventDefault();applySel('foreColor',c,()=>onUpdate({textColor:c}));}}
                  style={{width:17,height:17,borderRadius:'50%',border:'none',cursor:'pointer',padding:0,backgroundColor:c,flexShrink:0,
                    boxShadow:c==='#fff'?'inset 0 0 0 1px #D6D6DE':'inset 0 0 0 0.5px rgba(0,0,0,0.14)'}}/>
              ))}
              {openPicker==='hl'&&(<>
                {SN_HL_COLORS.map(c=>(
                  <button key={c} title="드래그한 텍스트에 마커" onMouseDown={e=>{e.preventDefault();applySel('backColor',c,null);}}
                    style={{width:17,height:17,borderRadius:4,border:'none',cursor:'pointer',padding:0,backgroundColor:c,flexShrink:0,boxShadow:'inset 0 0 0 0.5px rgba(0,0,0,0.12)'}}/>
                ))}
                <button title="마커 제거" onMouseDown={e=>{e.preventDefault();applySel('backColor','rgba(0,0,0,0)',null);}}
                  style={{width:17,height:17,borderRadius:4,border:'none',cursor:'pointer',padding:0,backgroundColor:'#fff',boxShadow:'inset 0 0 0 1px #D6D6DE',fontSize:8,color:'#96969E',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>✕</button>
                <span style={{fontSize:9,color:'#A8A8B0',paddingLeft:2}}>드래그한 부분에 적용</span>
              </>)}
              {openPicker==='bg'&&SN_BG_COLORS.map(c=>(
                <button key={c} onMouseDown={e=>{e.preventDefault();onUpdate(isText?{bgColor:c}:{color:c});}}
                  style={{width:17,height:17,borderRadius:4,cursor:'pointer',padding:0,flexShrink:0,
                    backgroundColor:c==='transparent'?'#fff':c,
                    border:c==='transparent'?'1px dashed #C8C8D0':'none',
                    boxShadow:c==='transparent'?'none':'inset 0 0 0 0.5px rgba(0,0,0,0.10)'}}/>

        </div>
      )}

      {/* ── 본문 (리치 텍스트) ── */}
      {!collapsed&&(
        <div ref={edRef} contentEditable={freeLayerVisible} suppressContentEditableWarning
          className="note-editor"
          data-placeholder={isText?'텍스트 입력':'메모 입력...'}
          spellCheck={false}
          onMouseDown={e=>{e.stopPropagation();if(!freeLayerVisible)return;if(!isActive){e.preventDefault();onFocus?.();rootRef.current&&rootRef.current.focus();startDrag(e);}}}
          onFocus={()=>onFocus?.()}
          onInput={syncNote}
          onBlur={syncNote}
          style={{flex:1,minHeight:isText?Math.round(fontSize*1.5):80,
            fontSize,color:textColor,
            outline:'none',cursor:'text',lineHeight:1.55,fontFamily:'inherit',
            fontWeight:isText?500:400,padding:0,wordBreak:'break-word',whiteSpace:'pre-wrap',userSelect:'text'}}/>
      )}
      {collapsed&&<span style={{fontSize:11,color:textColor,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,opacity:0.7}}>
        {note.text||'(빈 노트)'}
      </span>}

      {/* ── 작성일 (포스트잇만) ── */}
      {!isText&&!collapsed&&note.createdAt&&(
        <div style={{fontSize:7,color:'rgba(0,0,0,0.25)',textAlign:'right',flexShrink:0,
          marginTop:'auto',paddingTop:2,lineHeight:1.4,letterSpacing:'0.2px'}}>
          {(()=>{const d=new Date(note.createdAt);const yy=String(d.getFullYear()).slice(2);const mm=String(d.getMonth()+1).padStart(2,'0');const dd=String(d.getDate()).padStart(2,'0');const hh=String(d.getHours()).padStart(2,'0');const mi=String(d.getMinutes()).padStart(2,'0');return`'${yy}.${mm}.${dd} ${hh}:${mi}`;})()}
        </div>
      )}
      {/* ── 리사이즈 핸들 ── */}
      {freeLayerVisible&&!collapsed&&isActive&&(
        <div onMouseDown={onResizeStart}
          style={{position:'absolute',right:-4,bottom:-4,width:16,height:16,cursor:'se-resize',
            display:'flex',alignItems:'center',justifyContent:'center',zIndex:60}}
          onClick={e=>e.stopPropagation()}>
          <div style={{width:9,height:9,borderRadius:2.5,backgroundColor:'#AFA9EC',border:'1.5px solid #fff',boxShadow:'0 1px 3px rgba(15,15,35,0.25)'}}/>
        </div>
      )}
    </div>
  );
}

// StickyNotesCanvas: renders inside CalendarSection
function StickyNotesCanvas(){
  const{state,dispatch}=useStore();
  const{freeLayerVisible,calendarScrollRef,activeNoteId,setActiveNoteId}=useLayout();

  // Deactivate note when clicking outside any note
  useEffect(()=>{
    const h=(e)=>{if(!e.target.closest('[data-sticky-note]')&&!e.target.closest('[data-free-note-panel]'))setActiveNoteId(null);};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[setActiveNoteId]);

  useEffect(()=>{
    const h=(e)=>{
      if((e.key==='Delete'||e.key==='Backspace')&&activeNoteId){
        const t=e.target;
        if(t.tagName==='TEXTAREA'||t.tagName==='INPUT'||t.isContentEditable)return;
        e.preventDefault();
        dispatch({type:'DELETE_STICKY_NOTE',id:activeNoteId});
        setActiveNoteId(null);
      }
    };
    document.addEventListener('keydown',h);
    return()=>document.removeEventListener('keydown',h);
  },[activeNoteId,dispatch,setActiveNoteId]);

  const handleDblClick=useCallback((e)=>{
    if(!freeLayerVisible)return;
    if(e.target!==e.currentTarget)return;
    const container=calendarScrollRef?.current;
    if(!container)return;
    const rect=container.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const y=container.scrollTop+(e.clientY-rect.top);
    const newId='n'+Date.now();
    dispatch({type:'ADD_STICKY_NOTE',note:{id:newId,x,y,w:170,h:140,text:'',color:STICKY_COLORS[0],type:'sticky',createdAt:new Date().toISOString()}});
    setActiveNoteId(newId);
  },[freeLayerVisible,calendarScrollRef,dispatch]);

  return(
    <div onDoubleClick={handleDblClick}
      style={{position:'absolute',top:0,left:0,right:0,bottom:0,minHeight:'100%',
        pointerEvents:freeLayerVisible?'all':'none',
        visibility:freeLayerVisible?'visible':'hidden',
        cursor:freeLayerVisible?'crosshair':'default',
        zIndex:20}}>
      {(state.stickyNotes||[]).map(note=>(
        <StickyNote
          key={note.id}
          note={note}
          isActive={activeNoteId===note.id}
          freeLayerVisible={freeLayerVisible}
          onFocus={()=>setActiveNoteId(note.id)}
          onUpdate={updates=>dispatch({type:'UPDATE_STICKY_NOTE',id:note.id,updates})}
          onDelete={()=>{dispatch({type:'DELETE_STICKY_NOTE',id:note.id});setActiveNoteId(null);}}
        />
      ))}
    </div>
  );
}

const FACE_STICKERS=[
  {id:'f-happy', emoji:'😊'},
  {id:'f-laugh', emoji:'😆'},
  {id:'f-cry',   emoji:'😭'},
  {id:'f-angry', emoji:'😡'},

  {id:'f-party', emoji:'🥳'},
  {id:'f-smirk', emoji:'😏'},
  {id:'f-nerd',  emoji:'🤓'},
  {id:'f-star',  emoji:'🤩'},
  {id:'f-sick',  emoji:'🤒'},
  {id:'f-hug',   emoji:'🥰'},
];

function PlacedSticker({sticker,freeLayerVisible,selectedId,setSelectedId}){
  const{dispatch}=useStore();
  const ref=useRef(null);
  const isSelected=selectedId===sticker.id;
  const size=sticker.size||44;
  const rotation=sticker.rotation||0;

  // Delete key when selected
  useEffect(()=>{
    if(!isSelected)return;
    const onKey=(e)=>{
      if(e.key==='Delete'||e.key==='Backspace'){
        const t=e.target;
        if(t&&(t.tagName==='TEXTAREA'||t.tagName==='INPUT'||t.isContentEditable))return;
        e.preventDefault();
        dispatch({type:'DELETE_PLACED_STICKER',id:sticker.id});
        setSelectedId(null);
      }
    };
    document.addEventListener('keydown',onKey);
    return()=>document.removeEventListener('keydown',onKey);
  },[isSelected,sticker.id,dispatch,setSelectedId]);

  // Drag to move body
  const onBodyMouseDown=useCallback((e)=>{
    if(!freeLayerVisible)return;
    e.stopPropagation();e.preventDefault();
    setSelectedId(sticker.id);
    const startX=e.clientX,startY=e.clientY,ox=sticker.x,oy=sticker.y;
    const onMove=(ev)=>dispatch({type:'UPDATE_PLACED_STICKER',id:sticker.id,updates:{x:ox+(ev.clientX-startX),y:oy+(ev.clientY-startY)}});
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  },[freeLayerVisible,sticker.id,sticker.x,sticker.y,dispatch,setSelectedId]);

  // Resize handle (bottom-right drag)
  const onResizeMouseDown=useCallback((e)=>{
    e.stopPropagation();e.preventDefault();
    const startX=e.clientX,startSz=size;
    const onMove=(ev)=>{
      const ns=Math.max(20,Math.min(200,startSz+(ev.clientX-startX)));
      dispatch({type:'UPDATE_PLACED_STICKER',id:sticker.id,updates:{size:ns}});
    };
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  },[sticker.id,size,dispatch]);

  // Rotation handle (top-center drag)
  const onRotateMouseDown=useCallback((e)=>{
    e.stopPropagation();e.preventDefault();
    const rect=ref.current.getBoundingClientRect();
    const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
    const startAngle=Math.atan2(e.clientY-cy,e.clientX-cx)*(180/Math.PI);
    const startRot=rotation;
    const onMove=(ev)=>{
      const angle=Math.atan2(ev.clientY-cy,ev.clientX-cx)*(180/Math.PI);
      dispatch({type:'UPDATE_PLACED_STICKER',id:sticker.id,updates:{rotation:startRot+(angle-startAngle)}});
    };
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  },[sticker.id,rotation,dispatch]);

  const shapeDef=SHAPE_STICKERS.find(s=>s.id===sticker.content);
  const arrowDef=sticker.type==='arrow_svg'?ARROW_SVG_STICKERS.find(s=>s.id===sticker.content):null;
  const sketchDef=sticker.type==='sketch'?SKETCH_STICKERS.find(s=>s.id===sticker.content):null;
  const faceEmoji=sticker.type==='face'?FACE_STICKERS.find(s=>s.id===sticker.content)?.emoji:null;

  return(
    <div ref={ref} onMouseDown={onBodyMouseDown}
      onClick={(e)=>{e.stopPropagation();if(freeLayerVisible)setSelectedId(sticker.id);}}
      style={{position:'absolute',left:sticker.x,top:sticker.y,width:size,height:size,
        transform:`rotate(${rotation}deg)`,
        cursor:freeLayerVisible?'grab':'default',
        userSelect:'none',pointerEvents:freeLayerVisible?'all':'none',
        zIndex:isSelected?26:22,
        outline:isSelected?'2px solid #534AB7':'none',
        outlineOffset:2,borderRadius:4,
        boxShadow:isSelected?'0 0 0 4px rgba(83,74,183,0.12)':'none',
        transition:'box-shadow 0.1s'}}>
      {sticker.type==='shape'?(
        <div style={{width:'100%',height:'100%'}}>{shapeDef&&shapeDef.render()}</div>
      ):sticker.type==='arrow_svg'?(
        <div style={{width:'100%',height:'100%'}}>{arrowDef&&arrowDef.render()}</div>
      ):sticker.type==='sketch'?(
        <div style={{width:'100%',height:'100%'}}>{sketchDef&&sketchDef.render()}</div>
      ):(
        <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:size*0.8,lineHeight:1,textAlign:'center'}}>
          {sticker.type==='face'?faceEmoji:sticker.content}
        </div>
      )}
      {isSelected&&freeLayerVisible&&(
        <>
          {/* Delete button top-left */}
          <button
            onMouseDown={e=>e.stopPropagation()}
            onClick={e=>{e.stopPropagation();dispatch({type:'DELETE_PLACED_STICKER',id:sticker.id});setSelectedId(null);}}
            style={{position:'absolute',top:-10,left:-10,width:20,height:20,borderRadius:'50%',
              backgroundColor:'#E24B4A',color:'white',fontSize:13,display:'flex',alignItems:'center',
              justifyContent:'center',border:'2px solid white',boxShadow:'0 2px 6px rgba(0,0,0,0.3)',
              zIndex:30,lineHeight:1,padding:0,fontWeight:500,cursor:'pointer'}}>×</button>
          {/* Rotation handle (top-center, orange circle) */}
          <div onMouseDown={onRotateMouseDown}
            style={{position:'absolute',top:-22,left:'50%',transform:'translateX(-50%)',
              width:14,height:14,borderRadius:'50%',backgroundColor:'#FF9800',
              border:'2px solid white',boxShadow:'0 1px 4px rgba(0,0,0,0.25)',
              cursor:'grab',zIndex:30}}/>
          {/* Connector line from rotation handle to sticker */}
          <div style={{position:'absolute',top:-8,left:'50%',transform:'translateX(-50%)',

/* ─── Layer context menu (right-click on any layer chip) ─── */
function LayerCtxMenu({menu,onClose,dispatch,workLabel,workColor,personalLabel,personalColor,outlookColor,customLayers}){
  const isCustom=menu.type==='custom';
  const isOutlook=menu.type==='outlook';
  const layer=isCustom?(customLayers||[]).find(l=>l.id===menu.id):null;
  const initName=menu.type==='work'?workLabel:menu.type==='personal'?personalLabel:layer?.name||'';
  const initColor=menu.type==='work'?workColor:menu.type==='personal'?personalColor:isOutlook?(outlookColor||'#BA7517'):layer?.color||PROJECT_COLORS[0];
  const[name,setName]=React.useState(initName);
  const[color,setColor]=React.useState(initColor);
  const save=()=>{
    if(menu.type==='work')dispatch({type:'UPDATE_WORK_CAT',label:name.trim()||undefined,color});
    else if(menu.type==='personal')dispatch({type:'UPDATE_PERSONAL_CAT',label:name.trim()||undefined,color});
    else if(isOutlook)dispatch({type:'SET_OUTLOOK_COLOR',color});
    else if(isCustom)dispatch({type:'UPDATE_CUSTOM_LAYER',id:menu.id,updates:{name:name.trim()||layer.name,color}});
    onClose();
  };
  const del=()=>{if(isCustom&&confirm(`'${layer?.name}' 레이어를 삭제하시겠습니까?`)){dispatch({type:'DELETE_CUSTOM_LAYER',id:menu.id});onClose();}};
  React.useEffect(()=>{
    const onKey=e=>{if(e.key==='Escape')onClose();};
    const onOut=e=>{if(!e.target.closest('[data-layer-ctx]'))onClose();};
    setTimeout(()=>{document.addEventListener('mousedown',onOut);document.addEventListener('keydown',onKey);},0);
    return()=>{document.removeEventListener('mousedown',onOut);document.removeEventListener('keydown',onKey);};
  },[]);
  const mx=Math.min(menu.x,window.innerWidth-220);
  const my=Math.min(menu.y+4,window.innerHeight-240);
  return(
    <div data-layer-ctx="true" style={{position:'fixed',top:my,left:mx,backgroundColor:'#fff',
      border:'0.5px solid #E0E0E0',borderRadius:10,padding:'12px 14px',
      boxShadow:'0 8px 28px rgba(0,0,0,0.15)',zIndex:5000,minWidth:190,
      display:'flex',flexDirection:'column',gap:10}}>
      <div style={{fontSize:11,color:'#888',fontWeight:600,letterSpacing:'0.2px',textTransform:'uppercase'}}>
        {menu.type==='work'?'업무 레이어':menu.type==='personal'?'개인 레이어':menu.type==='outlook'?'아웃룩 레이어':'커스텀 레이어'}
      </div>
      {!isOutlook&&(
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{width:12,height:12,borderRadius:'50%',backgroundColor:color,flexShrink:0,border:'1.5px solid rgba(0,0,0,0.12)'}}/>
          <input autoFocus value={name} onChange={e=>setName(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')save();}}
            placeholder="레이어 이름"
            style={{flex:1,fontSize:13,fontWeight:500,color:'#222',borderBottom:'1.5px solid #AFA9EC',paddingBottom:3,minWidth:0}}/>
        </div>
      )}
      {(isOutlook)&&(
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{width:12,height:12,borderRadius:'50%',backgroundColor:color,flexShrink:0,border:'1.5px solid rgba(0,0,0,0.12)'}}/>
          <span style={{fontSize:13,fontWeight:500,color:'#999'}}>아웃룩 (이름 고정)</span>
        </div>
      )}
      <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
        {PROJECT_COLORS.map(c=>(
          <div key={c} onClick={()=>setColor(c)}
            style={{width:18,height:18,borderRadius:'50%',backgroundColor:c,cursor:'pointer',
              border:color===c?'2.5px solid #333':'1.5px solid rgba(0,0,0,0.1)',transition:'border 0.1s'}}/>
        ))}
      </div>
      <div style={{display:'flex',gap:6,alignItems:'center',justifyContent:'space-between',borderTop:'0.5px solid #F0F0F0',paddingTop:8}}>
        {isCustom?(
          <button onClick={del} style={{fontSize:11,color:'#E24B4A',padding:'4px 10px',
            border:'0.5px solid #FFCDD2',borderRadius:5,backgroundColor:'#FFF5F5'}}>삭제</button>
        ):<div/>}
        <div style={{display:'flex',gap:6}}>
          <button onClick={onClose} style={{fontSize:12,color:'#888',padding:'4px 10px',
            border:'0.5px solid #E0E0E0',borderRadius:5}}>취소</button>
          <button onClick={save} style={{fontSize:12,color:'#fff',padding:'4px 10px',
            backgroundColor:'#534AB7',borderRadius:5}}>저장</button>
        </div>
      </div>
    </div>
  );
}

    if(!state.outlookUser||!state.outlookClientId){setSettingsOpen(true);return;}
    if(olSyncing)return;
    setOlSyncing(true);
    try{
      const events=await outlookSync(state.outlookClientId);
      dispatch({type:'SET_OUTLOOK_EVENTS',events});
      showToast(events.length+'개 아웃룩 일정 동기화 완료','success');
    }catch(e){showToast('아웃룩 동기화 실패: '+e.message,'error');}

  };

  // Title editing

  const[titleVal,setTitleVal]=useState('');
  const imgInputRef=useRef(null);
  const saveTitle=()=>{const t=titleVal.trim();if(t)dispatch({type:'SET_TITLE',text:t});setEditingTitle(false);};
  const handleImgUpload=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1600;const sc=Math.min(1,MAX/img.width);
      const cv=document.createElement('canvas');
      cv.width=Math.max(1,Math.round(img.width*sc));cv.height=Math.max(1,Math.round(img.height*sc));
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      dispatch({type:'SET_TOPBAR_IMG',img:cv.toDataURL('image/jpeg',0.82)});
    };
    img.onerror=()=>dispatch({type:'SET_TOPBAR_IMG',img:ev.target.result});
    img.src=ev.target.result;
  };r.readAsDataURL(f);};
  useEffect(()=>{
    if(!editingTitle)return;
    const h=(e)=>{if(!e.target.closest('[data-topbar-edit]'))setEditingTitle(false);};
    const t=setTimeout(()=>document.addEventListener('mousedown',h),0);
    return()=>{clearTimeout(t);document.removeEventListener('mousedown',h);};
  },[editingTitle]);
  // Layer context menu (unified for all layer types)
  const[layerCtx,setLayerCtx]=useState(null);
  const openCtx=(e,type,id=null)=>{e.preventDefault();e.stopPropagation();setLayerCtx({x:e.clientX,y:e.clientY,type,id});};
  const isDark=topBarBg&&!['#ffffff','#FAFAFA','#F0EFFE','#E6F1FB'].includes(topBarBg);

  const[dragOverId,setDragOverId]=useState(null);
  return(<>
    <div style={{position:'fixed',top:0,left:0,right:0,height:56,borderBottom:'0.5px solid #E9E9EE',boxShadow:'0 1px 4px rgba(20,20,43,0.04)',zIndex:1000,
      display:'flex',alignItems:'center',padding:'0 14px 0 16px',gap:8,
      backgroundImage:topBarImg?`url(${topBarImg})`:'none',backgroundSize:'cover',backgroundPosition:'center',
      backgroundColor:topBarBg||'#fff'}}>
      {/* Apple-style title — dblclick to edit */}
      <div data-topbar-title="true"
        onClick={()=>{dispatch({type:'SET_WEEK_OFFSET',payload:0});setTimeout(()=>scrollToTodayRef?.current?.(),50);}}
        onDoubleClick={e=>{e.stopPropagation();setTitleVal(titleText||'혜진 스케줄러');setEditingTitle(v=>!v);}}
        style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',userSelect:'none',flexShrink:0}}
        title="클릭 → 오늘로 이동 / 더블클릭 → 편집">
        <div style={{width:38,height:38,borderRadius:10,
          background:isDark?'rgba(255,255,255,0.92)':'#111',
          display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
          boxShadow:'0 2px 6px rgba(0,0,0,0.2)'}}>
          <span style={{fontSize:18,fontWeight:700,color:isDark?'#111':'#fff',lineHeight:1,letterSpacing:'-0.5px'}}>
            {(titleText||'혜진').slice(0,1)}
          </span>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:2}}>
          <span style={{fontSize:21,fontWeight:700,letterSpacing:'-0.6px',
            color:isDark?'#fff':'#000',lineHeight:1.1}}>
            {titleText||'혜진 스케줄러'}
          </span>
          <span style={{fontSize:11,color:isDark?'rgba(255,255,255,0.5)':'#8e8e93',
            letterSpacing:'0.1px',lineHeight:1}}>Personal Calendar</span>
        </div>
      </div>
      {/* Title edit popup */}
      {editingTitle&&(
        <div data-topbar-edit="true" style={{position:'fixed',top:62,left:14,backgroundColor:'#fff',border:'0.5px solid #E0E0E0',
          borderRadius:10,padding:'12px 14px',boxShadow:'0 8px 28px rgba(0,0,0,0.13)',zIndex:3000,minWidth:272,display:'flex',flexDirection:'column',gap:9}}>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <input autoFocus value={titleVal} onChange={e=>setTitleVal(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter')saveTitle();if(e.key==='Escape')setEditingTitle(false);}}
              placeholder="타이틀 텍스트"
              style={{flex:1,fontSize:15,fontWeight:600,color:'#1A1A1A',borderBottom:'1.5px solid #AFA9EC',paddingBottom:3,minWidth:0}}/>
            <button onClick={saveTitle} style={{fontSize:12,color:'#fff',padding:'4px 10px',backgroundColor:'#534AB7',borderRadius:5,flexShrink:0}}>저장</button>
          </div>
          <div>
            <div style={{fontSize:10,color:'#8E8E96',marginBottom:5}}>배경색</div>
            <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
              {['#ffffff','#1A1A1A','#534AB7','#185FA5','#1D9E75','#E24B4A','#D97706','#F0EFFE','#E6F1FB','#FAFAFA'].map(c=>(
                <div key={c} onClick={()=>dispatch({type:'SET_TOPBAR_BG',bg:c})}
                  style={{width:18,height:18,borderRadius:3,backgroundColor:c,cursor:'pointer',
                    border:(topBarBg||'#ffffff')===c?'2px solid #534AB7':'0.5px solid #DDD'}}/>
              ))}
            </div>
          </div>
          <div style={{display:'flex',gap:5,alignItems:'center'}}>
            {topBarImg&&<button onClick={()=>dispatch({type:'SET_TOPBAR_IMG',img:''})} style={{fontSize:11,color:'#E24B4A',padding:'2px 8px',border:'0.5px solid #E24B4A',borderRadius:4}}>이미지 제거</button>}
            <button onClick={()=>imgInputRef.current?.click()} style={{fontSize:11,color:'#534AB7',padding:'2px 8px',border:'0.5px solid #AFA9EC',borderRadius:4,backgroundColor:'#EEEDFE'}}>이미지 업로드</button>
            <input ref={imgInputRef} type="file" accept="image/*" onChange={handleImgUpload} style={{display:'none'}}/>
          </div>
        </div>
      )}
      <div style={{flex:1}}/>
      {/* Layer chips row — unified, all draggable */}
      <div style={{display:'flex',alignItems:'center',gap:6,overflowX:'auto',flexShrink:1}}>
        {(()=>{
          // Build ordered layer list from layerOrder + catStyle
          const orderedLayers=(layerOrder||['work','personal']).map(id=>{
            if(id==='work')return{id:'work',label:workLabel||'업무',visible:workVisible,on:catStyle.work,type:'work'};
            if(id==='personal')return{id:'personal',label:personalLabel||'개인',visible:personalVisible,on:catStyle.personal,type:'personal'};
            const l=(customLayers||[]).find(c=>c.id===id);
            return l?{id:l.id,label:l.name,visible:l.visible,on:catStyle[l.id]||{bg:lighten(l.color,0.88),text:l.color,border:lighten(l.color,0.55),dot:l.color},type:'custom'}:null;
          }).filter(Boolean);
          const dragIdx=orderedLayers.findIndex(l=>l.id===dragId);
          const overIdx=orderedLayers.findIndex(l=>l.id===dragOverId);
          const getShift=(idx)=>{
            if(dragIdx<0||overIdx<0||dragIdx===overIdx)return 0;
            if(dragIdx<overIdx&&idx>dragIdx&&idx<=overIdx)return -1;
            if(dragIdx>overIdx&&idx>=overIdx&&idx<dragIdx)return 1;
            return 0;
          };
          return orderedLayers.map((l,idx)=>(
            <div key={l.id}
              draggable
              onDragStart={e=>{
                e.dataTransfer.effectAllowed='move';
                e.dataTransfer.setData('layerId',l.id);
                // 커스텀 드래그 고스트: 칩 모양 그대로, 커서에 붙어서 따라다님
                const g=document.createElement('div');
                g.style.cssText=`display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
                  border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;
                  background:${l.on.bg};color:${l.on.text};
                  border:1px solid ${l.on.border};
                  box-shadow:0 6px 18px rgba(0,0,0,0.18);
                  position:fixed;top:-200px;left:-200px;`;
                g.textContent=l.label;
                document.body.appendChild(g);
                e.dataTransfer.setDragImage(g,g.offsetWidth/2,14);
                requestAnimationFrame(()=>document.body.removeChild(g));
                setDragId(l.id);setDragOverId(null);
              }}
              onDragEnd={()=>{setDragId(null);setDragOverId(null);}}
              onDragOver={e=>{e.preventDefault();if(dragOverId!==l.id)setDragOverId(l.id);}}
              onDrop={e=>{
                e.preventDefault();
                const fromId=e.dataTransfer.getData('layerId');
                if(!fromId||fromId===l.id){setDragId(null);setDragOverId(null);return;}
                const newOrder=orderedLayers.map(x=>x.id);
                const fi=newOrder.indexOf(fromId),ti=newOrder.indexOf(l.id);
                if(fi<0||ti<0){setDragId(null);setDragOverId(null);return;}
                const[item]=newOrder.splice(fi,1);newOrder.splice(ti,0,item);
                dispatch({type:'REORDER_LAYERS',order:newOrder});
                const newCustom=newOrder.filter(id=>id!=='work'&&id!=='personal')
                  .map(id=>(customLayers||[]).find(c=>c.id===id)).filter(Boolean);
                if(newCustom.length)dispatch({type:'REORDER_CUSTOM_LAYERS',layers:newCustom});
                setDragId(null);setDragOverId(null);
              }}
              onContextMenu={e=>l.type==='custom'?openCtx(e,'custom',l.id):openCtx(e,l.type)}
              style={{
                display:'flex',alignItems:'center',flexShrink:0,cursor:'grab',
                transform:`translateX(${getShift(idx)*46}px)`,
                transition:dragId?'transform 0.18s cubic-bezier(0.34,1.56,0.64,1)':'none',
                opacity:dragId===l.id?0:1,
                position:'relative',zIndex:dragId===l.id?10:1,
              }}>
              <button
                onClick={()=>{
                  if(l.type==='work')dispatch({type:'SET_WORK_VISIBLE',payload:!l.visible});
                  else if(l.type==='personal')dispatch({type:'SET_PERSONAL_VISIBLE',payload:!l.visible});
                  else dispatch({type:'TOGGLE_CUSTOM_LAYER',id:l.id});
                }}
                style={{display:'flex',alignItems:'center',gap:5,padding:'3px 11px',
                  borderRadius:20,fontSize:12,fontWeight:l.visible?600:400,
                  border:`0.5px solid ${l.visible?l.on.border:'#DEDEDE'}`,
                  backgroundColor:l.visible?l.on.bg:'#F7F7F7',
                  color:l.visible?l.on.text:'#96969E',
                  transition:'background-color 0.15s,color 0.15s,border-color 0.15s',
                  userSelect:'none',pointerEvents:dragId?'none':'auto'}}>
                <span style={{width:5,height:5,borderRadius:'50%',backgroundColor:l.visible?l.on.dot:'#C8C8C8',flexShrink:0}}/>
                {l.label}
              </button>
            </div>
          ));
        })()}
        {/* 아웃룩 — always last */}
        <div style={{display:'flex',alignItems:'center',flexShrink:0}}
          onContextMenu={e=>openCtx(e,'outlook')}>
          <button onClick={()=>dispatch({type:'SET_OUTLOOK_VISIBLE',payload:!outlookVisible})}
            style={{display:'flex',alignItems:'center',gap:4,padding:'3px 8px',
              borderRadius:'20px 0 0 20px',fontSize:11,fontWeight:outlookVisible?500:400,
              border:`0.5px solid ${outlookVisible?catStyle.outlook.border:'#DEDEDE'}`,
              borderRight:'none',backgroundColor:outlookVisible?catStyle.outlook.bg:'#F7F7F7',
              color:outlookVisible?catStyle.outlook.text:'#96969E',transition:'all 0.15s',userSelect:'none'}}>
            <span style={{width:4,height:4,borderRadius:'50%',backgroundColor:outlookVisible?catStyle.outlook.dot:'#C8C8C8',flexShrink:0}}/>
            아웃룩

function MemoItem({memo,projectId,projectColor,memoIdx,memoCount,dispatch}){
  const[editTitle,setEditTitle]=useState(false);

    if(editorRef.current&&!memo.collapsed){
      const b=memo.body||'';

        editorRef.current.innerHTML=b.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
      }else{
        editorRef.current.innerHTML=b;
      }

  },[memo.collapsed]);
  const save=()=>{if(editorRef.current)dispatch({type:'UPDATE_MEMO',projectId,id:memo.id,updates:{body:editorRef.current.innerHTML}});};
  const checkSel=()=>{
    const sel=window.getSelection();
    if(sel&&sel.toString().length>0&&editorRef.current?.contains(sel.anchorNode)){

      setSelBar({x:rect.left+rect.width/2,y:rect.top-6});

      onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}

        <span style={{fontSize:7,color:'#CCCCCC',flexShrink:0,transform:memo.collapsed?'rotate(-90deg)':'rotate(0deg)',display:'inline-block',transition:'transform 0.15s',userSelect:'none'}}>▼</span>
        {editTitle?(

            style={{flex:1,fontSize:12,fontWeight:600,color:'#333',borderBottom:`0.5px solid ${projectColor}`,paddingBottom:1,minWidth:0,background:'transparent'}}/>

            {memo.title}

      </div>
      {!memo.collapsed&&(
        <div style={{position:'relative'}}>

            </div>

          {/* ContentEditable body */}
          <div
            ref={editorRef}
            contentEditable
            suppressContentEditableWarning

              transition:'border-color 0.15s',paddingBottom:2}}
          />
        </div>
      )}
    </div>
  );
}
function ProjectItem({project,dragId,dragOverId,onDragStart,onDragEnd,onDragOver,onDrop}){
  const{state,dispatch}=useStore();
  const memos=React.useMemo(()=>getMemoList(state.projectMemos[project.id]),[state.projectMemos,project.id]);
  const[hovered,setHovered]=useState(false);const[editing,setEditing]=useState(false);const[nameVal,setNameVal]=useState(project.name);const[cpOpen,setCpOpen]=useState(false);
  const saveName=()=>{const t=nameVal.trim();if(t)dispatch({type:'UPDATE_PROJECT',id:project.id,updates:{name:t}});else setNameVal(project.name);setEditing(false);};
  const isDragging=dragId===project.id;const isDragOver=dragOverId===project.id&&dragId!==project.id;
  // Register memo drag-drop handler
  React.useEffect(()=>{
    window._pendingMemoDrop=(fromId,toId,pId)=>{
      if(pId!==project.id)return;
      const cur=getMemoList(state.projectMemos[project.id]);
      const fi=cur.findIndex(m=>m.id===fromId);const ti=cur.findIndex(m=>m.id===toId);
      if(fi<0||ti<0)return;
      const arr=[...cur];const[item]=arr.splice(fi,1);arr.splice(ti,0,item);
      dispatch({type:'REORDER_MEMOS',projectId:project.id,memos:arr});
    };
  },[state.projectMemos,project.id]);
  return(
    <div
      draggable
      onDragStart={e=>{e.dataTransfer.effectAllowed='move';onDragStart(project.id);}}
      onDragEnd={onDragEnd}
      onDragOver={e=>{e.preventDefault();e.dataTransfer.dropEffect='move';onDragOver(project.id);}}
      onDrop={e=>{e.preventDefault();onDrop(project.id);}}
      style={{position:'relative',paddingBottom:6,borderBottom:'0.5px solid #F0F0F3',opacity:isDragging?0.4:1,transition:'opacity 0.12s'}}
      onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}

        <div style={{position:'relative',flexShrink:0}}>
          <div onClick={()=>setCpOpen(v=>!v)} style={{width:9,height:9,borderRadius:'50%',backgroundColor:project.color,cursor:'pointer',border:`1.5px solid ${project.color}`,transition:'transform 0.1s'}} onMouseEnter={e=>e.currentTarget.style.transform='scale(1.2)'} onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}/>
          {cpOpen&&<ColorPickerPopover selectedColor={project.color} onSelect={c=>dispatch({type:'UPDATE_PROJECT',id:project.id,updates:{color:c}})} onClose={()=>setCpOpen(false)} style={{top:12,left:0}}/>}
        </div>
        {editing?<input autoFocus value={nameVal} onChange={e=>setNameVal(e.target.value)} onBlur={saveName} onKeyDown={e=>{if(e.key==='Enter')saveName();if(e.key==='Escape'){setNameVal(project.name);setEditing(false);}}} style={{flex:1,fontSize:13,fontWeight:500,color:project.color,borderBottom:`0.5px solid ${project.color}`,paddingBottom:1,minWidth:0}}/>:<span onDoubleClick={()=>{setNameVal(project.name);setEditing(true);}} style={{flex:1,fontSize:13,fontWeight:500,color:project.color,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',cursor:'text',minWidth:0}}>{project.name}</span>}
        <button onClick={()=>dispatch({type:'UPDATE_PROJECT',id:project.id,updates:{layer:project.layer==='work'?'personal':'work'}})} title={project.layer==='personal'?'개인→업무':'업무→개인'} style={{fontSize:10,padding:'1px 4px',borderRadius:3,flexShrink:0,opacity:0.6,border:'0.5px solid #E0E0E0',color:project.layer==='personal'?'#185FA5':'#534AB7',backgroundColor:project.layer==='personal'?'#E6F1FB':'#EEEDFE'}}>{project.layer==='personal'?'개인':'업무'}</button>

        style={{marginLeft:14,marginTop:4,fontSize:11,color:'#CCCCCC',padding:'1px 6px',borderRadius:3,border:'0.5px dashed #E0E0E0',backgroundColor:'transparent',cursor:'pointer'}}
        onMouseEnter={e=>{e.currentTarget.style.color='#534AB7';e.currentTarget.style.borderColor='#AFA9EC';}}
