                  style={{width:48,fontSize:12,color:'#333',borderBottom:'0.5px solid #E0E0E0',textAlign:'center'}}/>
                <span style={{fontSize:11,color:'#888'}}>주</span>
              </div>
            </div>
          )}
          {form.recurring&&form.recurType==='yearly'&&(
            <div style={{padding:'8px',backgroundColor:'#FAFAFE',borderRadius:6,border:'0.5px solid var(--acc-bg)',fontSize:12,color:'var(--acc)'}}>
              매년 {dateObj.getMonth()+1}월 {dateObj.getDate()}일에 5년간 반복됩니다
            </div>
          )}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:14,padding:'8px 10px',backgroundColor:'#F8F8FF',borderRadius:6,border:'0.5px solid #E8E8F8'}}>
          <input type="checkbox" id="hl_check" checked={form.isHighlight} onChange={e=>setForm(f=>({...f,isHighlight:e.target.checked}))} style={{width:13,height:13,accentColor:'var(--acc)',cursor:'pointer',flexShrink:0}}/>
          <label htmlFor="hl_check" style={{fontSize:12,color:form.isHighlight?'var(--acc)':'#888',cursor:'pointer',userSelect:'none',fontWeight:form.isHighlight?500:400}}>좌측 주요일정에 등록</label>
          {form.isHighlight&&<span style={{fontSize:11,color:'var(--acc-brd)',marginLeft:'auto'}}>✓ 좌측 패널에 추가됩니다</span>}
        </div>
        <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
          <button onClick={onClose} style={{fontSize:13,color:'#888',padding:'5px 14px',border:'0.5px solid #E0E0E0',borderRadius:6}}>취소</button>
          <button onClick={handleSave} style={{fontSize:13,color:'#fff',padding:'5px 16px',backgroundColor:'var(--acc)',borderRadius:6,fontWeight:500,opacity:form.title.trim()?1:0.4}}>저장</button>
        </div>
      </div>
    </div>
  );
}

/* ─── 회의록 미리보기 패널 (일정 팝오버 우측) ─── */
function MeetingNotePreviewPane({note,onEdit}){
  const{state}=useStore();
  const proj=note.projectId?(state.projects||[]).find(p=>p.id===note.projectId):null;
  const bulletMark=(indent)=>['•','◦','▪'][(indent||0)%3];
  const items=[];
  (note.blocks||[]).forEach((b,i,arr)=>{
    let numLabel='';
    if(b.type==='numbered'){
      let n=1;
      for(let j=i-1;j>=0;j--){const x=arr[j];const xi=x.indent||0;const bi=b.indent||0;if(xi<bi)break;if(xi===bi){if(x.type==='numbered')n++;else break;}}
      numLabel=n+'.';
    }
    const base={h1:{fontSize:15,fontWeight:700,color:'#111',marginTop:i===0?0:10,marginBottom:2,borderBottom:'1px solid #EEEEEE',paddingBottom:3},
      h2:{fontSize:13.5,fontWeight:600,color:'#1C1C1C',marginTop:i===0?0:8,marginBottom:2},
      h3:{fontSize:12.5,fontWeight:600,color:'#2A2A2A',marginTop:i===0?0:6,marginBottom:1},
    }[b.type]||{fontSize:12,fontWeight:400,color:'#3D3D3D',lineHeight:1.65};
    if(b.type==='table'&&b.rows&&b.rows.length){
      items.push(
        <div key={b.id||i} style={{paddingLeft:(b.indent||0)*14,overflowX:'auto',margin:'3px 0'}}>
          <table style={{borderCollapse:'collapse'}}>
            <tbody>
              {b.rows.map((row,ri)=>(
                <tr key={ri}>
                  {row.map((cell,ci)=>(
                    <td key={ci} style={{border:'0.5px solid #DFDFE4',padding:'4px 9px',fontSize:11.5,
                      fontWeight:ri===0?600:400,color:'#3D3D3D',backgroundColor:ri===0?'var(--acc-soft)':'#fff'}}>{cell}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
      return;
    }
    const hasContent=(b.text||'').trim()||(b.html||'').replace(/<br\s*\/?>/g,'').trim();
    if(!hasContent&&b.type==='p')return;
    items.push(
      <div key={b.id||i} style={{display:'flex',alignItems:'flex-start',gap:5,paddingLeft:(b.indent||0)*14}}>
        {b.type==='bullet'&&<span style={{fontSize:11,color:'#909090',lineHeight:1.65,flexShrink:0}}>{bulletMark(b.indent)}</span>}
        {b.type==='numbered'&&<span style={{fontSize:11,color:'#909090',lineHeight:1.65,flexShrink:0,minWidth:14}}>{numLabel}</span>}
        {b.type==='todo'&&<span style={{fontSize:12,lineHeight:1.5,flexShrink:0,color:b.checked?'#7CB87C':'#B8B8B8'}}>{b.checked?'☑':'☐'}</span>}
        <div style={{...base,flex:1,minWidth:0,wordBreak:'break-word',whiteSpace:'pre-wrap',
          textDecoration:b.type==='todo'&&b.checked?'line-through':'none',
          opacity:b.type==='todo'&&b.checked?0.55:1}}
          dangerouslySetInnerHTML={{__html:(b.html&&b.html.trim())?b.html:_escHtml(b.text||'')}}/>
      </div>
    );
  });
  return(
    <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',borderLeft:'0.5px solid #EEEEF2',backgroundColor:'#FBFBFD'}}>
      <div style={{padding:'14px 16px 10px',borderBottom:'0.5px solid #F0F0F3',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
          <span style={{fontSize:11,fontWeight:700,color:'#8B85C9',letterSpacing:'0.5px'}}>📋 회의록</span>
          {proj&&<span style={{fontSize:10,color:proj.color,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{proj.name}</span>}
        </div>
        <div style={{fontSize:13,fontWeight:600,color:'#222',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{note.title||'(제목 없음)'}</div>
        <div style={{fontSize:10.5,color:'#A8A8B0',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
          {note.date}{note.time?' · '+note.time:''}{note.attendees?' · 👥 '+note.attendees:''}
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'12px 16px 14px',display:'flex',flexDirection:'column',gap:3}}>
        {items.length>0?items:<div style={{fontSize:11.5,color:'#C4C4CA',textAlign:'center',padding:'24px 0'}}>아직 작성된 내용이 없습니다<br/><span style={{fontSize:10.5}}>아래 버튼으로 내용을 작성해 보세요</span></div>}
      </div>
      {onEdit&&<div style={{padding:'10px 16px',borderTop:'0.5px solid #F0F0F3',flexShrink:0,backgroundColor:'#FBFBFD'}}>
        <button onClick={onEdit} style={{width:'100%',fontSize:12,fontWeight:500,color:'var(--acc)',padding:'7px 10px',border:'0.5px solid var(--acc-brd)',borderRadius:7,backgroundColor:'var(--acc-bg)',cursor:'pointer',transition:'background-color 0.12s'}}
          onMouseEnter={e=>e.currentTarget.style.backgroundColor='#E3E1FB'}
          onMouseLeave={e=>e.currentTarget.style.backgroundColor='var(--acc-bg)'}>✏️ 회의록 편집</button>
      </div>}
    </div>
  );
}
function EventDetailPopover({event,onClose,onDelete,onUpdate,onOpenNote}){
  const{state,dispatch}=useStore();const catStyle=useDynCatStyle();const showToast=useToast();
  const[form,setForm]=useState({
    time:event.time||'',title:event.title||'',category:event.category||'work',
    projectId:event.projectId||null,isHighlight:false,
    recurring:false,recurType:'weekly',
    recurDay:(()=>{const d=new Date(event.date+'T00:00:00');return(d.getDay()+6)%7;})(),
    recurWeeks:12,
  });
  React.useEffect(()=>{const h=(e)=>{if(e.key==='Escape')onClose();};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[]);
  const filteredProjects=(state.projects||[]).filter(p=>!p.layer||p.layer===form.category);
  const linkedNote=(state.meetingNotes||[]).find(n=>n.id===event.meetingNoteId);
  const openNote=(n)=>{onClose();setTimeout(()=>onOpenNote&&onOpenNote(n),50);};
  const handleSave=()=>{
    if(!form.title.trim())return;
    if(!form.recurring){
      onUpdate&&onUpdate({time:form.time.trim()||undefined,title:form.title.trim(),category:form.category,projectId:form.projectId});
      /* sync linked meeting note */
      if(event.meetingNoteId){const note=(state.meetingNotes||[]).find(n=>n.id===event.meetingNoteId);if(note){dispatch({type:'UPDATE_MEETING_NOTE',id:note.id,updates:{title:form.title.trim(),date:event.date,time:form.time.trim()||note.time||'',category:form.category,projectId:form.projectId,updatedAt:new Date().toISOString()}});}}
    } else {
      dispatch({type:'DELETE_EVENT',id:event.id});
      const dObj=new Date(event.date+'T00:00:00');
      if(form.recurType==='weekly'){
        const todayDow=(dObj.getDay()+6)%7;const ws=new Date(dObj);ws.setDate(dObj.getDate()-todayDow);
        const first=new Date(ws);first.setDate(ws.getDate()+form.recurDay);
        if(toDateKey(first)<toDateKey(dObj))first.setDate(first.getDate()+7);
        for(let i=0;i<(form.recurWeeks||12);i++){const d=new Date(first);d.setDate(first.getDate()+i*7);dispatch({type:'ADD_EVENT',event:{date:toDateKey(d),time:form.time.trim()||undefined,title:form.title.trim(),category:form.category,projectId:form.projectId,isOutlook:false,isRecurring:true}});}
      } else {
        for(let y=0;y<5;y++){const d=new Date(dObj);d.setFullYear(dObj.getFullYear()+y);dispatch({type:'ADD_EVENT',event:{date:toDateKey(d),time:form.time.trim()||undefined,title:form.title.trim(),category:form.category,projectId:form.projectId,isOutlook:false,isRecurring:true}});}
      }
    }
    if(form.isHighlight&&!form.recurring){const dObj=new Date(event.date+'T00:00:00');dispatch({type:'SET_HL_MONTH',hlYear:dObj.getFullYear(),hlMonth:dObj.getMonth()});dispatch({type:'ADD_HIGHLIGHT_PREFILLED',projectId:form.projectId||null,date:`${dObj.getMonth()+1}/${dObj.getDate()}`,text:form.title.trim(),yearMonth:`${dObj.getFullYear()}-${String(dObj.getMonth()+1).padStart(2,'0')}`});}
    showToast(`일정 수정됨 — ${form.title.trim()}`,'success');
    onClose();
  };
  if(event.isOutlook){
    const existingOutlookNote=(state.meetingNotes||[]).find(n=>n.id===event.meetingNoteId);
    const handleOutlookCreateNote=()=>{
      const nn={id:uid(),title:event.title||'',date:event.date,time:event.time||'',attendees:'',
        projectId:event.projectId||null,category:event.category||'work',linkedEventId:event.id,
        blocks:[{id:uid(),type:'p',text:'',indent:0,checked:false}],
        createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
      openNote(nn);
    };
    return(
      <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:'fixed',inset:0,backgroundColor:'rgba(0,0,0,0.06)',zIndex:4000,display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn 0.15s ease'}}>
        <div style={{backgroundColor:'#fff',border:'0.5px solid #E8E8EC',borderRadius:12,boxShadow:'0 0 0 1px rgba(15,15,35,0.05), 0 10px 24px rgba(15,15,35,0.10), 0 28px 60px rgba(15,15,35,0.13)',
          display:'flex',alignItems:'stretch',overflow:'hidden',animation:'popIn 0.16s ease',
          width:existingOutlookNote?620:undefined,maxWidth:existingOutlookNote?'94vw':300,minWidth:existingOutlookNote?undefined:240,maxHeight:'80vh'}}>
          <div style={{flex:existingOutlookNote?'0 0 250px':1,padding:'14px 16px',overflowY:'auto',minWidth:0}}>
            <div style={{display:'flex',justifyContent:'space-between',gap:8,marginBottom:10}}>
              <span style={{fontSize:14,fontWeight:600,wordBreak:'break-word'}}>{event.title}</span>
              <button onClick={onClose} style={{fontSize:15,color:'#CCC',flexShrink:0}}>×</button>
            </div>
            {event.time&&<span style={{fontSize:12,color:'#8E8E96',display:'block',marginBottom:event.location?4:8}}>{event.time}</span>}
            {event.location&&<div style={{display:'flex',alignItems:'center',gap:5,fontSize:13,fontWeight:700,color:'var(--acc)',backgroundColor:'var(--acc-bg)',border:'0.5px solid var(--acc-brd)',borderRadius:7,padding:'6px 10px',marginBottom:10}}>
              <span style={{fontSize:14,flexShrink:0}}>📍</span><span style={{wordBreak:'break-word'}}>{event.location}</span>
            </div>}
            <div style={{fontSize:12,color:'#8E8E96',textAlign:'center',marginBottom:10}}>🔗 아웃룩 일정 (편집 불가)</div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {!existingOutlookNote&&<button onClick={handleOutlookCreateNote} style={{width:'100%',fontSize:12,color:'var(--acc)',padding:'7px',border:'0.5px solid var(--acc-brd)',borderRadius:6,backgroundColor:'var(--acc-bg)',cursor:'pointer'}}>📋 회의록 작성</button>}
              <button onClick={()=>{onDelete();onClose();}} style={{width:'100%',fontSize:12,color:'#E24B4A',padding:'6px',border:'0.5px solid #E24B4A',borderRadius:6,backgroundColor:'#FEF2F2',cursor:'pointer'}}>이 앱에서 삭제</button>
            </div>
          </div>
          {existingOutlookNote&&<MeetingNotePreviewPane note={existingOutlookNote} onEdit={onOpenNote?()=>openNote(existingOutlookNote):null}/>}
        </div>
      </div>
    );
  }
  const dObj=new Date(event.date+'T00:00:00');
  return(
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:'fixed',inset:0,backgroundColor:'rgba(0,0,0,0.06)',zIndex:4000,display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn 0.15s ease'}}>
      <div style={{backgroundColor:'#fff',border:'0.5px solid #E8E8EC',borderRadius:12,boxShadow:'0 0 0 1px rgba(15,15,35,0.05), 0 10px 24px rgba(15,15,35,0.10), 0 28px 60px rgba(15,15,35,0.13)',
        display:'flex',alignItems:'stretch',overflow:'hidden',animation:'popIn 0.16s ease',
        width:linkedNote?680:undefined,maxWidth:linkedNote?'94vw':370,minWidth:310,maxHeight:'85vh'}}>
        <div style={{flex:linkedNote?'0 0 330px':1,padding:'16px 18px',overflowY:'auto',minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <span style={{fontSize:14,fontWeight:600}}>일정 수정</span>
          <button onClick={onClose} style={{fontSize:16,color:'#CCC'}}
            onMouseEnter={e=>e.currentTarget.style.color='#999'}
            onMouseLeave={e=>e.currentTarget.style.color='#CCC'}>×</button>
        </div>
        {/* Category */}
        <div style={{display:'flex',gap:5,marginBottom:12,flexWrap:'wrap'}}>
          {['work','personal'].map(cat=>{const s=catStyle[cat];const active=form.category===cat;return(<button key={cat} onClick={()=>setForm(f=>({...f,category:cat,projectId:null}))} style={{flex:1,padding:'5px 0',borderRadius:6,fontSize:12,fontWeight:500,border:`0.5px solid ${active?s.border:'#EBEBEB'}`,backgroundColor:active?s.bg:'#F8F8F8',color:active?s.text:'#ACACB4'}}>{cat==='work'?(state.workLabel||'업무'):(state.personalLabel||'개인')}</button>);})}
          {(state.customLayers||[]).filter(l=>(state.layerOrder||[]).includes(l.id)).map(l=>{const active=form.category===l.id;return(<button key={l.id} onClick={()=>setForm(f=>({...f,category:l.id,projectId:null}))} style={{flex:1,padding:'5px 0',borderRadius:6,fontSize:12,fontWeight:500,border:`0.5px solid ${active?lighten(l.color,0.55):'#EBEBEB'}`,backgroundColor:active?lighten(l.color,0.88):'#F8F8F8',color:active?l.color:'#ACACB4'}}>{l.name}</button>);})}
        </div>
        {/* Time */}
        <div style={{marginBottom:10}}><label style={{fontSize:11,color:'#8E8E96',display:'block',marginBottom:3}}>시간</label><input value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))} placeholder="예) 14:00" style={{width:'100%',fontSize:13,color:'#333',borderBottom:'0.5px solid #EDEDEA',paddingBottom:3}}/></div>
        {/* Title */}

/* Returns anniversary emoji prefix if layer name contains '기념일' or '생일' */
function getBdayPrefix(category,state){
  if(!category||!state)return'';
  const layers=[
    {id:'work',name:state.workLabel||'업무'},
    {id:'personal',name:state.personalLabel||'개인'},
    ...(state.customLayers||[]),
  ];
  const layer=layers.find(l=>l.id===category);
  return(layer?.name?.includes('기념일')||layer?.name?.includes('생일'))?'🎉 ':'';
}

function MemoEditor({memoKey,value,onUpdate}){

  const prevKey=useRef(memoKey);
  useEffect(()=>{
    if(ref.current){ref.current.innerHTML=value||'';}
  },[]);
  useEffect(()=>{
    if(ref.current&&!focused){
      ref.current.innerHTML=value||'';
      prevKey.current=memoKey;
    }
  },[memoKey,value,focused]);

        <div style={{display:'inline-flex',gap:1,padding:'2px 3px',backgroundColor:'#fff',border:'0.5px solid #E6E6EC',borderRadius:7,boxShadow:'0 2px 8px rgba(15,15,35,0.09)',flexShrink:0,alignSelf:'flex-start',marginBottom:2}}>

function WeeklyGrid({weekOffset,colH}){

    if(cat==='outlook')return '아웃룩';
    const cl=(state.customLayers||[]).find(l=>l.id===cat);return cl?.name||cat;
  };
  const evts=(state.weeklyEvents||[]).filter(e=>{
    if(e.date!==dk)return false;
    if(e.category==='work')return state.workVisible;
    if(e.category==='personal')return state.personalVisible;
    if(e.isOutlook)return state.outlookVisible!==false;
    const cl=(state.customLayers||[]).find(l=>l.id===e.category);
    if(cl)return cl.visible!==false;
    return true;
  }).sort((a,b)=>(a.time||'99').localeCompare(b.time||'99'));
  const todos=(state.todos||[]).filter(t=>{
    if(t.date!==dk)return false;
    if(t.category==='work')return state.workVisible;

  const td=isToday(date);const hol=getHoliday(dk);

  const dowColor=td?'var(--acc)':red?'#D06A6A':sat?'#4EB8B8':'#8A8A86';
  const submitTodo=()=>{const t=todoVal.trim();if(t)dispatch({type:'ADD_TODO',date:dk,text:t,category:todoCat});setTodoVal('');setTodoActive(false);};
  return(
    <div style={{display:'flex',borderBottom:'0.5px solid #EDEDEA',minHeight:88}}>
      <div onDoubleClick={()=>setPopoverDate(dk)} title="더블클릭 → 일정 추가"
        style={{width:80,flexShrink:0,padding:'10px 0 10px 16px',borderRight:'0.5px solid #F5F5F2',cursor:'pointer'}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.2px',color:dowColor}}>{DE[date.getDay()]}</div>
        <div style={{fontSize:32,fontWeight:900,letterSpacing:'-2px',lineHeight:0.95,color:numColor,fontVariantNumeric:'tabular-nums'}}>{String(date.getDate()).padStart(2,'0')}</div>
        {hol&&<div style={{fontSize:9,color:'#D06A6A',marginTop:3,fontWeight:600}}>{hol}</div>}
      </div>
      <div style={{flex:1,padding:'8px 12px',display:'flex',flexDirection:'column',gap:5,minWidth:0}}>
        {/* 이벤트 카드 */}
        <div onDoubleClick={()=>setPopoverDate(dk)} style={{display:'flex',flexDirection:'column',gap:5,cursor:'pointer'}}>
          {evts.length===0&&<div style={{fontSize:10,color:'#D4D4CE',padding:'4px 0'}}>일정 없음 <span style={{color:'#E0E0DA'}}>· 더블클릭해 추가</span></div>}
          {evts.map(e=>{
            const cs=catStyle[e.category]||catStyle.work;const loc=e.location;
            return(
              <div key={e.id} onClick={ev=>{ev.stopPropagation();setDetailEvent(e);}}
                style={{backgroundColor:'#fff',borderRadius:7,overflow:'hidden',border:'0.5px solid #EDEDEA',display:'flex',cursor:'pointer'}}
                onMouseEnter={ev=>ev.currentTarget.style.boxShadow='0 1px 6px rgba(0,0,0,0.06)'}
                onMouseLeave={ev=>ev.currentTarget.style.boxShadow='none'}>
                <div style={{width:3,flexShrink:0,backgroundColor:cs.dot}}/>
                <div style={{padding:'6px 8px',flex:1,minWidth:0}}>
                  <div style={{fontSize:7.5,fontWeight:700,letterSpacing:'0.3px',textTransform:'uppercase',color:cs.text,marginBottom:1}}>{catLabel(e.category)}</div>
                  <div style={{fontSize:11,fontWeight:600,color:'#2C2C2E',lineHeight:1.3,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{e.title}</div>
                  <div style={{fontSize:10,fontWeight:700,color:'#1A1A1C',marginTop:1}}>{e.time||'종일'}</div>
                  {loc&&<div style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:9.5,fontWeight:600,color:'var(--acc)',backgroundColor:'var(--acc-bg)',border:'0.5px solid var(--acc-brd)',borderRadius:5,padding:'1.5px 6px',marginTop:3,maxWidth:'100%'}}>
                    <span style={{flexShrink:0}}>📍</span><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{loc}</span>
                  </div>}
                </div>
              </div>
            );
          })}
        </div>
        {/* 할일 + 메모 */}
        <div style={{borderTop:'0.5px dashed #EAEAE6',paddingTop:6,display:'flex',flexDirection:'column',gap:3}}>
          <div onClick={()=>{if(!todoActive){setTodoActive(true);setTimeout(()=>todoRef.current?.focus(),20);}}} style={{cursor:todoActive?'default':'text'}}>
            {todos.map(t=><TodoItem key={t.id} todo={t} onToggle={()=>dispatch({type:'TOGGLE_TODO',id:t.id})} onDelete={()=>dispatch({type:'DELETE_TODO',id:t.id})} onEdit={txt=>dispatch({type:'UPDATE_TODO',id:t.id,updates:{text:txt}})}/>)}
            {todoActive?(
              <div style={{display:'flex',alignItems:'center',gap:4,marginTop:todos.length?2:0}} onClick={e=>e.stopPropagation()}>
                <button onClick={()=>setTodoCat(c=>c==='work'?'personal':'work')} style={{fontSize:8,padding:'1px 4px',borderRadius:3,flexShrink:0,border:`0.5px solid ${todoCat==='work'?catStyle.work.border:catStyle.personal.border}`,backgroundColor:todoCat==='work'?catStyle.work.bg:catStyle.personal.bg,color:todoCat==='work'?catStyle.work.text:catStyle.personal.text}}>{todoCat==='work'?(state.workLabel||'업무').slice(0,2):(state.personalLabel||'개인').slice(0,2)}</button>
                <input ref={todoRef} value={todoVal} onChange={e=>setTodoVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')submitTodo();if(e.key==='Escape'){setTodoVal('');setTodoActive(false);}}} onBlur={()=>setTimeout(submitTodo,120)} placeholder="할 일 입력" style={{flex:1,fontSize:12,color:'#333',minWidth:0,borderBottom:'0.5px solid #E8E8E8',paddingBottom:1}}/>
              </div>
            ):<div style={{fontSize:11,color:'#C4C4BE',paddingTop:todos.length?2:0}}>+ 할 일</div>}
          </div>
          <div style={{minHeight:20,fontSize:12}}><MemoEditor memoKey={dk} value={memo} onUpdate={html=>dispatch({type:'SET_WEEK_MEMO',date:dk,text:html})}/></div>
        </div>
      </div>
      {popoverDate&&<EventPopover date={popoverDate} onClose={()=>setPopoverDate(null)}/>}
      {detailEvent&&<EventDetailPopover event={detailEvent}
        onClose={()=>setDetailEvent(null)}
        onDelete={()=>{dispatch({type:'DELETE_EVENT',id:detailEvent.id});setDetailEvent(null);}}
        onUpdate={updates=>{dispatch({type:'UPDATE_EVENT',id:detailEvent.id,updates});setDetailEvent(null);}}
        onOpenNote={note=>{setDetailEvent(null);setTimeout(()=>setNoteMdl(note),50);}}/>}
      {noteMdl&&<MeetingNoteModal initialNote={noteMdl} onClose={()=>setNoteMdl(null)}/>}
    </div>
  );
}

// ─── MULTI-DAY BLOCK POPOVER ─────────────────
function MultiDayBlockPopover({initialStart,initialEnd,editBlock,onClose}){
  const{state,dispatch}=useStore();const catStyle=useDynCatStyle();const showToast=useToast();
  const[form,setForm]=useState({startDate:editBlock?.startDate||initialStart||'',endDate:editBlock?.endDate||initialEnd||'',title:editBlock?.title||'',category:editBlock?.category||'work',projectId:editBlock?.projectId||null,isHighlight:false});
  const titleRef=useRef(null);
  useEffect(()=>{setTimeout(()=>titleRef.current?.focus(),60);},[]);
  useEffect(()=>{const h=(e)=>{if(e.key==='Escape')onClose();};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[]);
  const handleSave=()=>{
    if(!form.title.trim()||!form.startDate||!form.endDate)return;
    const b={startDate:form.startDate<=form.endDate?form.startDate:form.endDate,endDate:form.startDate<=form.endDate?form.endDate:form.startDate,title:form.title.trim(),category:form.category,projectId:form.projectId};
    if(editBlock)dispatch({type:'UPDATE_MULTIDAY_BLOCK',id:editBlock.id,updates:b});
    else dispatch({type:'ADD_MULTIDAY_BLOCK',block:b});
    if(form.isHighlight&&!editBlock){
      const dHL=new Date(b.startDate+'T00:00:00');
      dispatch({type:'SET_HL_MONTH',hlYear:dHL.getFullYear(),hlMonth:dHL.getMonth()});
      dispatch({type:'ADD_HIGHLIGHT_PREFILLED',projectId:form.projectId||null,date:`${dHL.getMonth()+1}/${dHL.getDate()}`,text:form.title.trim(),yearMonth:`${dHL.getFullYear()}-${String(dHL.getMonth()+1).padStart(2,'0')}`});
    }
    showToast(editBlock?`기간 일정 수정됨 — ${form.title.trim()}`:`기간 일정 저장됨 — ${form.title.trim()}`,'success');
    onClose();
  };
  const handleDelete=()=>{
    if(editBlock){dispatch({type:'DELETE_MULTIDAY_BLOCK',id:editBlock.id});showToast('기간 일정 삭제됨','info');}
    onClose();
  };
  return(
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:'fixed',inset:0,backgroundColor:'rgba(0,0,0,0.06)',zIndex:4000,display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn 0.15s ease'}}>
      <div style={{backgroundColor:'#fff',border:'0.5px solid #E0E0E0',borderRadius:12,boxShadow:'0 0 0 1px rgba(15,15,35,0.05), 0 8px 20px rgba(15,15,35,0.09), 0 22px 48px rgba(15,15,35,0.12)',padding:'18px 20px',minWidth:300,maxWidth:360,maxHeight:'88vh',overflowY:'auto',animation:'popIn 0.16s ease'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <span style={{fontSize:15,fontWeight:600,letterSpacing:'-0.3px'}}>{editBlock?'기간 일정 수정':'기간 일정 추가'}</span>
          <button onClick={onClose} style={{fontSize:16,color:'#CCC',lineHeight:1}} onMouseEnter={e=>e.currentTarget.style.color='#999'} onMouseLeave={e=>e.currentTarget.style.color='#CCC'}>×</button>
        </div>
        {/* Category */}
        <div style={{display:'flex',gap:5,marginBottom:14,flexWrap:'wrap'}}>
          {['work','personal'].map(cat=>{const s=catStyle[cat];const active=form.category===cat;const lbl=cat==='work'?(state.workLabel||'업무'):(state.personalLabel||'개인');return<button key={cat} onClick={()=>setForm(f=>({...f,category:cat}))} style={{flex:1,padding:'5px 0',borderRadius:6,fontSize:12,fontWeight:500,border:`0.5px solid ${active?s.border:'#EBEBEB'}`,backgroundColor:active?s.bg:'#F8F8F8',color:active?s.text:'#ACACB4'}}>{lbl}</button>;})}
          {(state.customLayers||[]).filter(l=>(state.layerOrder||[]).includes(l.id)).map(l=>{const active=form.category===l.id;return<button key={l.id} onClick={()=>setForm(f=>({...f,category:l.id}))} style={{flex:1,padding:'5px 0',borderRadius:6,fontSize:12,fontWeight:500,border:`0.5px solid ${active?lighten(l.color,0.55):'#EBEBEB'}`,backgroundColor:active?lighten(l.color,0.88):'#F8F8F8',color:active?l.color:'#ACACB4'}}>{l.name}</button>;})}
        </div>
        {/* Dates */}
        <div style={{display:'flex',gap:10,marginBottom:12}}>
          <div style={{flex:1}}><label style={{fontSize:11,color:'#8E8E96',display:'block',marginBottom:4,letterSpacing:'0.3px'}}>시작일</label><input type="date" value={form.startDate} onChange={e=>setForm(f=>({...f,startDate:e.target.value}))} style={{width:'100%',fontSize:13,color:'#333',borderBottom:'0.5px solid #EDEDEA',paddingBottom:4}}/></div>
          <div style={{flex:1}}><label style={{fontSize:11,color:'#8E8E96',display:'block',marginBottom:4,letterSpacing:'0.3px'}}>종료일</label><input type="date" value={form.endDate} onChange={e=>setForm(f=>({...f,endDate:e.target.value}))} style={{width:'100%',fontSize:13,color:'#333',borderBottom:'0.5px solid #EDEDEA',paddingBottom:4}}/></div>
        </div>
        {/* Title */}
        <div style={{marginBottom:14}}><label style={{fontSize:11,color:'#8E8E96',display:'block',marginBottom:4,letterSpacing:'0.3px'}}>제목</label><input ref={titleRef} value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} onKeyDown={e=>{if(e.key==='Enter')handleSave();if(e.key==='Escape')onClose();}} placeholder="기간 일정 제목" style={{width:'100%',fontSize:14,color:'#333',borderBottom:'0.5px solid #EDEDEA',paddingBottom:4,fontWeight:500}}/></div>
        {/* Project */}
        {state.projects.filter(p=>!p.layer||p.layer===form.category).length>0&&<div style={{marginBottom:14}}><label style={{fontSize:11,color:'#8E8E96',display:'block',marginBottom:5,letterSpacing:'0.3px'}}>프로젝트</label><div style={{display:'flex',gap:4,flexWrap:'wrap'}}><button onClick={()=>setForm(f=>({...f,projectId:null}))} style={{fontSize:11,padding:'2px 7px',borderRadius:10,border:`0.5px solid ${!form.projectId?'#DDD':'#EBEBEB'}`,backgroundColor:!form.projectId?'#F5F5F5':'transparent',color:!form.projectId?'#666':'#CCC'}}>없음</button>{state.projects.filter(p=>!p.layer||p.layer===form.category).map(p=><button key={p.id} onClick={()=>setForm(f=>({...f,projectId:p.id}))} style={{fontSize:11,padding:'2px 8px',borderRadius:10,border:`0.5px solid ${form.projectId===p.id?p.color:'#EBEBEB'}`,backgroundColor:form.projectId===p.id?lighten(p.color):'transparent',color:form.projectId===p.id?p.color:'#A2A2AA',display:'flex',alignItems:'center',gap:4}}><span style={{width:5,height:5,borderRadius:'50%',backgroundColor:p.color,display:'inline-block',flexShrink:0}}/>{p.name}</button>)}</div></div>}
        {/* isHighlight */}
        {!editBlock&&<div style={{display:'flex',alignItems:'center',gap:6,marginBottom:14,padding:'6px 8px',backgroundColor:'#F8F8FF',borderRadius:5,border:'0.5px solid #E8E8F8'}}>
          <input type="checkbox" id="hl_blk" checked={form.isHighlight} onChange={e=>setForm(f=>({...f,isHighlight:e.target.checked}))} style={{width:12,height:12,accentColor:'var(--acc)',cursor:'pointer'}}/>
          <label htmlFor="hl_blk" style={{fontSize:11,color:form.isHighlight?'var(--acc)':'#888',cursor:'pointer',userSelect:'none'}}>주요일정으로 등록</label>
        </div>}
        {/* Actions */}
        <div style={{display:'flex',gap:6,justifyContent:'space-between'}}>
          {editBlock?<button onClick={handleDelete} style={{fontSize:13,color:'#E24B4A',padding:'5px 12px',border:'0.5px solid #E24B4A',borderRadius:6}}>삭제</button>:<div/>}
          <div style={{display:'flex',gap:6}}>
            <button onClick={onClose} style={{fontSize:13,color:'#888',padding:'5px 14px',border:'0.5px solid #E0E0E0',borderRadius:6}}>취소</button>
            <button onClick={handleSave} style={{fontSize:13,color:'#fff',padding:'5px 16px',backgroundColor:'var(--acc)',borderRadius:6,fontWeight:500,opacity:(form.title.trim()&&form.startDate&&form.endDate)?1:0.4}}>저장</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── CALENDAR DATE CELL ───────────────────────
function CalendarDateCell({date,holiday,events,isInDragRange,onMouseDown,onMouseEnter,onMouseUp,onDoubleClick,onEventClick,fill,dim}){
  const{state}=useStore();
  const catStyle=useDynCatStyle();
  const todayCell=isToday(date);
  const isRed=(holiday||isSun(date))&&!todayCell;
  const isBlue=isSat(date)&&!todayCell&&!holiday;
  const numColor=dim?'#D8D8D2':isRed?'#D06A6A':isBlue?'#4EB8B8':'#3A3A3C';
  const catColorOf=(cs)=>{const c=cs.dot||cs.text||'#B79C7A';return c;};
  return(
    <div className="cal-cell" onMouseDown={onMouseDown} onMouseEnter={onMouseEnter} onMouseUp={onMouseUp}
      onDoubleClick={onDoubleClick}
      style={{...(fill?{flex:1,minWidth:0,minHeight:104}:{minHeight:120,minWidth:0}),padding:'3px 4px',
        backgroundColor:isInDragRange?'var(--acc-bg)':'transparent',
        borderRight:'0.5px solid #F5F5F2',borderBottom:'0.5px solid #F5F5F2',cursor:'pointer',userSelect:'none',
        display:'flex',flexDirection:'column'}}>
      {/* Date number (v3: 오늘=18px 원형) */}
      <div style={{display:'flex',alignItems:'center',gap:3,flexShrink:0,marginBottom:2}}>
        {todayCell
          ?<span style={{fontSize:9.5,fontWeight:600,color:'#fff',backgroundColor:'var(--acc)',width:18,height:18,borderRadius:'50%',display:'inline-flex',alignItems:'center',justifyContent:'center',fontVariantNumeric:'tabular-nums'}}>{date.getDate()}</span>
          :<span style={{fontSize:10.5,fontWeight:600,color:numColor,lineHeight:1,fontVariantNumeric:'tabular-nums'}}>{date.getDate()}</span>}
        {holiday&&<span style={{fontSize:8,color:'#D06A6A',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',flex:1}}>{holiday}</span>}
      </div>
      {/* Events (v3 .mo-ev: 좌측 2.5px 바 + 4% 틴트 + 색 글자) — 전체 표시, 칸을 넘어가면 셀/행이 자동으로 길어짐 */}
      {!dim&&events.length>0&&(
        <div style={{display:'flex',flexDirection:'column',gap:1.5,flex:1}}>
          {events.map(ev=>{
            const cs=catStyle[ev.category]||catStyle.work;
            const col=catColorOf(cs);
            const isBdayEv=getBdayPrefix(ev.category,state)!=='';
            const bg=isBdayEv?'transparent':((typeof col==='string'&&col[0]==='#'&&col.length===7)?col+'14':cs.bg);
            return(
              <div key={ev.id} onClick={e=>{e.stopPropagation();onEventClick&&onEventClick(ev);}}
                style={{display:'flex',alignItems:'center',gap:3,padding:'1.5px 4px',borderRadius:3,
                  backgroundColor:bg,borderLeft:'2.5px solid '+col,overflow:'hidden',
                  cursor:'pointer',flexShrink:0,lineHeight:1.5,minWidth:0,whiteSpace:'nowrap'}}>
                <span style={{fontSize:9.5,color:col,flex:1,minWidth:0,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ev.time?ev.time+' ':''}{getBdayPrefix(ev.category,state)}{ev.title}</span>
                {ev.location&&<span style={{fontSize:8,color:'var(--acc)',fontWeight:600,flexShrink:0}}>📍{ev.location}</span>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// CalendarWeekRow: multi-day blocks overlaid on top of date cells
function CalendarWeekRow({weekDates,eventsByDate,multiDayBlocks,drag,onCellMouseDown,onCellMouseEnter,onCellMouseUp,onDblClickCell,onBlockClick,onEventClick,projects,ref_,fill,dimMonth}){
  const{state}=useStore();
  const catStyle=useDynCatStyle();const wsk=toDateKey(weekDates[0]),wek=toDateKey(weekDates[6]);
  const weekBlocks=multiDayBlocks.filter(b=>{
    if(b.startDate>wek||b.endDate<wsk)return false;
    if(b.category==='work')return state.workVisible;
    if(b.category==='personal')return state.personalVisible;
    const cl=(state.customLayers||[]).find(l=>l.id===b.category);
    if(cl)return cl.visible!==false;
    return true;
  });
  const blocksWithLanes=assignLanes(weekBlocks,weekDates);
  const numLanes=blocksWithLanes.length>0?Math.max(...blocksWithLanes.map(b=>b.lane))+1:0;
  const LANE_H=16;
  const blockAreaH=numLanes>0?numLanes*LANE_H+4:0;
  const dragSorted=drag?[drag.start,drag.current].sort():null;
  return(
    <div ref={ref_} style={{position:'relative',...(fill?{flex:'0 0 auto',display:'flex',flexDirection:'column'}:{})}}>
      {/* Date cells row - block area reserved at bottom */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,minmax(0,1fr))',paddingBottom:blockAreaH,...(fill?{flex:'0 0 auto'}:{})}}>
        {weekDates.map(date=>{
          const dk=toDateKey(date);
          const inDrag=dragSorted&&dk>=dragSorted[0]&&dk<=dragSorted[1];
          const events=eventsByDate[dk]||[];
          return(
            <CalendarDateCell key={dk} date={date} holiday={getHoliday(dk)}
              events={events} isInDragRange={!!inDrag}
              fill={fill} dim={dimMonth!=null&&date.getMonth()!==dimMonth}
              onMouseDown={(e)=>onCellMouseDown(dk,e)}
              onMouseEnter={()=>onCellMouseEnter(dk)}
              onMouseUp={()=>onCellMouseUp(dk)}
              onDoubleClick={(e)=>{e.stopPropagation();onDblClickCell(dk);}}
              onEventClick={onEventClick}
            />
          );
        })}
      </div>
      {/* Multi-day blocks: absolute overlay at bottom */}
      {numLanes>0&&(
        <div style={{position:'absolute',bottom:0,left:0,right:0,height:blockAreaH,zIndex:3,pointerEvents:'none'}}>
          <div style={{position:'relative',height:'100%'}}>
            {blocksWithLanes.map(b=>{
              const pos=getBlockWeekPos(b,weekDates);
              const proj=projects.find(p=>p.id===b.projectId);
              const cs=catStyle[b.category]||catStyle.work;
              const color=proj?proj.color:cs.dot;
              const bg=proj?lighten(proj.color,0.82):cs.bg;
              return(
                <div key={b.id} onClick={e=>{e.stopPropagation();onBlockClick(b);}}
                  style={{position:'absolute',top:b.lane*LANE_H+2,
                    left:`${(pos.startCol/7)*100}%`,width:`${((pos.endCol-pos.startCol+1)/7)*100}%`,
                    height:LANE_H-2,backgroundColor:bg,
                    borderLeft:pos.isStart?`3px solid ${color}`:'none',
                    borderRadius:pos.isStart&&pos.isEnd?4:pos.isStart?'4px 0 0 4px':pos.isEnd?'0 4px 4px 0':0,
                    padding:'0 5px',overflow:'hidden',whiteSpace:'nowrap',
                    fontSize:11,fontWeight:500,color,display:'flex',alignItems:'center',
                    cursor:'pointer',boxSizing:'border-box',pointerEvents:'all'}}>
                  {pos.isStart&&<span style={{overflow:'hidden',textOverflow:'ellipsis'}}>{getBdayPrefix(b.category,state)}{b.title}</span>}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function YearView({year,onSelectMonth}){
  const{state}=useStore();
  const today=new Date();
  const[bdayTooltip,setBdayTooltip]=useState(null);
  const[holidayTooltip,setHolidayTooltip]=useState(null);
  const scrollRef=useRef(null);
  const yearRefs=useRef({});
  const years=Array.from({length:8},(_,i)=>today.getFullYear()-2+i);
  const getBdayEvents=(dateKey)=>(state.weeklyEvents||[]).filter(e=>getBdayPrefix(e.category,state)!==''&&e.date===dateKey);
  useEffect(()=>{
    const el=yearRefs.current[year];
    if(el&&scrollRef.current)scrollRef.current.scrollTo({top:el.offsetTop-24,behavior:'instant'});
  },[year]);
  const renderMonthCard=(yr,mo)=>{
    const firstDay=new Date(yr,mo,1);const lastDay=new Date(yr,mo+1,0);
    const startDow=(firstDay.getDay()+6)%7;const daysInMonth=lastDay.getDate();
    const cells=[];
    for(let i=0;i<startDow;i++)cells.push(null);
    for(let d=1;d<=daysInMonth;d++)cells.push(d);
    return(
      <div key={mo} onClick={()=>onSelectMonth(yr,mo)}
        style={{cursor:'pointer',borderRadius:10,padding:'14px 12px',backgroundColor:'#fff',
          border:'1px solid #EFEFEF',boxShadow:'0 1px 4px rgba(0,0,0,0.05)',transition:'box-shadow 0.15s,border-color 0.15s'}}
        onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 4px 14px rgba(var(--acc-rgb),0.13)';e.currentTarget.style.borderColor='var(--acc-brd)';}}
        onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 1px 4px rgba(0,0,0,0.05)';e.currentTarget.style.borderColor='#EFEFEF';}}>
        <div style={{fontSize:13,fontWeight:700,color:'var(--acc)',marginBottom:10,paddingLeft:2,letterSpacing:'-0.2px'}}>{mo+1}월</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,minmax(0,1fr))',rowGap:2,columnGap:0}}>
          {['M','T','W','T','F','S','S'].map((d,i)=>(
            <div key={i} style={{textAlign:'center',fontSize:9,color:i===6?'#FDAAB0':i===5?'#A9C4E8':'#D0D0D0',paddingBottom:5,fontWeight:600,letterSpacing:'0.2px'}}>{d}</div>
          ))}
          {cells.map((d,ci)=>{
            if(!d)return<div key={'e'+ci}/>;
            const colDow=(startDow+d-1)%7;
            const dateKey=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const holiday=getHoliday(dateKey);
            const isHoliday=holiday!==null;
            const bdayEvs=getBdayEvents(dateKey);
            const isBday=bdayEvs.length>0;
            const isTd=today.getFullYear()===yr&&today.getMonth()===mo&&today.getDate()===d;
            const isRed=isHoliday||colDow===6;
            const isBlue=colDow===5&&!isHoliday;
            const textColor=isTd?'#fff':isRed?'#E24B4A':isBlue?'#4A7BC4':'#444';
            return(
              <div key={d} onClick={e=>{e.stopPropagation();onSelectMonth(yr,mo);}}
                style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                  fontSize:10,position:'relative',height:24,fontWeight:isTd?700:400,color:textColor}}>
                <div
                  style={{width:18,height:18,display:'flex',alignItems:'center',justifyContent:'center',
                    backgroundColor:isTd?'var(--acc)':'transparent',borderRadius:'50%',fontSize:10,lineHeight:1}}
                  onMouseEnter={isHoliday&&!isTd?e=>{e.stopPropagation();const r=e.currentTarget.getBoundingClientRect();setHolidayTooltip({name:holiday,x:r.left+r.width/2,y:r.top});}:undefined}
                  onMouseLeave={isHoliday&&!isTd?()=>setHolidayTooltip(null):undefined}
                >{d}</div>
                {isBday&&!isTd&&(
                  <div
                    style={{position:'absolute',bottom:0,left:'50%',transform:'translateX(-50%)',
                      width:16,height:10,display:'flex',alignItems:'flex-end',justifyContent:'center',
                      cursor:'default',zIndex:2,paddingBottom:1}}
                    onClick={e=>e.stopPropagation()}
                    onMouseEnter={e=>{e.stopPropagation();const r=e.currentTarget.getBoundingClientRect();setBdayTooltip({names:bdayEvs.map(ev=>ev.title),x:r.left+r.width/2,y:r.top});}}
                    onMouseLeave={()=>setBdayTooltip(null)}
                  >
                    <div style={{width:5,height:5,borderRadius:'50%',backgroundColor:'#EC4899'}}/>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  };
  return(
    <div ref={scrollRef} style={{flex:1,overflowY:'auto',padding:'20px 16px',backgroundColor:'#fff'}}>
      {years.map((yr)=>(
        <div key={yr} ref={el=>yearRefs.current[yr]=el}
          style={{opacity:yr===year?1:0.38,marginBottom:44,transition:'opacity 0.2s',pointerEvents:yr===year?undefined:'auto'}}>
          <div style={{fontSize:16,fontWeight:700,color:'var(--acc)',marginBottom:16,textAlign:'center',letterSpacing:'-0.3px'}}>{yr}년</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,240px)',gap:16,justifyContent:'center'}}>
            {Array.from({length:12},(_,mo)=>renderMonthCard(yr,mo))}
          </div>
        </div>
      ))}
      {bdayTooltip&&(
        <div style={{position:'fixed',left:bdayTooltip.x,top:bdayTooltip.y-38,transform:'translateX(-50%)',
          backgroundColor:'#1F2937',color:'#fff',fontSize:11,padding:'5px 9px',borderRadius:6,
          pointerEvents:'none',zIndex:9999,whiteSpace:'nowrap',
          boxShadow:'0 2px 10px rgba(0,0,0,0.18)',letterSpacing:'-0.2px'}}>
          🎂 {bdayTooltip.names.join(', ')}
          <div style={{position:'absolute',bottom:-5,left:'50%',transform:'translateX(-50%)',
            width:0,height:0,borderLeft:'5px solid transparent',
            borderRight:'5px solid transparent',borderTop:'5px solid #1F2937'}}/>
        </div>
      )}
      {holidayTooltip&&(
        <div style={{position:'fixed',left:holidayTooltip.x,top:holidayTooltip.y-38,transform:'translateX(-50%)',
          backgroundColor:'rgba(226,75,74,0.95)',color:'#fff',fontSize:11,padding:'5px 9px',borderRadius:6,
          pointerEvents:'none',zIndex:9999,whiteSpace:'nowrap',
          boxShadow:'0 2px 10px rgba(0,0,0,0.18)',letterSpacing:'-0.2px'}}>
          🎌 {holidayTooltip.name}
          <div style={{position:'absolute',bottom:-5,left:'50%',transform:'translateX(-50%)',
            width:0,height:0,borderLeft:'5px solid transparent',
            borderRight:'5px solid transparent',borderTop:'5px solid rgba(226,75,74,0.95)'}}/>
        </div>
      )}
    </div>
  );
}
function CalendarSection(){
  const{state,dispatch}=useStore();
  const{freeLayerVisible,setFreeLayerVisible,setStickerMode,setRightDockOpen,calendarScrollRef,scrollToTodayRef,scrollToDateRef,isMobile}=useLayout();
  const showToast=useToast();
  const today_=new Date();
  const[navLabel,setNavLabel]=useState('');
  const[drag,setDrag]=useState(null);
  const[eventPopoverDate,setEventPopoverDate]=useState(null);
  const[blockPopoverDates,setBlockPopoverDates]=useState(null);
  const[editBlock,setEditBlock]=useState(null);
  const[detailEvent,setDetailEvent]=useState(null);
  const[noteMdl,setNoteMdl]=useState(null);
  const weekRefs=useRef({});
  const[yearView,setYearView]=useState(false);
  const[navYear,setNavYear]=useState(today_.getFullYear());
  const[navMonth,setNavMonth]=useState(today_.getMonth());

  // Generate flat list of all weeks (-13..+13 months from today)
  const allWeeks=useMemo(()=>{
    const weeks=[];
    const start=new Date(today_.getFullYear()-2,0,1);
    // Align to Monday
    const dow=(start.getDay()+6)%7;
    start.setDate(start.getDate()-dow);
    const end=new Date(today_.getFullYear()+5,11,31);
    const cur=new Date(start);
    while(cur<=end){
      const wk=Array.from({length:7},(_,i)=>{const d=new Date(cur);d.setDate(cur.getDate()+i);return d;});
      weeks.push(wk);
      cur.setDate(cur.getDate()+7);
    }
    return weeks;
  },[]);

  // Scroll handler: update header label based on visible week
  const updateNavFromScroll=useCallback(()=>{
    const container=calendarScrollRef?.current;
    if(!container)return;
    const scrollTop=container.scrollTop;
    const entries=Object.entries(weekRefs.current).filter(([,el])=>el).map(([i,el])=>({i:+i,el})).sort((a,b)=>a.el.offsetTop-b.el.offsetTop);
    for(const{i,el}of entries){
      if(el.offsetTop+el.offsetHeight>scrollTop+2){
        const wk=allWeeks[i];
        if(wk){
          // Use the majority month of this week
          const months=wk.map(d=>d.getMonth());
          const mCount={};months.forEach(m=>mCount[m]=(mCount[m]||0)+1);
          const dominantM=+Object.entries(mCount).sort((a,b)=>b[1]-a[1])[0][0];
          const yr=wk.find(d=>d.getMonth()===dominantM)?.getFullYear()||wk[0].getFullYear();
          setNavYear(yr);
          setNavMonth(dominantM);
          setNavLabel(`${yr}년 ${dominantM+1}월`);
        }
        break;
      }
    }
  },[allWeeks,calendarScrollRef]);

  useEffect(()=>{
    const container=calendarScrollRef?.current;
    if(!container)return;
    container.addEventListener('scroll',updateNavFromScroll,{passive:true});
    return()=>container.removeEventListener('scroll',updateNavFromScroll);
  },[updateNavFromScroll,calendarScrollRef]);

  // Scroll to a specific year/month
  const scrollToYearMonth=useCallback((yr,mo)=>{
    const idx=allWeeks.findIndex(wk=>wk.some(d=>d.getFullYear()===yr&&d.getMonth()===mo&&d.getDate()===1));
    const el=weekRefs.current[idx>=0?idx:0];
    if(el&&calendarScrollRef?.current)calendarScrollRef.current.scrollTo({top:el.offsetTop,behavior:'auto'});
  },[allWeeks,calendarScrollRef]);

  useEffect(()=>{
    scrollToTodayRef.current=()=>{const t=new Date();setNavYear(t.getFullYear());setNavMonth(t.getMonth());};
    if(scrollToDateRef)scrollToDateRef.current=(dk)=>{const d=new Date(dk+'T00:00:00');setNavYear(d.getFullYear());setNavMonth(d.getMonth());};
  },[]);
  const goPrev=()=>{const nm=navMonth===0?11:navMonth-1;const ny=navMonth===0?navYear-1:navYear;setNavYear(ny);setNavMonth(nm);};
  const goNext=()=>{const nm=navMonth===11?0:navMonth+1;const ny=navMonth===11?navYear+1:navYear;setNavYear(ny);setNavMonth(nm);};
  const goToday=()=>{const t=new Date();setNavYear(t.getFullYear());setNavMonth(t.getMonth());};
  const _minYear=today_.getFullYear()-2,_maxYear=today_.getFullYear()+5;
  const goPrevYear=()=>setNavYear(y=>Math.max(_minYear,y-1));
  const goNextYear=()=>setNavYear(y=>Math.min(_maxYear,y+1));
  const handleYearInput=(e)=>{const y=parseInt(e.target.value,10);if(y>=_minYear&&y<=_maxYear)setNavYear(y);};

  const handleCellMouseDown=(dk,e)=>{e.preventDefault();setDrag({start:dk,current:dk});};
  const handleCellMouseEnter=(dk)=>{if(drag)setDrag(d=>({...d,current:dk}));};
  const handleCellMouseUp=(dk)=>{
    if(!drag)return;
    const{start,current}=drag;setDrag(null);
    if(start===current)return; // single click = handled by dblclick or mousedown
    const sorted=[start,current].sort();setBlockPopoverDates({start:sorted[0],end:sorted[1]});
  };
  const handleDblClick=(dk)=>setEventPopoverDate(dk);
  useEffect(()=>{const h=()=>setDrag(null);document.addEventListener('mouseup',h);return()=>document.removeEventListener('mouseup',h);},[]);

  const eventsByDate=useMemo(()=>{
    const m={};
    (state.weeklyEvents||[]).forEach(e=>{
      let visible=false;
      if(e.category==='work'&&state.workVisible)visible=true;
      if(e.category==='personal'&&state.personalVisible)visible=true;
      if(e.isOutlook&&state.outlookVisible!==false)visible=true;
      const cl=(state.customLayers||[]).find(l=>l.id===e.category);
      if(cl&&cl.visible!==false)visible=true;
      if(visible){if(!m[e.date])m[e.date]=[];m[e.date].push(e);}
    });
    return m;
  },[state.weeklyEvents,state.workVisible,state.personalVisible,state.outlookVisible,state.customLayers]);

  const visibleMonthLabel=navLabel||`${navYear}년 ${navMonth+1}월`;

  return(
    <section style={{display:'flex',flexDirection:'column',flex:1,minHeight:0}}>
      {/* Header (v3 single row) */}
      <div style={{flexShrink:0,backgroundColor:'#FAFAF7',borderBottom:'0.5px solid #EDEDEA',zIndex:10}}>
        <div style={{height:38,display:'flex',alignItems:'center',padding:'0 14px',gap:6}}>
          <ViewTabs/>
          <span style={{width:2}}/>
          <button onClick={goPrev} style={{fontSize:15,color:'#C4C4CA',padding:'2px 4px'}} onMouseEnter={e=>e.currentTarget.style.color='var(--acc)'} onMouseLeave={e=>e.currentTarget.style.color='#C4C4CA'}>&#8249;</button>
          <span onClick={()=>setYearView(v=>!v)} title="클릭 → 연간 달력" style={{cursor:'pointer',userSelect:'none',display:'flex',alignItems:'baseline',gap:4}}>
            <span style={{fontSize:15,fontWeight:800,color:'#1A1A1C',letterSpacing:'-0.3px'}}>{navMonth+1}월</span>
            <span style={{fontSize:11,color:'#A8A8A4'}}>{navYear}</span>
          </span>
          <button onClick={goNext} style={{fontSize:15,color:'#C4C4CA',padding:'2px 4px'}} onMouseEnter={e=>e.currentTarget.style.color='var(--acc)'} onMouseLeave={e=>e.currentTarget.style.color='#C4C4CA'}>&#8250;</button>
          <button onClick={()=>setYearView(v=>!v)} style={{fontSize:10.5,fontWeight:600,padding:'3px 9px',borderRadius:6,marginLeft:2,color:yearView?'#fff':'var(--acc)',backgroundColor:yearView?'var(--acc)':'var(--acc-bg)'}}>연간</button>
          <ThemeButton side="left"/>
          <div style={{flex:1}}/>
          {freeLayerVisible&&<span style={{fontSize:10.5,color:'var(--acc)',opacity:0.7,marginRight:2}}>더블클릭 → 포스트잇</span>}
          {!freeLayerVisible&&<span style={{fontSize:10.5,color:'#8E8E96',marginRight:2}}>더블클릭 → 일정 | 드래그 → 기간</span>}
          <button onClick={goToday} style={{fontSize:11,color:'var(--acc)',fontWeight:600,padding:'4px 12px',backgroundColor:'var(--acc-bg)',borderRadius:6,flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.backgroundColor='var(--acc-soft)'} onMouseLeave={e=>e.currentTarget.style.backgroundColor='var(--acc-bg)'}>오늘로</button>
        </div>
        {/* Day names (Sunday-first, v3) */}
        {!yearView&&<div style={{display:'grid',gridTemplateColumns:'repeat(7,minmax(0,1fr))',backgroundColor:'#FAFAF7',borderTop:'0.5px solid #EFEFF3'}}>
          {['일','월','화','수','목','금','토'].map((d,i)=><div key={d} style={{textAlign:'center',padding:'4px 0',fontSize:9,color:i===0?'#D06A6A':i===6?'#4EB8B8':'#C0C0BC',fontWeight:600,letterSpacing:'0.3px'}}>{d}</div>)}
        </div>}
      </div>
      {yearView&&<YearView year={navYear} onSelectMonth={(yr,mo)=>{setNavYear(yr);setNavMonth(mo);setYearView(false);}}/>}
      {!yearView&&(()=>{
        const first=new Date(navYear,navMonth,1);
        const startOffset=first.getDay(); // 0=Sun
        const gridStart=new Date(navYear,navMonth,1-startOffset);
        const weeks=[];
        for(let w=0;w<6;w++)weeks.push(Array.from({length:7},(_,i)=>{const d=new Date(gridStart);d.setDate(gridStart.getDate()+w*7+i);return d;}));
        const mdBlocks=state.multiDayBlocks.filter(b=>{
          if(!state.workVisible&&b.category==='work')return false;
          if(!state.personalVisible&&b.category==='personal')return false;
          return true;
        });
        return(
          <div ref={calendarScrollRef} style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',position:'relative',borderLeft:'0.5px solid #EBEBEB',overflowY:'auto',overflowX:'hidden'}}>
            {weeks.map((weekDates,i)=>(
              <CalendarWeekRow key={i} fill dimMonth={navMonth}
                weekDates={weekDates}
                eventsByDate={eventsByDate}
                multiDayBlocks={mdBlocks}
                drag={drag}
                onCellMouseDown={handleCellMouseDown}
                onCellMouseEnter={handleCellMouseEnter}
                onCellMouseUp={handleCellMouseUp}
                onDblClickCell={handleDblClick}
                onBlockClick={(b)=>setEditBlock(b)}
                onEventClick={(ev)=>setDetailEvent(ev)}
                projects={state.projects}
              />
            ))}
            <StickyNotesCanvas/>
            <StickerCanvas/>
          </div>
        );
      })()}
      {/* 노트·스티커 추가 FAB */}
      {!yearView&&!isMobile&&<button data-fab="true" onClick={()=>{setFreeLayerVisible(true);setStickerMode(true);setRightDockOpen(true);}}
        title="포스트잇·스티커 추가"
        style={{position:'fixed',right:26,bottom:26,width:48,height:48,borderRadius:'50%',
          backgroundColor:'var(--acc)',color:'#fff',fontSize:26,fontWeight:300,lineHeight:1,zIndex:940,
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:'0 4px 14px rgba(var(--acc-rgb),0.38), 0 1px 3px rgba(15,15,35,0.12)',
          transition:'transform 0.15s,background-color 0.15s'}}
        onMouseEnter={e=>{e.currentTarget.style.backgroundColor='#463DA3';e.currentTarget.style.transform='scale(1.06)';}}
        onMouseLeave={e=>{e.currentTarget.style.backgroundColor='var(--acc)';e.currentTarget.style.transform='scale(1)';}}>+</button>}
      {eventPopoverDate&&<EventPopover date={eventPopoverDate} onClose={()=>setEventPopoverDate(null)}/>}
      {(blockPopoverDates||editBlock)&&<MultiDayBlockPopover
        initialStart={blockPopoverDates?.start}
        initialEnd={blockPopoverDates?.end}
        editBlock={editBlock}
        onClose={()=>{setBlockPopoverDates(null);setEditBlock(null);}}/>}
      {detailEvent&&<EventDetailPopover event={detailEvent}
        onClose={()=>setDetailEvent(null)}
        onDelete={()=>{dispatch({type:'DELETE_EVENT',id:detailEvent.id});setDetailEvent(null);showToast('일정 삭제됨','info');}}
        onUpdate={updates=>{dispatch({type:'UPDATE_EVENT',id:detailEvent.id,updates});setDetailEvent(null);}}
        onOpenNote={note=>{setDetailEvent(null);setTimeout(()=>setNoteMdl(note),50);}}/>}
      {noteMdl&&<MeetingNoteModal initialNote={noteMdl} onClose={()=>setNoteMdl(null)}/>}
    </section>
  );
}

function RightNotesPanel(){
  const[modal,setModal]=useState(null);
  const{rightWidth,setRightWidth,leftWidth,leftCollapsed}=useLayout();
  const onResizeMouseDown=React.useCallback((e)=>{
    e.preventDefault();
    const startX=e.clientX,startW=rightWidth;
    const onMove=(ev)=>{
      const usedLeft=leftCollapsed?0:leftWidth;
      const dynMax=Math.max(280,window.innerWidth-usedLeft-280);
      const w=Math.max(220,Math.min(dynMax,startW-(ev.clientX-startX)));
      setRightWidth(w);
    };
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  },[rightWidth,setRightWidth,leftWidth,leftCollapsed]);
  return(

function RightDock(){
  const{rightDockOpen,setRightDockOpen,setStickerMode}=useLayout();
  React.useEffect(()=>{
    if(!rightDockOpen)return;
    const h=(e)=>{
      const t=e.target;
      if(t.closest('[data-right-dock]')||t.closest('[data-sticky-note]')||t.closest('[data-sticker]')||t.closest('[data-fab]')||t.closest('[data-free-note-panel]'))return;
      setRightDockOpen(false);setStickerMode(false);
    };
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[rightDockOpen,setRightDockOpen,setStickerMode]);
  if(!rightDockOpen)return null;
  return(
    <aside data-right-dock="true" style={{position:'fixed',top:66,right:12,bottom:12,width:308,backgroundColor:'#fff',
      border:'0.5px solid #E6E6EC',borderRadius:14,zIndex:950,display:'flex',flexDirection:'column',overflow:'hidden',
      boxShadow:'0 0 0 0.5px rgba(15,15,35,0.04), 0 12px 32px rgba(15,15,35,0.13), 0 32px 70px rgba(15,15,35,0.15)',animation:'popIn 0.16s ease'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',borderBottom:'0.5px solid #F0F0F3',flexShrink:0}}>
        <span style={{fontSize:11,color:'#8B85C9',letterSpacing:'1px',textTransform:'uppercase',fontWeight:700}}>노트 · 스티커</span>
        <button onClick={()=>{setRightDockOpen(false);setStickerMode(false);}} style={{fontSize:16,color:'#ACACB4',lineHeight:1}}
          onMouseEnter={e=>e.currentTarget.style.color='#666'}
          onMouseLeave={e=>e.currentTarget.style.color='#ACACB4'}>×</button>
      </div>
      <FreeNotePanel/>
    </aside>
  );
}
const SAT_TEAL='#4EB8B8';
function MobileMonthly(){
  const{state,dispatch}=useStore();

  const cells=[];

  for(let d=1;d<=ds;d++){const k=dk(y,m,d),dw=new Date(y,m-1,d).getDay();cells.push({d,k,td:k===today,hl:!!getHoliday(k)||dw===0,sa:dw===6,sel:k===selDate});}
  for(let d=1;d<=(7-(cells.length%7))%7;d++)cells.push({d,k:dk(y,m+1,d),ot:true});
  const selEvts=evFor(selDate).sort((a,b)=>(a.time||'99').localeCompare(b.time||'99'));
  const selD=new Date(selDate+'T12:00:00');const dowKr=['일','월','화','수','목','금','토'];
  const shiftM=(dir)=>setVm(v=>{let nm=v.m+dir,ny=v.y;if(nm<1){nm=12;ny--;}if(nm>12){nm=1;ny++;}return{y:ny,m:nm};});
  const shiftDay=(dir)=>{
    const d=new Date(selDate+'T12:00:00');d.setDate(d.getDate()+dir);

    if(d.getFullYear()!==vm.y||d.getMonth()+1!==vm.m)setVm({y:d.getFullYear(),m:d.getMonth()+1});
  };
  const touchRef=useRef(null);
  const onTouchStart=(e)=>{touchRef.current={x:e.touches[0].clientX,y:e.touches[0].clientY};};
  const onTouchEnd=(e)=>{
    const st=touchRef.current;if(!st)return;
    const dx=e.changedTouches[0].clientX-st.x,dy=e.changedTouches[0].clientY-st.y;
    if(Math.abs(dx)>44&&Math.abs(dx)>Math.abs(dy)*1.5)shiftDay(dx<0?1:-1);

  };

    <div style={{padding:'14px 16px 6px',display:'flex',alignItems:'baseline',gap:6}}>
      <span style={{fontSize:20,fontWeight:800,letterSpacing:'-0.4px'}}>{m}월</span><span style={{fontSize:13,fontWeight:500,color:'#A8A8A4'}}>{y}</span><span style={{flex:1}}/>

      <button onClick={()=>{setVm({y:new Date().getFullYear(),m:new Date().getMonth()+1});setSelDate(today);}} style={{fontSize:10,color:'var(--acc)',fontWeight:700,margin:'0 6px'}}>오늘</button>
      <button onClick={()=>shiftM(1)} style={{fontSize:13,color:'var(--acc)',fontWeight:600}}>›</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',padding:'0 16px',marginBottom:2}}>
      {['Su','Mo','Tu','We','Th','Fr','Sa'].map((d,i)=>(<span key={i} style={{textAlign:'center',fontSize:9,fontWeight:600,padding:'3px 0',letterSpacing:0.4,color:i===0?'#D06A6A':i===6?SAT_TEAL:'#B8B8B2'}}>{d}</span>))}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',padding:'0 12px',rowGap:2}}>
      {cells.map((c,i)=>{const dots=evFor(c.k).slice(0,4).map(e=>catDot(e.category));
        return(<div key={i} onClick={()=>setSelDate(c.k)} style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'4px 0',minHeight:42,borderRadius:8,cursor:'pointer'}}>
          <span style={{fontSize:13.5,fontWeight:600,width:26,height:26,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'50%',
            color:c.ot?'#D5D5CE':c.td?'#fff':c.hl?'#D06A6A':c.sa?SAT_TEAL:'#2C2C2E',
            background:c.td?'var(--acc)':c.sel&&!c.td?'rgba(183,156,122,0.12)':'transparent',fontSize:c.td?12.5:13.5}}>{c.d}</span>
          <div style={{display:'flex',gap:2,marginTop:1,justifyContent:'center',minHeight:4}}>{dots.map((cl,j)=>(<span key={j} style={{width:4,height:4,borderRadius:'50%',background:cl}}/>))}</div>
        </div>);})}
    </div>
    <div onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} style={{touchAction:'pan-y'}}>
      <div style={{padding:'14px 16px 6px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:13,fontWeight:700}}>Events · {selD.getDate()} {dowKr[selD.getDay()]}{getHoliday(selDate)?' · '+getHoliday(selDate):''}</span>

      </div>

        <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,color:'#2C2C2E',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{ev.title}</div>
        <div style={{display:'flex',alignItems:'center',gap:5,marginTop:1}}>
          <span style={{fontSize:11,color:'#B0B0AA',fontWeight:500}}>{catLabel(ev.category)}</span>
          {ev.location&&<span style={{fontSize:10.5,fontWeight:600,color:'var(--acc)',backgroundColor:'var(--acc-bg)',borderRadius:5,padding:'1px 6px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:120}}>📍{ev.location}</span>}
        </div></div>
        <span style={{fontSize:11,color:'#B0B0AA',flexShrink:0}}>{ev.time||'종일'}</span>
      </div>))}
    </div>
    <button onClick={()=>setAddOpen(selDate)} title="일정 추가"
      style={{position:'fixed',right:20,bottom:66,width:52,height:52,borderRadius:'50%',
        backgroundColor:'var(--acc)',color:'#fff',fontSize:28,fontWeight:300,lineHeight:1,zIndex:120,
        display:'flex',alignItems:'center',justifyContent:'center',
        boxShadow:'0 4px 14px rgba(var(--acc-rgb),0.4), 0 1px 3px rgba(15,15,35,0.15)'}}>+</button>
    {addOpen&&<EventPopover date={addOpen} onClose={()=>setAddOpen(null)}/>}
    {detailEvt&&<EventDetailPopover event={detailEvt} onClose={()=>setDetailEvt(null)}/>}
  </div>);
}

        <button onClick={()=>setAddDate(day.k)} style={{alignSelf:'flex-end',marginTop:'auto',width:26,height:26,borderRadius:'50%',background:'#F5F0E8',color:'var(--acc)',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>

function MobileMeetings(){
  const{state}=useStore();const[modal,setModal]=useState(null);const dowKr=['일','월','화','수','목','금','토'];
  const notes=useMemo(()=>{const a=Object.values(state.meetingNotes||{});a.sort((a,b)=>(b.date||'').localeCompare(a.date||''));return a;},[state.meetingNotes]);
  const grouped=useMemo(()=>{const g={};notes.forEach(n=>{(g[n.date||'미정']=g[n.date||'미정']||[]).push(n);});return g;},[notes]);
  return(<div style={{paddingTop:44,paddingBottom:54,minHeight:'100vh',background:'#FAFAF7'}}>
    <div style={{padding:'14px 16px 8px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <b style={{fontSize:18,fontWeight:800}}>📋 회의록</b>
      <button onClick={()=>setModal({})} style={{fontSize:11.5,padding:'6px 14px',borderRadius:8,background:'var(--acc)',color:'#fff',fontWeight:600}}>+ 새 회의록</button>
